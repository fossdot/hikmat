<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Hikmat Learn — Learn by Playing</title>
<!-- PWA: installable + offline on Android & iOS (paths resolve only when served from Frappe) -->
<meta name="theme-color" content="#6c5ce7" />
<link rel="manifest" href="/assets/hikmat/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/assets/hikmat/icons/icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/assets/hikmat/icons/icon-192.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Hikmat" />
<style>
  :root {
    --bg: #fbf7ef;
    --bg2: #fff3df;
    --card: #ffffff;
    --ink: #2c2440;
    --muted: #6f6886;         /* AA contrast (~5.2:1 on white/cream); was #8d86a0 (failed 4.5:1) */
    --line: #ece6dc;
    --primary: #ff7a45;       /* warm orange — main action */
    --primary-d: #d85a28;     /* its shadow */
    --grape: #6c5ce7;         /* journey / current */
    --grape-d: #4b3fc0;
    --gold: #ffb830;
    --good: #2ec27e;
    --good-d: #157a4b;        /* AA on white + the #eafaf2 success tint (was #1e9d62) */
    --bad: #ff5a5f;
    --bad-d: #c0282d;         /* AA on white + the #fff0f0 error tint (was #d83a40) */
    --r: 16px;
  }
  /* ===== Dark theme (toggled via <html data-theme="dark">) ===== */
  [data-theme="dark"]{
    --bg:#171221; --bg2:#221a33; --card:#241d36; --ink:#f1ecfb; --muted:#b3abc9; --line:#39314f;
    --good-d:#4ade80; --bad-d:#fb7185;
  }
  [data-theme="dark"] .topbar{ background:linear-gradient(90deg,#241d36,#1d1730); }
  [data-theme="dark"] .opt,[data-theme="dark"] .tile,[data-theme="dark"] .bubble2,
  [data-theme="dark"] .searchbox,[data-theme="dark"] .btn.ghost,[data-theme="dark"] .chiptab,
  [data-theme="dark"] .profilebtn,[data-theme="dark"] .av,[data-theme="dark"] .backbtn,
  [data-theme="dark"] .echip,[data-theme="dark"] .email,[data-theme="dark"] .pill,
  [data-theme="dark"] .toggle,[data-theme="dark"] .speakbtn,[data-theme="dark"] .speakchip{
    background:#2a2240; color:var(--ink); border-color:var(--line); box-shadow:0 4px 0 #15101f; }
  [data-theme="dark"] .opt.correct{ background:#15341f; }
  [data-theme="dark"] .opt.wrong{ background:#3a1622; }
  [data-theme="dark"] .searchbox::placeholder{ color:var(--muted); }
  [data-theme="dark"] .node .num{ background:#2a2240; color:var(--ink); }
  [data-theme="dark"] .pininput{ background:#2a2240; color:var(--ink); }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Nunito", -apple-system, "Segoe UI", system-ui, sans-serif;
    background:
      radial-gradient(900px 500px at 15% -5%, var(--bg2), transparent),
      radial-gradient(700px 500px at 100% 110%, #ffe9f0, transparent),
      var(--bg);
    color: var(--ink);
    display: flex; align-items: safe center; justify-content: center;
    padding: 22px;
    line-height: 1.45;
  }
  #shell { width: min(840px, 100%); display:flex; flex-direction:column; gap:12px; }
  #topnav:empty { display:none; }
  .backbtn { align-self:flex-start; background:#fff; border:2px solid var(--line); border-radius:12px;
             padding:9px 16px; cursor:pointer; font-weight:800; color:var(--ink); font-size:14px;
             box-shadow:0 3px 0 var(--line); transition:transform .06s, box-shadow .06s; }
  .backbtn:active { transform:translateY(2px); box-shadow:0 1px 0 var(--line); }
  #app {
    width: 100%;
    background: var(--card);
    border-radius: 26px;
    box-shadow: 0 24px 60px -20px rgba(76,63,150,.35), 0 0 0 1px var(--line);
    overflow: hidden;
    position: relative;
    min-height: 600px;
  }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 14px 20px;
    background: linear-gradient(90deg,#fff,#fffaf2);
    border-bottom: 2px solid var(--line);
  }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 800; font-size: 18px; }
  .brand .logo { font-size: 24px; display:inline-flex; align-items:center; }
  .brand .logo .logoimg { height:28px; width:auto; max-width:120px; object-fit:contain; vertical-align:middle; border-radius:6px; }
  .stats { display: flex; gap: 8px; align-items:center; }
  .pill {
    padding: 6px 13px; border-radius: 999px; background:#fff; border:2px solid var(--line);
    font-weight: 800; font-size: 14px; display:flex; align-items:center; gap:6px; color:var(--ink);
  }
  .pill.star { border-color:#ffe2a8; color:#e08a00; }
  /* glossy gold star (CSS-drawn so it isn't the pale 🌟 emoji) */
  .staricon { font-size:1.12em; line-height:1; background:linear-gradient(180deg,#ffe14d,#ffab00);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;
    filter: drop-shadow(0 1px 0 #d98a00) drop-shadow(0 0 4px rgba(255,170,0,.65)); }
  .pill.coin { border-color:#ffd9c2; color:var(--primary-d); }
  .toggle {
    background: #fff; border: 2px solid var(--line); color:var(--muted); cursor:pointer;
    padding: 6px 13px; border-radius: 999px; font-weight:800; font-size: 12px;
  }
  .toggle.on { background: var(--grape); color: #fff; border-color: var(--grape-d); }
  .screen { padding: 30px 28px; }

  /* tactile button base */
  .tap { border:0; cursor:pointer; font:inherit; font-weight:800; border-radius:14px;
         transition: transform .06s, box-shadow .06s; position:relative; }
  .tap:active { transform: translateY(3px); }

  /* HOME */
  .hero { text-align:center; padding: 14px 10px 22px; }
  .hero h1 { font-size: 30px; font-weight:900; margin: 4px 0 6px; letter-spacing:-.4px;}
  .hero p { color: var(--muted); margin: 0; font-size: 15px; font-weight:700;}
  .themes { display:grid; grid-template-columns: repeat(auto-fit,minmax(190px,1fr)); gap:14px; }
  .theme {
    border-radius: 20px; padding: 22px 20px; cursor:pointer; color:#fff;
    text-align:left; font: inherit; position:relative; overflow:hidden; border:0;
    background: linear-gradient(160deg,#ff9a5a,#ff7a45);
    box-shadow: 0 7px 0 var(--primary-d); transition: transform .08s, box-shadow .08s;
  }
  .theme:active { transform: translateY(5px); box-shadow: 0 2px 0 var(--primary-d); }
  .theme.locked { background: #efeae2; color:#aaa39a; box-shadow: 0 7px 0 #d9d3c8; cursor: not-allowed; }
  .theme.locked:active { transform:none; box-shadow: 0 7px 0 #d9d3c8; }
  .theme .big { font-size: 40px; }
  .theme h3 { margin: 10px 0 2px; font-size: 19px; font-weight:900; }
  .theme small { opacity:.92; font-weight:700; }
  .theme .lock { position:absolute; top:16px; right:18px; font-size:18px;}

  /* LEVEL MAP — the journey path */
  .maphead { display:flex; align-items:center; gap:14px; margin-bottom: 6px;}
  .back { background:#fff; border:2px solid var(--line); border-radius:12px; padding:9px 14px; cursor:pointer; font-weight:800; color:var(--ink); font-size:14px;}
  .back:active { transform: translateY(2px); }
  .maphead h2 { margin:0; font-size:24px; font-weight:900; }
  .maphead .sub { color:var(--muted); font-size:14px; font-weight:700; }

  /* "Roshni, mujhe doubt hai" — always-there help button during gameplay */
  .doubtbtn { margin-left:auto; background:var(--grape); color:#fff; border:none;
    border-radius:999px; padding:10px 16px; font-weight:900; font-size:14px; cursor:pointer;
    box-shadow:0 4px 0 var(--grape-d); white-space:nowrap; min-height:44px; }
  .doubtbtn:active { transform:translateY(2px); box-shadow:0 2px 0 var(--grape-d); }
  @media (max-width:420px){ .doubtbtn{ padding:10px 13px; font-size:13px; } }

  .sheetwrap { position:fixed; inset:0; z-index:60; background:rgba(20,14,33,.5);
    display:flex; align-items:flex-end; justify-content:center; padding:0;
    animation:fadeIn .18s ease; }
  @keyframes fadeIn { from{ opacity:0; } to{ opacity:1; } }
  .sheet { width:100%; max-width:560px; background:var(--card); color:var(--ink);
    border-radius:24px 24px 0 0; padding:22px 22px calc(22px + env(safe-area-inset-bottom));
    box-shadow:0 -10px 40px rgba(20,14,33,.3); animation:sheetUp .26s cubic-bezier(.2,.9,.3,1); }
  @keyframes sheetUp { from{ transform:translateY(100%); } to{ transform:translateY(0); } }
  @media (prefers-reduced-motion:reduce){ .sheetwrap,.sheet{ animation:none; } }
  .doubthead { display:flex; align-items:center; gap:14px; margin-bottom:18px; }
  .doubthead .mascot.small { width:64px; height:64px; flex:0 0 64px; }
  .doubtq { font-size:20px; font-weight:900; }
  .doubtsub { color:var(--muted); font-weight:700; font-size:14px; margin-top:3px; }
  .doubtopts { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  @media (max-width:420px){ .doubtopts{ grid-template-columns:1fr; } }
  .doubtopt { display:flex; align-items:center; gap:12px; text-align:left;
    background:var(--bg2); border:2px solid var(--line); border-radius:16px;
    padding:16px; font-weight:800; font-size:16px; color:var(--ink); cursor:pointer; min-height:44px; }
  .doubtopt:active { transform:translateY(2px); }
  .doubtopt .di { font-size:26px; line-height:1; }
  .doubtopt.done { background:#eafaf2; border-color:var(--good); color:var(--good-d); }
  .btn.wide { width:100%; }

  /* Floating Roshni voice assistant */
  .roshnifab { position:fixed; right:16px; bottom:16px; z-index:9000; width:64px; height:64px;
    border-radius:50%; border:none; background:var(--grape); box-shadow:0 8px 22px rgba(0,0,0,.32);
    cursor:pointer; padding:6px; display:grid; place-items:center; }
  .roshnifab .rfabm, .roshnifab .rfabm svg { width:100%; height:100%; }
  .roshnifab:active { transform:translateY(2px); box-shadow:0 4px 12px rgba(0,0,0,.3); }
  body.speaking .roshnifab { animation: rfabpulse 1s ease-in-out infinite; }
  @keyframes rfabpulse { 0%,100%{ box-shadow:0 8px 22px rgba(108,92,231,.4); } 50%{ box-shadow:0 8px 30px rgba(108,92,231,.85); } }
  .rmic.rec { background:var(--bad); box-shadow:0 6px 0 var(--bad-d); }
  .rok, .rno { border:none; border-radius:8px; padding:5px 11px; font-weight:800; margin-left:6px; cursor:pointer; }
  .rok { background:var(--good); color:#fff; } .rno { background:var(--line); color:var(--ink); }
  @media (max-width:420px){ .roshnifab{ width:56px; height:56px; right:12px; bottom:12px; } }

  .path { position:relative; max-width:540px; margin: 16px auto 30px; }
  .cpath { position:absolute; left:0; top:0; z-index:0; pointer-events:none; }   /* the winding trail */
  .step { position:absolute; left:0; right:0; z-index:1; }                        /* top + height set inline */
  .node {
    position:absolute; top:0; border:0; cursor:pointer;                           /* left/width/height/border-radius set inline */
    display:grid; place-items:center; font-size:28px; color:#fff;
    background: linear-gradient(160deg,#8a7bf0,var(--grape));
    box-shadow: 0 6px 0 var(--grape-d); transition: transform .08s, box-shadow .08s;
  }
  .node .num {                                                                    /* number rides on the node, so it follows the curve */
    position:absolute; top:-6px; left:-6px; min-width:20px; height:20px; padding:0 4px;
    border-radius:999px; background:#fff; color:var(--ink); font-size:11px; font-weight:900;
    display:flex; align-items:center; justify-content:center; box-shadow:0 2px 5px rgba(0,0,0,.2); z-index:3;
  }
  .step.locked .node .num { color:#b7b0a6; }
  .node:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--grape-d); }
  .step.done .node { background: linear-gradient(160deg,#46d68f,var(--good)); box-shadow: 0 6px 0 var(--good-d); }
  .step.locked .node { background:#e7e1d8; color:#b7b0a6; box-shadow: 0 6px 0 #d2ccc1; cursor:not-allowed; }
  .step.locked .node:active { transform:none; box-shadow:0 6px 0 #d2ccc1; }
  /* hover: unlocked nodes lift & brighten; the label leans in; locked ones give a little "no" nudge */
  .step:not(.locked) .node:hover:not(:active) { transform: translateY(-4px) scale(1.06); filter: brightness(1.07); }
  .step:not(.locked):hover .label { color: var(--primary-d); }
  .step:not(.locked):hover .node { cursor:pointer; }
  .step.locked .node:hover { animation: nudge .32s ease; }
  @keyframes nudge { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-4px)} 60%{transform:translateX(4px)} 80%{transform:translateX(-2px)} }
  .step.current .node { background: linear-gradient(160deg,#ff9a5a,var(--primary)); box-shadow: 0 6px 0 var(--primary-d); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse {
    0%,100%{ box-shadow:0 6px 0 var(--primary-d), 0 0 0 0 rgba(255,150,0,.5),  0 0 16px 2px rgba(255,170,60,.35); }
    50%    { box-shadow:0 6px 0 var(--primary-d), 0 0 0 13px rgba(255,150,0,0), 0 0 28px 7px rgba(255,170,60,.6);  }
  }
  .starttag {
    position:absolute; top:-21px; left:50%; transform:translateX(-50%);
    background:linear-gradient(135deg,#ffe16b,#ff9e00); color:#5a3500;
    font-size:11px; font-weight:900; letter-spacing:1.2px;
    padding:4px 12px; border-radius:999px; white-space:nowrap; overflow:hidden;
    box-shadow:0 3px 10px rgba(255,150,0,.55), 0 0 0 2px #fff;
    animation: bob 1s ease-in-out infinite;
  }
  .starttag::after {
    content:""; position:absolute; top:0; left:-70%; width:45%; height:100%;
    background:linear-gradient(100deg, transparent, rgba(255,255,255,.9), transparent);
    transform:skewX(-20deg); animation: shimmer 1.8s infinite;
  }
  @keyframes shimmer { 0%{left:-70%} 55%,100%{left:150%} }
  @keyframes bob { 0%,100%{transform:translate(-50%,0)} 50%{transform:translate(-50%,-4px)} }
  .sparkle { position:absolute; top:-7px; right:-5px; font-size:17px; animation: twinkle 1.4s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:.35; transform:scale(.8) rotate(0deg)} 50%{opacity:1; transform:scale(1.25) rotate(18deg)} }
  .step .labelblock { position:absolute; top:0; right:14px; display:flex; flex-direction:column; justify-content:center; }   /* left + height set inline */
  .step .label { line-height:1.2; }
  .step .label { font-weight:900; font-size:16px; }
  .step.locked .label { color:var(--muted); }
  .step .ls { color:var(--muted); font-size:13px; font-weight:700; margin-top:1px; }
  .step .ls .lstars { font-size:17px; font-weight:900; color:#7a726a; }
  .step .ministars { margin-top:7px; height:22px; display:flex; gap:4px; }
  .ministars .st { font-size:18px; line-height:1; color:#ded8cc; }                       /* unlit */
  .ministars .st.on { color:#ffc12e; text-shadow:0 1px 0 #e08a00, 0 0 7px rgba(255,180,0,.6); } /* lit gold + glow */

  /* GAME */
  .progress { height:14px; background:var(--line); border-radius:999px; overflow:hidden; margin-bottom:26px;}
  .progress > div { height:100%; background:linear-gradient(90deg,var(--gold),var(--primary)); width:0; transition:width .35s; border-radius:999px;}
  .prompt { text-align:center; margin-bottom: 20px; }
  .prompt .q { font-size: 22px; font-weight:900; }
  .prompt .hint { color: var(--muted); margin-top:6px; min-height:20px; font-size:14px; font-weight:700;}
  .display { text-align:center; margin: 10px 0 24px; }
  .display .emoji { font-size: 92px; line-height:1; filter: drop-shadow(0 8px 10px rgba(0,0,0,.12)); }
  .display .word { font-size: 32px; font-weight:900; letter-spacing:.5px; margin-top:12px;}
  .display .hi { color:var(--muted); font-size:17px; margin-top:4px; font-weight:700;}
  .display .say { margin-top:8px; font-size:19px; font-weight:800; }
  .display .say .pron { color:var(--grape); }
  .display .say .meaning { color:var(--muted); font-weight:700; }
  .speakbtn {
    background:var(--grape); color:#fff; border:0; border-radius:14px; padding:12px 18px;
    font-size:15px; font-weight:800; cursor:pointer; display:inline-flex; gap:7px; align-items:center;
    box-shadow: 0 5px 0 var(--grape-d); transition: transform .06s, box-shadow .06s;
  }
  .speakbtn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--grape-d); }
  .options { display:grid; grid-template-columns: repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-top:8px;}
  .opt {
    background:#fff; border:2px solid var(--line); border-radius:16px; padding:18px; font-size:18px; font-weight:800;
    cursor:pointer; transition: transform .06s, box-shadow .06s, border-color .12s;
    display:flex; flex-direction:column; align-items:center; gap:8px; box-shadow:0 4px 0 var(--line);
  }
  .opt .oe { font-size:40px; }
  .opt:hover { border-color:var(--grape); }
  .opt:active { transform: translateY(3px); box-shadow:0 1px 0 var(--line); }
  .opt.correct { border-color:var(--good); color:var(--good-d); background:#eafaf2; box-shadow:0 4px 0 #c6efd9; }
  .opt.wrong { border-color:var(--bad); color:var(--bad-d); background:#fff0f0; box-shadow:0 4px 0 #ffd1d3; }
  .opt.disabled { pointer-events:none; }
  /* Class 1–10 home sections + Quiz activity */
  .sectionhead { font-size:14px; font-weight:900; color:var(--muted); letter-spacing:.04em;
                 text-transform:uppercase; margin:22px 4px 10px; }
  .sectionhead:first-child { margin-top:4px; }
  .quizemoji { font-size:52px; text-align:center; margin:2px 0 14px; line-height:1.1; }
  .quizopts { grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); }
  .opt.quizopt { flex-direction:row; justify-content:center; text-align:center; padding:16px; font-size:17px; }
  /* Sign up */
  .signup, .authform { max-width:440px; margin:0 auto; text-align:left; }
  .authform .searchbox { width:100%; margin:0; }
  .hint2 { color:var(--muted); font-size:12.5px; font-weight:600; margin:6px 2px 0; }
  .consent { display:flex; gap:10px; align-items:flex-start; margin:16px 2px 4px; font-weight:600; font-size:14px; color:var(--ink); cursor:pointer; }
  .consent input { width:20px; height:20px; margin-top:2px; flex:0 0 auto; accent-color:var(--grape); }
  .bandpick { display:flex; flex-wrap:wrap; gap:8px; }
  .bandchip { display:inline-flex; align-items:center; gap:6px; background:#fff; border:2px solid var(--line); border-radius:14px; padding:8px 13px; font-weight:800; font-size:14px; cursor:pointer; color:var(--ink); box-shadow:0 3px 0 var(--line); }
  .bandchip .iconsvg svg { width:1.3em; height:1.3em; }
  .bandchip.sel { border-color:var(--grape); background:#efeaff; box-shadow:0 3px 0 #d9cffb; }
  .seeother { margin-top:2px; }
  [data-theme="dark"] .bandchip { background:#2a2240; color:var(--ink); border-color:var(--line); box-shadow:0 3px 0 #15101f; }
  [data-theme="dark"] .bandchip.sel { background:#39314f; border-color:var(--grape); }
  .signup .searchbox { width:100%; margin:0; }
  .fieldlabel { display:block; font-weight:800; color:var(--muted); font-size:13px; margin:16px 2px 6px; }
  .avpick { display:flex; flex-wrap:wrap; gap:8px; }
  .av { font-size:24px; width:46px; height:46px; border:2px solid var(--line); border-radius:14px; background:#fff;
        cursor:pointer; box-shadow:0 3px 0 var(--line); transition:transform .06s, box-shadow .06s; }
  .av:active { transform:translateY(2px); box-shadow:0 1px 0 var(--line); }
  .av.sel { border-color:var(--grape); background:#efeaff; box-shadow:0 3px 0 #d9cffb; }
  /* Campus roster login — tap-your-name grid */
  .rostergrid { display:grid; grid-template-columns:repeat(auto-fill, minmax(120px,1fr)); gap:12px; margin-top:8px; }
  .rostercard { display:flex; flex-direction:column; align-items:center; gap:6px; background:#fff; border:2px solid var(--line);
        border-radius:16px; padding:14px 10px; cursor:pointer; box-shadow:0 3px 0 var(--line); color:var(--ink); font-weight:800; }
  .rostercard:active { transform:translateY(2px); box-shadow:0 1px 0 var(--line); }
  .rostercard .ra { font-size:34px; line-height:1; }
  .rostercard .rn { font-size:15px; text-align:center; }
  [data-theme="dark"] .rostercard { background:#2a2240; border-color:var(--line); box-shadow:0 3px 0 #15101f; }
  /* "🙋 Help Needed" top-bar button + its confirmation toast */
  .toggle.helpneed { background:var(--grape); color:#fff; border-color:var(--grape); font-weight:900; }
  .toggle.helpneed:hover { filter:brightness(1.06); }
  #hkToast { position:fixed; left:50%; bottom:18px; transform:translateX(-50%); z-index:9999; background:#2c2440; color:#fff;
             border-radius:999px; padding:11px 18px; font-weight:800; font-size:14px; max-width:90%; text-align:center;
             box-shadow:0 6px 20px rgba(0,0,0,.25); transition:opacity .4s; }
  #hkToast.out { opacity:0; }
  .profilebtn.primary, .profilebtn.signup { background:var(--primary); color:#fff; border-color:var(--primary); }
  .profilerow { display:flex; gap:2px; justify-content:center; align-items:center; flex-wrap:wrap; }
  /* Tap-to-hear button — primary-tinted so it reads as "play", distinct from the mute toggle */
  .toggle.hearbtn { background:var(--grape); border-color:var(--grape); }
  .toggle.hearbtn .iconsvg svg, .toggle.hearbtn svg { filter:brightness(0) invert(1); }
  [data-theme="dark"] .toggle.hearbtn { background:var(--grape); border-color:var(--grape); }
  /* "Saved on this device" reassurance chip on the result screen */
  .savechip { display:inline-flex; align-items:center; gap:6px; margin:8px auto 0; background:#eafaf2; color:var(--good-d); border:1px solid #c6efd9; border-radius:999px; padding:5px 13px; font-weight:800; font-size:13px; }
  [data-theme="dark"] .savechip { background:#15341f; border-color:#1e5638; }
  /* Roshni guide strip in the home hero */
  .hero-guide { display:flex; align-items:center; gap:16px; justify-content:center; }
  .hero-guide .roshni { width:62px; height:62px; flex:0 0 auto; }
  .hero-guide .roshni svg { width:100%; height:100%; }
  .hero-guide .herotext { text-align:left; }
  @media(max-width:520px){ .hero-guide{ flex-direction:column; gap:8px; } .hero-guide .herotext{ text-align:center; } }

  /* tiles for spelling / phrase */
  .tray { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; min-height:62px; align-items:center;
          background:var(--bg); border:2px dashed #ddd5c8; border-radius:14px; padding:14px; margin-bottom:14px;}
  .bank { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
  .tile {
    background:#fff; border:2px solid var(--line); border-radius:12px; padding:11px 16px; font-size:19px;
    font-weight:900; cursor:pointer; user-select:none; box-shadow:0 4px 0 var(--line); transition: transform .06s, box-shadow .06s;
  }
  .tile:active { transform: translateY(3px); box-shadow:0 1px 0 var(--line); }
  .tile.placed { background:var(--grape); color:#fff; border-color:var(--grape-d); box-shadow:0 4px 0 var(--grape-d); }
  .teachbox {
    display:flex; gap:8px; align-items:flex-start; max-width:520px; margin:2px auto 12px;
    background:#fff7e6; border:2px solid #ffd86b; border-radius:14px; padding:12px 14px;
    text-align:left; font-size:15px; font-weight:700; color:#5b4a1a; line-height:1.5;
  }
  .teachbox i { color:#7a6a3a; font-weight:600; }
  .opt .optHi { display:block; font-size:13px; font-weight:600; opacity:.7; margin-top:3px; }
  .bugline { display:flex; flex-wrap:wrap; gap:8px 6px; justify-content:center; align-items:center;
    max-width:520px; margin:14px auto 16px; font-size:21px; line-height:1.8; }
  .bugword { padding:4px 10px; border-radius:10px; border:2px solid transparent; cursor:pointer;
    user-select:none; transition:background .1s, transform .06s; }
  .bugword:hover { background:#fff3f2; }
  .bugword:active { transform:translateY(2px); }
  .bugword.fixed { background:var(--good,#2ec27e); color:#fff; border-color:var(--good-d,#25a36a); font-weight:900; }
  .bugword.shake { animation:shakeX .35s; background:#ffe3e0; }
  @keyframes shakeX { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  .email { max-width:520px; margin:6px auto 12px; background:#fff; border:2px solid var(--line);
    border-radius:14px; padding:14px 16px; text-align:left; box-shadow:0 4px 0 var(--line); transition:transform .5s, opacity .5s; }
  .email .erow { padding:5px 0; font-size:16px; border-bottom:1px dashed #eee; }
  .email .erow:last-child { border-bottom:0; }
  .email .elabel { font-weight:900; color:var(--grape,#6c5ce7); margin-right:6px; }
  .email .esig { font-style:italic; color:#666; padding-top:8px; }
  .eslot.set { font-weight:700; }
  .eslot.bad { background:#ffe3e0; border-radius:6px; padding:0 4px; }
  .eplace { color:#aaa; font-weight:600; }
  .email.sent { transform:translateY(-40px) scale(.9); opacity:0; }
  .eopts { display:flex; flex-direction:column; gap:10px; max-width:520px; margin:0 auto; }
  .optgroup { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .oglabel { width:100%; font-size:12px; font-weight:900; color:#999; text-transform:uppercase; letter-spacing:.5px; }
  .echip { background:#fff; border:2px solid var(--line); border-radius:10px; padding:8px 12px; font-size:15px;
    font-weight:700; cursor:pointer; box-shadow:0 3px 0 var(--line); }
  .echip small { display:block; font-size:12px; font-weight:600; opacity:.65; }
  .echip.sel { background:var(--grape,#6c5ce7); color:#fff; border-color:var(--grape-d,#5a4bd4); box-shadow:0 3px 0 var(--grape-d,#5a4bd4); }
  .codeblock {
    background:#1e1e2e; color:#e6e6f0; border-radius:14px; padding:16px 18px; margin:6px auto 14px;
    max-width:520px; font-family:"SF Mono",Menlo,Consolas,monospace; font-size:17px; line-height:1.7;
    white-space:pre; overflow-x:auto; text-align:left; box-shadow:0 4px 0 #15151f;
  }
  .codeblock .blank {
    display:inline-block; min-width:74px; text-align:center; padding:0 8px; border-radius:8px;
    background:#3a3a52; color:#ffd86b; border:2px dashed #6c6c8a; font-weight:900;
  }
  .codeblock .blank.filled { background:var(--grape,#6c5ce7); color:#fff; border-style:solid; border-color:var(--grape-d,#5a4bd4); }
  .feedback { text-align:center; font-size:16px; font-weight:900; min-height:24px; margin-top:10px;}
  .feedback.good { color:var(--good-d); }
  .feedback.bad { color:var(--bad-d); }
  .actionrow { display:flex; gap:12px; justify-content:center; margin-top:22px; flex-wrap:wrap;}
  .btn { border:0; border-radius:14px; padding:14px 26px; font-size:16px; font-weight:900; cursor:pointer;
         background:#fff; color:var(--ink); box-shadow:0 5px 0 var(--line); transition: transform .06s, box-shadow .06s; }
  .btn:active { transform: translateY(3px); box-shadow:0 2px 0 var(--line); }
  .btn.primary { background:var(--primary); color:#fff; box-shadow:0 5px 0 var(--primary-d); }
  .btn.primary:active { box-shadow:0 2px 0 var(--primary-d); }
  .btn.ghost { background:#fff; color:var(--ink); }
  .btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }

  /* consistent layout: content fills, primary action pinned to a bottom bar */
  .gameplay { display:flex; flex-direction:column; min-height:520px; }
  .gamebody { flex:1; }
  .gamefooter { margin:20px -28px -30px; padding:16px 28px; border-top:1px solid var(--line);
                display:flex; justify-content:flex-end; align-items:center; gap:12px; }
  .gamefooter:empty { display:none; }
  /* audio is a secondary, content-attached affordance, not a primary button */
  .wordrow { display:flex; align-items:center; justify-content:center; gap:12px; margin-top:12px; }
  .wordrow .word { margin-top:0; }
  .speakchip { width:46px; height:46px; border-radius:50%; border:0; background:var(--grape); color:#fff;
               font-size:18px; cursor:pointer; flex:0 0 auto;
               box-shadow:0 4px 0 var(--grape-d); transition:transform .06s, box-shadow .06s; }
  .speakchip:active { transform:translateY(3px); box-shadow:0 1px 0 var(--grape-d); }
  .emoji.tap-emoji { cursor:pointer; }

  /* conversation */
  .chat { display:flex; flex-direction:column; gap:10px; margin-bottom:18px; }
  .bubble { max-width:80%; padding:12px 15px; border-radius:18px; font-size:16px; line-height:1.4; font-weight:700;}
  .bubble.them { background:#f1edff; align-self:flex-start; border-bottom-left-radius:4px;}
  .bubble.me { background:var(--grape); color:#fff; align-self:flex-end; border-bottom-right-radius:4px;}
  .bubble small { display:block; opacity:.7; font-size:12px; margin-top:4px; font-weight:600;}

  /* MASCOT — Roshni, the guide */
  .mascotrow { display:flex; align-items:center; gap:14px; margin-bottom:24px; }
  .mascot { width:96px; flex:0 0 auto; transform-origin:center bottom; animation: float 3s ease-in-out infinite; }
  .mascot svg { width:100%; height:auto; display:block; overflow:visible; }
  .mascot.big { width:150px; margin:0 auto 4px; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  .mascot.m-happy { animation: hop .55s ease; }
  @keyframes hop { 0%{transform:translateY(0)} 30%{transform:translateY(-16px)} 55%{transform:translateY(0)} 78%{transform:translateY(-7px)} 100%{transform:translateY(0)} }
  .mascot.m-sad { animation:none; transform: rotate(-5deg); }
  body.speaking .mascot { animation: nod .45s ease-in-out infinite; }
  @keyframes nod { 0%,100%{transform:rotate(-2.5deg)} 50%{transform:rotate(2.5deg)} }
  .lid { transform-box: fill-box; transform-origin:center; animation: blink 4.5s infinite; }
  @keyframes blink { 0%,93%,100%{transform:scaleY(0)} 96%{transform:scaleY(1)} }
  .m-open, .m-frown { display:none; }
  .mascot.m-happy .m-smile { display:none; }  .mascot.m-happy .m-open { display:block; }
  .mascot.m-sad .m-smile { display:none; }    .mascot.m-sad .m-frown { display:block; }
  .bubble2 { position:relative; background:#fff; border:2px solid var(--line); border-radius:18px;
             padding:14px 18px; box-shadow:0 4px 0 var(--line); flex:1; }
  .bubble2::before { content:""; position:absolute; left:-9px; top:50%; margin-top:-9px; width:16px; height:16px;
             background:#fff; border-left:2px solid var(--line); border-bottom:2px solid var(--line); transform:rotate(45deg); }
  .bubble2 .q { font-weight:900; font-size:19px; }
  .bubble2 .hint { color:var(--muted); font-size:13px; margin-top:4px; font-weight:700; }
  .hiLine { margin-top:8px; color:var(--grape); font-weight:800; font-size:15px;
            border-top:1px dashed var(--line); padding-top:7px; display:flex; align-items:center; gap:6px; }

  /* RESULT */
  .result { text-align:center; padding: 36px 10px; }
  .result .big { font-size:70px;}
  .result h2 { font-size:28px; font-weight:900; margin:12px 0 4px;}
  .result .earn { font-size:40px; letter-spacing:6px; color:var(--gold); margin:14px 0;}
  @keyframes pop { 0%{transform:scale(.5); opacity:0} 70%{transform:scale(1.15)} 100%{transform:scale(1); opacity:1} }
  .pop { animation: pop .4s cubic-bezier(.2,1.4,.4,1); }
  .center { text-align:center; }
  .muted { color: var(--muted); font-weight:700; }

  /* LOGIN / student picker */
  .chiptab { background:#fff; border:2px solid var(--line); border-radius:999px; padding:7px 14px; margin:3px;
             font-weight:800; font-size:14px; cursor:pointer; color:var(--ink); }
  .chiptab.on { background:var(--grape); color:#fff; border-color:var(--grape-d); }
  .searchbox { width:min(440px,92%); font-size:17px; font-weight:700; padding:13px 18px; margin:0 auto 16px;
               display:block; border:2px solid var(--line); border-radius:14px; box-shadow:0 4px 0 var(--line); }
  .searchbox:focus { outline:none; border-color:var(--grape); }
  .searchbox::placeholder { color:var(--muted); font-weight:600; }
  .pinov { position:fixed; inset:0; background:rgba(44,36,64,.45); display:grid; place-items:center; z-index:9999; }
  .pincard { background:#fff; border-radius:20px; padding:26px 28px; width:min(320px,90%); text-align:center;
             box-shadow:0 20px 50px rgba(0,0,0,.3); }
  .pincard .big { font-size:54px; }
  .pinname { font-weight:900; font-size:20px; margin-top:4px; }
  .pinlabel { color:var(--muted); font-weight:700; margin:10px 0 8px; }
  .pininput { width:100%; font-size:28px; text-align:center; letter-spacing:8px; padding:10px;
              border:2px solid var(--line); border-radius:12px; font-weight:900; }
  .pininput:focus { outline:none; border-color:var(--grape); }
  .profilebtn { display:inline-block; white-space:nowrap; background:#fff; border:2px solid var(--line);
                border-radius:999px; padding:8px 16px; font-weight:800; font-size:14px; cursor:pointer; color:var(--ink); }
  .profilebtn:hover { border-color:var(--grape); }

  /* ===== Audit fixes: accessibility + responsive ===== */
  /* Visible keyboard focus on the coloured buttons/tiles — white halo so it reads on any gradient */
  .theme:focus-visible, .node:focus-visible, .opt:focus-visible, .btn:focus-visible, .tile:focus-visible,
  .backbtn:focus-visible, .av:focus-visible, .chiptab:focus-visible, .toggle:focus-visible, .pill:focus-visible,
  .profilebtn:focus-visible, .speakbtn:focus-visible, .speakchip:focus-visible, .echip:focus-visible,
  .bugword:focus-visible, .tap-emoji:focus-visible {
    outline:3px solid var(--ink); outline-offset:3px; box-shadow:0 0 0 6px #fff; }
  .searchbox:focus-visible, .pininput:focus-visible { outline:3px solid var(--grape); outline-offset:2px; }
  /* Don't rely on colour alone for right/wrong (WCAG 1.4.1) */
  .opt.correct::after { content:" ✓"; font-weight:900; }
  .opt.wrong::after   { content:" ✗"; font-weight:900; }
  /* 44px+ touch targets on touch devices */
  @media (pointer:coarse){
    .toggle, .pill, .chiptab, .profilebtn, .backbtn, .echip { min-height:44px; display:inline-flex; align-items:center; justify-content:center; }
    .bugword { padding:9px 12px; }
    .bugline { gap:10px 8px; }
  }
  /* Top bar wraps instead of clipping its controls on narrow phones */
  .topbar { flex-wrap:wrap; }
  .stats { flex-wrap:wrap; row-gap:6px; justify-content:flex-end; }
  @media (max-width:430px){
    .topbar { padding:10px 12px; }
    .pill, .toggle { padding:5px 9px; font-size:12px; }
    .step .labelblock { right:8px; }
  }
  /* Long trail labels wrap rather than clip */
  .step .label { white-space:normal; overflow-wrap:break-word; }
  /* Darken decorative greys that failed contrast */
  .eplace { color:#6f6886; }
  .oglabel { color:#6f6886; }
  /* Respect reduced-motion preference */
  @media (prefers-reduced-motion: reduce){
    * { animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; scroll-behavior:auto !important; }
  }
  /* Screen-reader-only live region */
  .visually-hidden { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0; }
  /* Inline SVG icons (replace emoji on cards/headers); scale with the surrounding font-size */
  .iconsvg { display:inline-flex; align-items:center; justify-content:center; line-height:0; vertical-align:middle; }
  .iconsvg svg { width:1em; height:1em; display:block; }
  .theme .big .iconsvg svg { width:46px; height:46px; }
  .maphead h2 .iconsvg svg { width:30px; height:30px; }
</style>
</head>

<div id="shell">
  <div id="topnav"></div>
  <div id="app">

      <div class="brand"><span class="logo" id="brandLogo">🪔</span> <span id="appName">Hikmat</span></div>

        <button class="toggle helpneed" id="helpNeedBtn" title="Help Needed / मदद चाहिए">🙋 Help</button>

    <div id="root"></div>
    <div id="sr" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>
  </div>
</div>

const VOICE_PREF = {

       "Microsoft Zira - English (United States)","Karen","Daniel","Aria","Zira"],
  hi: ["Google हिन्दी","Lekha","Microsoft Swara Online (Natural) - Hindi (India)","Kiyara","Hindi (India)"],

  for(const name of (VOICE_PREF[want] || [])){

function playNext(){

  if(item.gap && !item._waited){ item._waited = true; setTimeout(playNext, item.gap); return; }
  speechQ.shift();
  speaking = true;
  try { speechSynthesis.speak(buildUtterance(item.text, item.lang, item.rate)); speechSynthesis.resume(); }
  catch(e){ speaking = false; showAudioHint(); return; }

// are gentle, never punishing; finishing plays a signature flourish.
let _actx = null;
function audioCtx(){
  if(state.sound === false) return null;
  try {
    if(!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();

  const t = ac.currentTime + 0.04 + startIn;   // lookahead so a just-woken context doesn't clip the attack

  const H = TOP + N * ROW + 14;
  wrap.style.height = H + "px";
  const pts = items.map((_, i) => ({ x: CX + Math.round(AMP * Math.sin(i * Math.PI / 3)), y: TOP + i * ROW + NR }));
  let d = "";
  pts.forEach((p, i) => {
    if(i === 0){ d += "M " + p.x + " " + p.y; }
    else { const q = pts[i-1], my = ((q.y + p.y) / 2).toFixed(1); d += " C " + q.x + " " + my + " " + p.x + " " + my + " " + p.x + " " + p.y; }
  });
  const W = CX + NR + AMP + 8;
  wrap.insertAdjacentHTML("beforeend",
    `<svg class="cpath" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" fill="none">
       <path d="${d}" stroke="var(--line)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
     </svg>`);
  items.forEach((it, i) => {
    const p = pts[i];
    const shape = NODE_SHAPES[i % NODE_SHAPES.length];
    const step = el(`<div class="step ${it.cls||''}" style="top:${TOP + i*ROW}px; height:${D}px">
      <button class="node" style="left:${p.x - NR}px; width:${D}px; height:${D}px; border-radius:${shape}">${it.face}<span class="num">${i+1}</span>${it.extras||""}</button>
      <div class="labelblock" style="left:${p.x + NR + LABELGAP}px; height:${D}px">
        <div class="label">${esc(it.label)}</div>
        <div class="ls">${it.sub||""}</div>
        ${it.starsHtml ? `<div class="ministars">${it.starsHtml}</div>` : ""}
      </div>
    </div>`);
    if(it.onClick) step.querySelector(".node").onclick = it.onClick;
    wrap.appendChild(step);
  });
}

// ---------- Milestone "belt" gates ----------
// Thresholds come from the backend (SETTINGS.milestones) so detection works OFFLINE;
// clearing is server-authoritative: a facilitator marks the Evaluation "Passed" in Desk
// and it syncs down as state.gates via get_progress. Belts are measured in GEMS 💎
// (state.coins ≡ the server's SUM of attempt coins) — gems keep growing on replays, so
// practice counts toward the next belt. Soft-hard lock: NEW lessons (zero stars) are
// locked while a gate is pending, but everything already played stays replayable —
// she's never left idle waiting for her evaluation.
function sortedMilestones(){ return (SETTINGS.milestones||[]).slice().sort((a,b)=>a.threshold-b.threshold); }
function gateStatus(key){ return ((state.gates||{})[key]) || ""; }
function activeGate(){
  const t = state.coins || 0;
  for(const m of sortedMilestones()){
    if(t >= m.threshold && gateStatus(m.key) !== "Passed") return m;
  }
  return null;
}
// milestone newly crossed by going from prevGems → newGems 💎 (for the celebration)
function crossedMilestone(prevGems, newGems){
  return sortedMilestones().find(m => prevGems < m.threshold && newGems >= m.threshold) || null;
}
function gateGate(course, lesson, back){
  const m = activeGate();
  if(!m) return true;
  if(lessonEarned(course.key, lesson.key) > 0) return true;   // already-played lesson → replay freely
  renderGateWall(m, () => renderTrack(course, back));
  return false;
}
function renderGateWall(m, backFn){
  stopSpeech(); rerender = () => renderGateWall(m, backFn);
  root.innerHTML = "";
  setBack(tx("← Back","← वापस"), backFn || renderHome);
  const title = esc(tx(m.title, m.titleHi || m.title));

    </div>
  </div>`));
  const narr = tx("Wonderful! You reached the "+m.title+". Your teacher will evaluate you, then new lessons open. Until then you can practice earlier lessons.",
                  "बहुत बढ़िया! तुम "+(m.titleHi||m.title)+" तक पहुँच गई। टीचर तुम्हारी जाँच करेंगी, फिर नए पाठ खुलेंगे। तब तक पुराने पाठ दोहरा सकती हो।");
  setNarration(narr, narr);
  $("#gateReplay").onclick = () => { sfx.tap(); (backFn || renderHome)(); };

    if(activeGate() && activeGate().key === m.key){
      flashToast(tx("Not cleared yet — ask your teacher 💛","अभी जाँच बाकी है — टीचर से पूछो 💛"));
    } else { sfx.complete(); (backFn || renderHome)(); }

}

function renderTrack(course, back){
  back = back || { label: tx("← Home","← घर"), fn: renderHome };
  stopSpeech();
  rerender = () => renderTrack(course, back);
  root.innerHTML = "";
  const s = el(`<div class="screen">
    <div class="maphead">
      <div><h2>${iconFor(["track:"+course.key, "subject:"+course.subject], course.icon)} ${esc(tx(course.title, course.titleHi))}</h2>
      <div class="sub">${tx("Choose a lesson","कोई पाठ चुनो")}</div></div>
    </div>
    <div class="path" id="path"></div>
  </div>`);
  root.appendChild(s);
  setBack(back.label, back.fn);
  setNarration(tx(course.title,course.titleHi)+". "+tx("Choose a lesson.","कोई पाठ चुनो।"), tx(course.title,course.titleHi)+". "+tx("Choose a lesson.","कोई पाठ चुनो।"));
  const wrap = $("#path");
  // a lesson is "complete" (green) once every one of its activities has at least 1 star
  const isComplete = ls => levelsFor(ls).every(lv => getStars(course.key, ls.key, lv.id) > 0);
  const firstIncomplete = course.lessons.findIndex(ls => !isComplete(ls));
  const items = course.lessons.map((ls, i) => {
    const earned = lessonEarned(course.key, ls.key);
    const done = isComplete(ls);
    const cls = done ? "done" : (i===firstIncomplete ? "current" : "");
    return {
      cls,
      face: done ? "✓" : "📚",
      extras: cls==="current" ? `<span class="starttag">${tx("START","शुरू")}</span><span class="sparkle">✨</span>` : "",
      label: tx(ls.title, ls.titleHi),
      sub: `<span class="lstars"><span class="staricon">★</span> ${earned}/${lessonMax(ls)}</span>`,
      onClick: () => { if(!guestGate(course, ls, back)) return; if(!gateGate(course, ls, back)) return; sfx.enter(); renderLessonMap(course, ls, back); },
    };
  });
  renderPath(items);
  refreshTop();
}

// LESSON screen — the 5 activities (the vertical path) for one lesson
function renderLessonMap(course, lesson, back){
  stopSpeech();
  rerender = () => renderLessonMap(course, lesson, back);
  root.innerHTML = "";
  const s = el(`<div class="screen">
    <div class="maphead">
      <div><h2>${esc(tx(lesson.title, lesson.titleHi))}</h2>
      <div class="sub">${tx("Climb the path — finish a stall to open the next","रास्ते पर चढ़ो — हर पड़ाव पूरा करके अगला खोलो")}</div></div>
    </div>
    <div class="path" id="path"></div>
  </div>`);
  root.appendChild(s);
  setBack("← " + tx(course.title, course.titleHi), () => renderTrack(course, back));
  setNarration(tx(lesson.title,lesson.titleHi)+". "+tx("Tap a step to start.","शुरू करने के लिए किसी पड़ाव पर टैप करो।"), tx(lesson.title,lesson.titleHi)+". "+tx("Tap a step to start.","शुरू करने के लिए किसी पड़ाव पर टैप करो।"));
  const wrap = $("#path");
  const ck = course.key, lk = lesson.key;
  const LV = levelsFor(lesson);
  let currentIdx = LV.findIndex((lv,i)=> getStars(ck,lk,lv.id)===0 && (i===0 || getStars(ck,lk,LV[i-1].id)>0) );
  const items = LV.map((lv, i) => {
    const earned = getStars(ck,lk,lv.id);
    const unlocked = i===0 || getStars(ck,lk,LV[i-1].id) > 0;
    const cls = !unlocked ? "locked" : (i===currentIdx ? "current" : (earned>0 ? "done" : ""));
    return {
      cls,
      face: !unlocked ? "🔒" : (earned>0 ? "✓" : lv.ico),
      extras: cls==="current" ? `<span class="starttag">${tx("START","शुरू")}</span><span class="sparkle">✨</span>` : "",
      label: tx(lv.name, lv.nameHi),
      sub: tx(lv.sub, lv.subHi),
      starsHtml: cls!=="locked" ? starRow(earned) : "",
      onClick: unlocked
        ? (() => { sfx.enter(); startLevel(course, lesson, lv, back); })
        : (() => { sfx.locked(); sayHi("पहले पिछला स्तर पूरा करें"); }),
    };
  });
  renderPath(items);
  refreshTop();
}

// ---------- Level runner ----------
function startLevel(course, lesson, lv, back){
  const rounds = buildRounds(lv, lesson);
  let idx = 0, score = 0;
  actStart(course, lesson, lv);                                        // dwell clock starts
  if(getStars(course.key, lesson.key, lv.id) > 0) logTool("replay");   // she's back for practice
  const backToLesson = () => { actEnd(false); renderLessonMap(course, lesson, back); };
  const backLbl = "← " + tx(lesson.title, lesson.titleHi);
  setBack(backLbl, backToLesson);
  rerender = runRound;   // language toggle re-renders the current round in place
  runRound();

  function header(){
    return `<div class="screen gameplay">
      <div class="maphead">
        <div><div style="font-weight:800;font-size:20px">${lv.ico} ${tx(lv.name, lv.nameHi)}</div></div>
      </div>
      <div class="progress"><div id="bar" style="width:${(idx/rounds.length)*100}%"></div></div>
      <div id="body" class="gamebody"></div>
      <div class="gamefooter" id="footer"></div>
    </div>`;
  }
  function mount(bodyHTML){
    clearAnnounce();
    doubtCtx = { course, lesson, lv, idx };   // Layer 1/2: what the girl is looking at right now
    root.innerHTML="";
    root.appendChild(el(header()));
    setBack(backLbl, backToLesson);
    $("#body").innerHTML = bodyHTML;
    const bar=$("#bar"); if(bar && bar.parentElement){ const pb=bar.parentElement; pb.setAttribute("role","progressbar"); pb.setAttribute("aria-valuemin","0"); pb.setAttribute("aria-valuemax",String(rounds.length)); pb.setAttribute("aria-valuenow",String(idx)); }
    moveFocusToTop();   // land focus on the new question, not <body>
  }
  function next(correct){
    if(correct){ score++; state.coins += 5; }
    idx++; save(); refreshTop();
    if(idx>=rounds.length) finish();
    else runRound();
  }
  // one line per wrong pick → the facilitator's "Hardest Questions" report
  function logWrong(question, chosen, answer){
    recordEvent({ kind:"wrong_answer", track:course.key, lesson:lesson.key, activity:lv.id,
                  question:String(question||"").slice(0,140),
                  chosen:String(chosen||"").slice(0,140),
                  answer:String(answer||"").slice(0,140) });
  }
  function runRound(){
    const r = rounds[idx];
    if(lv.type==="learn")  return roundLearn(r);
    if(lv.type==="listen") return roundListen(r);
    if(lv.type==="spell")  return roundSpell(r);
    if(lv.type==="phrase") return roundPhrase(r);
    if(lv.type==="talk")   return roundTalk(r);
    if(lv.type==="quiz")   return roundQuiz(r);
    if(lv.type==="code")   return roundCode(r);
    if(lv.type==="fix")    return roundFix(r);
    if(lv.type==="email")  return roundEmail(r);
  }

  // --- LEARN: flashcard, see + hear + Hindi, then "Got it"
  function roundLearn(it){
    mount(`${head(tx("What is this?","ये क्या है?"), tx("Tap the word or picture to hear it 🔊","शब्द या तस्वीर पर छूकर सुनो 🔊"), "ये क्या है? सुनो और दोहराओ।")}
      <div class="display">
        <div class="emoji pop tap-emoji" id="emojiBtn">${esc(it.emoji)}</div>
        <div class="wordrow"><span class="word">${esc(it.en)}</span>
          <button class="speakchip" id="say" title="Hear it">🔊</button></div>
        <div class="say"><span class="pron">${esc(it.pron)}</span> · <span class="meaning">${esc(it.hi)}</span></div>
      </div>`);
    setFooter(`<button class="btn primary" id="next">${tx("Got it →","समझ गई →")}</button>`);
    $("#say").onclick = () => speak(it.en);
    $("#emojiBtn").onclick = () => speak(it.en);
    $("#next").onclick = () => { sfx.next(); next(true); };
    announce(() => { speak(it.en); sayHi("ये है " + it.hi); });
  }

  // --- LISTEN: hear English, choose the right picture
  function roundListen(r){
    mount(`${head(tx("Tap what you hear 👂","जो सुनो उसे चुनो 👂"), tx("Press the speaker to hear it again","फिर सुनने के लिए स्पीकर दबाओ"),"जो शब्द सुनो, उसकी तस्वीर चुनो।")}
      <div class="center"><button class="speakbtn" id="say">🔊 ${tx("Play word","शब्द सुनो")}</button></div>
      <div class="options" id="opts"></div>
      <div class="feedback" id="fb"></div>`);
    $("#say").onclick = () => speak(r.answer.en);
    announce(() => speak(r.answer.en));
    const opts = $("#opts");
    r.choices.forEach(c => {
      const b = el(`<button class="opt" data-en="${escAttr(c.en)}"><span class="oe">${esc(c.emoji)}</span><span>${esc(c.en)}</span></button>`);
      b.onclick = () => {
        const correct = c.en===r.answer.en;
        document.querySelectorAll(".opt").forEach(o=>o.classList.add("disabled"));
        b.classList.add(correct?"correct":"wrong");
        setMood(correct?"happy":"sad");
        (correct?sfx.correct:sfx.wrong)();
        const fb=$("#fb");
        if(correct){ fb.textContent=tx("Correct! 🎉","सही! 🎉"); fb.className="feedback good"; }
        else { logWrong(r.answer.en, c.en, r.answer.en);
               fb.textContent=tx("Try to remember: ","याद रखो: ")+r.answer.en; fb.className="feedback bad";
               document.querySelectorAll(".opt").forEach(o=>{ if(o.dataset.en===r.answer.en) o.classList.add("correct"); }); }
        setTimeout(()=>next(correct), correct?900:1600);
      };
      opts.appendChild(b);
    });
  }

  // --- SPELL: show picture, build word from letter tiles
  function roundSpell(it){
    const letters = shuffle(it.en.split(""));
    mount(`${head(tx("Spell the word","शब्द लिखो"), tx("Tap the letters in order","अक्षरों को सही क्रम में छुओ"),"अक्षरों को सही क्रम में लगाओ।")}
      <div class="display"><div class="emoji">${esc(it.emoji)}</div><div class="hi">${esc(it.hi)}</div></div>
      <div class="center" style="margin-bottom:10px"><button class="speakbtn" id="say">🔊 ${tx("Hear it","सुनो")}</button></div>
      <div class="tray" id="tray"></div>
      <div class="bank" id="bank"></div>
      <div class="feedback" id="fb"></div>`);
    setFooter(`<button class="btn ghost" id="clear">${tx("Clear","मिटाओ")}</button>
      <button class="btn primary" id="check" disabled>${tx("Check","जाँचो")}</button>`);
    $("#say").onclick=()=>speak(it.en);
    announce(() => speak(it.en));
    const tray=$("#tray"), bank=$("#bank");
    let built=[];
    function redraw(){
      tray.innerHTML=""; bank.innerHTML="";
      built.forEach((ch,i)=>{ const t=el(`<button type="button" class="tile placed">${esc(ch)}</button>`); t.onclick=()=>{built.splice(i,1);redraw();}; tray.appendChild(t); });
      remaining().forEach((ch,i)=>{ const t=el(`<button type="button" class="tile">${esc(ch)}</button>`); t.onclick=()=>{built.push(ch);sfx.tap();redraw();}; bank.appendChild(t); });
      $("#check").disabled = built.length!==it.en.length;
    }
    function remaining(){ const used={}; built.forEach(c=>used[c]=(used[c]||0)+1); const out=[]; const tmp={...used};
      letters.forEach(c=>{ if(tmp[c]){tmp[c]--;} else out.push(c); }); return out; }
    $("#clear").onclick=()=>{built=[];redraw();};
    $("#check").onclick=()=>{
      const ok = built.join("")===it.en;
      setMood(ok?"happy":"sad");
      (ok?sfx.correct:sfx.wrong)();
      const fb=$("#fb");
      if(ok){ fb.textContent=tx("Perfect! ⭐","बढ़िया! ⭐"); fb.className="feedback good"; speak(it.en); setTimeout(()=>next(true),1000); }
      else { logWrong(it.en, built.join(""), it.en);
             fb.textContent=tx("Not yet — the word is ","अभी नहीं — शब्द है ")+"\""+it.en+"\""; fb.className="feedback bad"; setTimeout(()=>next(false),1700); }
    };
    redraw();
  }

  // --- PHRASE: arrange word tiles into a sentence
  function roundPhrase(r){
    const words = shuffle(r.words.slice());
    mount(`${head(tx("Make the sentence","वाक्य बनाओ"), tx("Put the words in the right order","शब्दों को सही क्रम में लगाओ"), r.hintHi)}
      <div class="display"><div class="emoji">${esc(r.emoji)}</div></div>
      <div class="tray" id="tray"></div>
      <div class="bank" id="bank"></div>
      <div class="feedback" id="fb"></div>`);
    setFooter(`<button class="btn ghost" id="clear">${tx("Clear","मिटाओ")}</button>
      <button class="btn primary" id="check" disabled>${tx("Check","जाँचो")}</button>`);
    announce(() => sayHi(r.hintHiSpoken));
    const tray=$("#tray"), bank=$("#bank");
    let built=[];
    function redraw(){
      tray.innerHTML=""; bank.innerHTML="";
      built.forEach((w,i)=>{ const t=el(`<button type="button" class="tile placed">${esc(w)}</button>`); t.onclick=()=>{built.splice(i,1);redraw();}; tray.appendChild(t); });
      remaining().forEach(w=>{ const t=el(`<button type="button" class="tile">${esc(w)}</button>`); t.onclick=()=>{built.push(w);sfx.tap();redraw();}; bank.appendChild(t); });
      $("#check").disabled = built.length!==r.words.length;
    }
    function remaining(){ const used={}; built.forEach(w=>used[w]=(used[w]||0)+1); const out=[]; const tmp={...used};
      words.forEach(w=>{ if(tmp[w]){tmp[w]--;} else out.push(w); }); return out; }
    $("#clear").onclick=()=>{built=[];redraw();};
    $("#check").onclick=()=>{
      const ok = built.join(" ")===r.words.join(" ");
      setMood(ok?"happy":"sad");
      (ok?sfx.correct:sfx.wrong)();
      const fb=$("#fb");
      if(ok){ fb.textContent=tx("Great sentence! 🎉","बढ़िया वाक्य! 🎉"); fb.className="feedback good"; speak(r.words.join(" ")); setTimeout(()=>next(true),1200); }
      else { logWrong(r.words.join(" "), built.join(" "), r.words.join(" "));
             fb.textContent=tx("Right answer: ","सही जवाब: ")+'"'+r.words.join(" ")+'"'; fb.className="feedback bad"; speak(r.words.join(" ")); setTimeout(()=>next(false),2000); }
    };
    redraw();
  }

  // --- TALK: speaker says a line, you choose the right reply
  function roundTalk(r){
    mount(`${head(tx("🗣️ Conversation","🗣️ बातचीत"), tx("Choose the best reply","सही जवाब चुनो"),"बातचीत — सही जवाब चुनो।")}
      <div class="chat" id="chat"></div>
      <div class="options" id="opts"></div>
      <div class="feedback" id="fb"></div>`);
    const chat=$("#chat");
    chat.appendChild(el(`<div class="bubble them">${esc(r.who||"🙂")} ${esc(r.line)}<small>${state.hindi?esc(r.lineHi):""}</small></div>`));
    // first question speaks right away; later ones wait for the previous response to finish, then pause ~2s
    if(idx===0) announce(() => speak(r.line));
    else speak(r.line, "en", { queue:true, gap:2000 });
    const opts=$("#opts");
    let answered=false;
    shuffle(r.replies).forEach(rep=>{
      const gloss = (state.hindi && rep.textHi) ? `<small class="optHi">${esc(rep.textHi)}</small>` : "";
      const b=el(`<button class="opt" style="font-size:17px">${esc(rep.text)}${gloss}</button>`);
      b.onclick=()=>{
        if(answered) return;
        speak(rep.text);
        const fb=$("#fb");
        if(rep.ok){
          answered=true;
          document.querySelectorAll(".opt").forEach(o=>o.classList.add("disabled"));
          b.classList.add("correct");
          chat.appendChild(el(`<div class="bubble me">${esc(rep.text)}</div>`));
          setMood("happy");
          sfx.correct();
          fb.textContent=tx("Nice reply! 🎉","बढ़िया जवाब! 🎉"); fb.className="feedback good";
          // speaker replies, then let the player continue at their own pace
          setTimeout(()=>{
            chat.appendChild(el(`<div class="bubble them">${esc(r.who||"🙂")} ${esc(r.then)}</div>`));
            speak(r.then, "en", { queue:true, gap:500 });   // play after the reply finishes, don't cut it
            setFooter(`<button class="btn primary" id="next">${tx("Continue →","आगे बढ़ो →")}</button>`);
            $("#next").onclick = () => { sfx.next(); next(true); };
          }, 1000);
        } else {
          // wrong: gentle nudge, let them try again — no rushing ahead
          logWrong(r.line, rep.text, ((r.replies.find(x=>x.ok))||{}).text);
          b.classList.add("wrong");
          setMood("sad");
          sfx.wrong();
          fb.textContent=tx("Not quite — try again.","बिल्कुल नहीं — फिर कोशिश करो।"); fb.className="feedback bad";
          setTimeout(()=>{ b.classList.remove("wrong"); fb.textContent=""; }, 1200);
        }
      };
      opts.appendChild(b);
    });
  }

  // --- CODE: fill the blank in a Python snippet (offline, no execution — token match)
  function roundCode(r){
    let filled = null;
    const codeText = (r.lines ? r.lines.join("\n") : (r.code || ""));
    if(!Array.isArray(r.choices) || !r.choices.includes(r.answer)) return next(true);  // malformed content → skip, never trap the child
    const teachMain = tx(r.teach, r.teachHi || r.teach);
    const teachAlt = (state.hindi && state.lang !== "hi" && r.teachHi) ? `<br><i>${esc(r.teachHi)}</i>` : "";
    mount(`${head(tx("💻 Complete the code","💻 कोड पूरा करो"), tx(r.prompt, r.promptHi || r.prompt), r.promptHi)}
      ${r.teach ? `<div class="teachbox">💡 <span>${esc(teachMain)}${teachAlt}</span></div>` : ""}
      <pre class="codeblock" id="code"></pre>
      <div class="bank" id="bank"></div>
      <div class="feedback" id="fb"></div>`);
    setFooter(`<button class="btn ghost" id="clear">${tx("Clear","मिटाओ")}</button>
      <button class="btn primary" id="check" disabled>${tx("Check","जाँचो")}</button>`);
    announce(() => { speak(tx(r.prompt, r.promptHi || r.prompt), state.lang==="hi" ? "hi" : "en"); });
    const codeEl=$("#code"), bank=$("#bank");
    function renderCode(){
      const i = codeText.indexOf("___");
      const a = esc(codeText.slice(0, i)), b = esc(codeText.slice(i+3));
      codeEl.innerHTML = a + `<span class="blank ${filled?"filled":""}">${filled?esc(filled):"______"}</span>` + b;
      $("#check").disabled = !filled;
    }
    shuffle(r.choices).forEach(c=>{
      const t=el(`<button type="button" class="tile">${esc(c)}</button>`);
      t.onclick=()=>{ filled=c; sfx.tap(); renderCode(); };
      bank.appendChild(t);
    });
    $("#clear").onclick=()=>{ filled=null; renderCode(); };
    $("#check").onclick=()=>{
      const ok = filled===r.answer;
      setMood(ok?"happy":"sad");
      (ok?sfx.correct:sfx.wrong)();
      const fb=$("#fb");
      if(ok){ fb.textContent=tx("Correct! 🎉","सही! 🎉"); fb.className="feedback good"; setTimeout(()=>next(true),1100); }
      else { logWrong(r.prompt, filled, r.answer);
             fb.textContent=tx('Answer: ','सही जवाब: ')+'"'+r.answer+'"'; fb.className="feedback bad"; setTimeout(()=>next(false),1900); }
    };
    renderCode();
  }

  // --- QUIZ: a multiple-choice question (any subject) — read it, tap the answer
  function roundQuiz(r){
    if(!Array.isArray(r.choices) || !r.choices.includes(r.answer)) return next(true);  // malformed content → skip, never trap the child
    mount(`${head(tx(r.q, r.qHi || r.q), tx("Choose the answer","सही उत्तर चुनो"), r.qHi || "")}
      ${r.emoji ? `<div class="quizemoji">${esc(r.emoji)}</div>` : ""}
      <div class="options quizopts" id="opts"></div>
      <div id="teach" class="teachbox" style="display:none"></div>
      <div class="feedback" id="fb"></div>`);
    setFooter("");
    announce(() => speak(tx(r.q, r.qHi || r.q), state.lang==="hi" ? "hi" : "en"));
    const opts = $("#opts");

      if(!r.teach) return;
