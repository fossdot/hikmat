// ---------- Type-aware sentence frames for "Build a Sentence" ----------
// Each word carries a `type` (thing/mass/person/verb/adj/time/phrase). Frames are
// chosen to fit the type, so we never generate nonsense like "How much is the mother?"
// or "I want one read". Words of type time/phrase have no good frame and are skipped.
const PHRASE_FRAMES = {
  thing: [
    it => ({ words:["I","want","one",it.en],        hintHi:`"मुझे एक ${it.hi} चाहिए"`, hintHiSpoken:`मुझे एक ${it.hi} चाहिए` }),
    it => ({ words:["This","is","a",it.en],          hintHi:`"यह एक ${it.hi} है"`,     hintHiSpoken:`यह एक ${it.hi} है` }),
    it => ({ words:["Give","me","two",it.plural||it.en], hintHi:`"मुझे दो ${it.hi} दीजिए"`, hintHiSpoken:`मुझे दो ${it.hi} दीजिए` }),
  ],
  mass: [
    it => ({ words:["I","want","some",it.en],        hintHi:`"मुझे कुछ ${it.hi} चाहिए"`, hintHiSpoken:`मुझे कुछ ${it.hi} चाहिए` }),
    it => ({ words:["Give","me","some",it.en],        hintHi:`"मुझे थोड़ा ${it.hi} दीजिए"`, hintHiSpoken:`मुझे थोड़ा ${it.hi} दीजिए` }),
    it => ({ words:["I","need","some",it.en],         hintHi:`"मुझे ${it.hi} चाहिए"`,     hintHiSpoken:`मुझे ${it.hi} चाहिए` }),
  ],
  person: [
    it => ({ words:["This","is","my",it.en],          hintHi:`"यह मेरा ${it.hi} है"`,    hintHiSpoken:`यह मेरा ${it.hi} है` }),
    it => ({ words:["She","is","my",it.en],           hintHi:`"वह मेरी ${it.hi} है"`,    hintHiSpoken:`वह मेरी ${it.hi} है` }),
    it => ({ words:["I","have","a",it.en],            hintHi:`"मेरा एक ${it.hi} है"`,    hintHiSpoken:`मेरा एक ${it.hi} है` }),
  ],
  verb: [
    it => ({ words:["I","can",it.en],                 hintHi:`"मैं ${it.hi} सकती हूँ"`,  hintHiSpoken:`मैं ${it.hi} सकती हूँ` }),
    it => ({ words:["Please",it.en,"now"],            hintHi:`"कृपया अभी ${it.hi}"`,     hintHiSpoken:`कृपया अभी ${it.hi}` }),
    it => ({ words:["I","will",it.en,"today"],        hintHi:`"मैं आज ${it.hi}"`,        hintHiSpoken:`मैं आज ${it.hi}` }),
  ],
  adj: [
    it => ({ words:["It","is",it.en],                 hintHi:`"यह ${it.hi} है"`,        hintHiSpoken:`यह ${it.hi} है` }),
    it => ({ words:["I","am",it.en],                  hintHi:`"मैं ${it.hi} हूँ"`,       hintHiSpoken:`मैं ${it.hi} हूँ` }),
    it => ({ words:["This","is","very",it.en],        hintHi:`"यह बहुत ${it.hi} है"`,    hintHiSpoken:`यह बहुत ${it.hi} है` }),
  ],
};
// resolve a usable frame-type for a word; null = skip in Build a Sentence
function phraseType(it){
  if(it.type && PHRASE_FRAMES[it.type]) return it.type;
  if(it.type==="time" || it.type==="phrase") return null;   // no good sentence frame
  if(it.uncount) return "mass";                              // fallback for untyped content
  return "thing";
}

// ---------- Build rounds per activity type, from a lesson's content ----------
function buildRounds(lv, lesson){
  const ITEMS = lesson.words;
  if(lv.type==="learn")  return pick(ITEMS, 6);
  if(lv.type==="spell")  return pick(ITEMS.filter(i=>i.en.length<=6), 5);
  if(lv.type==="listen"){
    return pick(ITEMS,6).map(ans=>{
      const distract = pick(ITEMS.filter(i=>i.en!==ans.en),3);
      return { answer:ans, choices: shuffle([ans,...distract]) };
    });
  }
  if(lv.type==="phrase"){
    // usable = words with an authored example sentence, or a type that has a frame (skips time/phrase)
    const usable = ITEMS.filter(it => it.use || phraseType(it));
    const pool = usable.length ? usable : ITEMS;
    return pick(pool,5).map((it,i)=>{
      if(it.use){   // authored, context-real sentence (the IT/coding lessons use this)
        return { emoji:it.emoji, words: it.use.split(" "),
                 hintHi:`"${it.useHi||it.hi}"`, hintHiSpoken: it.useHi||it.hi };
      }
      const t = phraseType(it) || (it.uncount ? "mass" : "thing");
      const frames = PHRASE_FRAMES[t];
      const v = frames[i % frames.length](it);
      return { emoji:it.emoji, ...v };
    });
  }
  if(lv.type==="talk") return lesson.dialogues.slice();
  if(lv.type==="quiz") return (lesson.quiz||[]).slice();
  if(lv.type==="code") return (lesson.code||[]).slice();
  if(lv.type==="fix")  return (lesson.fix||[]).slice();
  if(lv.type==="email") return (lesson.email||[]).slice();
  return [];
}

// ---------- boot ----------
// ---------- Backend sync (offline-first; bundled COURSES is the fallback) ----------
// When served from the Frappe app, fetch live content + cache it. When opened as a
// plain file (no server) or offline, the bundled/cached COURSES is used unchanged.
const CACHE_KEY = "hikmat_courses_cache";
const STRUCT_KEY = "hikmat_structure_cache";
const ATTEMPT_QUEUE = "hikmat_attempt_queue";
const DOUBT_QUEUE = "hikmat_doubt_queue";
let backendLive = false;   // true once we've reached the Frappe server

function apiURL(m){ return "/api/method/hikmat.api." + m; }
// The game page is static, but the browser may carry a logged-in Frappe session (a
// facilitator with Desk open, or an online student) — Frappe then REJECTS POSTs that
// lack the session's CSRF token (400). We fetch the token once (GET, same-origin) and
// attach it to every POST; guests get "" and are never CSRF-checked.
let CSRF_TOKEN = "";
function postHeaders(){ return CSRF_TOKEN ? { "X-Frappe-CSRF-Token": CSRF_TOKEN } : {}; }
async function refreshCsrf(){
  try {
    const r = await fetch(apiURL("get_csrf"), { headers:{ Accept:"application/json" } });
    if(r.ok) CSRF_TOKEN = ((await r.json()).message || {}).token || "";
  } catch(e){}
}
async function api(method, params, post){
  try {
    const opts = post ? { method:"POST", headers: postHeaders(), body:new URLSearchParams(params||{}) }
                      : { headers:{ Accept:"application/json" } };
    const url = apiURL(method) + (!post && params ? "?" + new URLSearchParams(params) : "");
    const r = await fetch(url, opts);
    if(!r.ok) return null;
    return (await r.json()).message;
  } catch(e){ return null; }
}

async function loadFromBackend(){
  // 1) cached content + settings first → instant and works offline (logo, name, taglines persist)
  let haveCache = false;
  try { const c = JSON.parse(localStorage.getItem(CACHE_KEY)); if(Array.isArray(c) && c.length){ COURSES = c; haveCache = true; } } catch(e){}
  try { const st = JSON.parse(localStorage.getItem(STRUCT_KEY)); if(st && st.bands && st.bands.length){ BANDS = st.bands; SUBJECTS = st.subjects || SUBJECTS; } } catch(e){}
  try { const s = JSON.parse(localStorage.getItem("hikmat_settings_cache"));
        if(s && s.appName){ SETTINGS.appName = s.appName; SETTINGS.logo = s.logo || ""; if(s.taglineEn) SETTINGS.tagline.en = s.taglineEn; if(s.taglineHi) SETTINGS.tagline.hi = s.taglineHi; SETTINGS.aiEnabled = !!s.aiEnabled; SETTINGS.voiceEnabled = !!s.voiceEnabled; if(Array.isArray(s.milestones)) SETTINGS.milestones = s.milestones; applySettingsDefaults(s); } } catch(e){}
  // 1b) durable offline baseline: the full curriculum shipped as a static file (precached by the
  //     service worker). Without this, a first-ever-offline launch or a localStorage wipe would fall
  //     back to the tiny bundled COURSES (4 tracks) instead of all lessons.
  if(!haveCache){
    try {
      const cj = await fetch("/assets/hikmat/curriculum.json", {headers:{Accept:"application/json"}});
      if(cj.ok){ const arr = await cj.json(); if(Array.isArray(arr) && arr.length){ COURSES = arr; } }
    } catch(e){}
  }
  // 2) then try live (only succeeds when served from Frappe and online)
  try {
    const [cr, sr, xr] = await Promise.all([
      fetch(apiURL("get_courses"),   {headers:{Accept:"application/json"}}),
      fetch(apiURL("get_settings"),  {headers:{Accept:"application/json"}}),
      fetch(apiURL("get_structure"), {headers:{Accept:"application/json"}}),
    ]);
    if(cr.ok){
      const j = await cr.json();
      if(j && Array.isArray(j.message) && j.message.length){
        COURSES = j.message;
        localStorage.setItem(CACHE_KEY, JSON.stringify(COURSES));
      }
    }
    if(xr.ok){
      const x = (await xr.json()).message;
      if(x && Array.isArray(x.bands) && x.bands.length){
        BANDS = x.bands; SUBJECTS = x.subjects || SUBJECTS;
        try { localStorage.setItem(STRUCT_KEY, JSON.stringify(x)); } catch(e){}
      }
    }
    if(sr.ok){
      const s = (await sr.json()).message;
      if(s && s.appName){
        SETTINGS.appName = s.appName;
        SETTINGS.logo = s.logo || "";
        if(s.taglineEn) SETTINGS.tagline.en = s.taglineEn;
        if(s.taglineHi) SETTINGS.tagline.hi = s.taglineHi;
        SETTINGS.aiEnabled = !!s.aiEnabled;
        SETTINGS.voiceEnabled = !!s.voiceEnabled;
        if(Array.isArray(s.milestones)) SETTINGS.milestones = s.milestones;
        applySettingsDefaults(s);
        try { localStorage.setItem("hikmat_settings_cache", JSON.stringify(s)); } catch(e){}
      }
    }
    // "live" means the Frappe API actually answered — NOT merely that fetch didn't throw.
    // A static host (python http.server, file://) returns 404 for these endpoints: fetch still
    // resolves, so returning true here would wrongly flag the backend as reachable and block the
    // offline signup fallback. Require at least one whitelisted method to have responded ok.
    return cr.ok || sr.ok || xr.ok;
  } catch(e){ return false; }   // offline / file:// — keep bundled or cached data
}

// queue a finished activity and push it to the server when possible
let _syncing = false;
function _readQueue(){ try { return JSON.parse(localStorage.getItem(ATTEMPT_QUEUE)) || []; } catch(e){ return []; } }
function _saveQueue(q){ try { localStorage.setItem(ATTEMPT_QUEUE, JSON.stringify(q)); } catch(e){ /* quota: best-effort, retry next sync */ } }
function recordAttempt(a){
  if(!currentStudent) return;            // guest / not signed in → local progress only
  const q = _readQueue();
  q.push({ ...a, student: currentStudent.id, token: currentStudent.token || "", client_id: uid() });
  _saveQueue(q);
  syncAttempts();
}
async function syncAttempts(){
  if(_syncing) return;                   // serialize runs so concurrent calls can't clobber the queue
  const q = _readQueue();
  if(!q.length) return;
  _syncing = true;
  const remaining = [];
  try {
    for(const a of q){
      try {
        const r = await fetch(apiURL("submit_attempt"), {method:"POST", headers: postHeaders(), body:new URLSearchParams(a)});
        if(!r.ok){ remaining.push(a); continue; }                  // HTTP/network error → retry later
        let body = null; try { body = (await r.json()).message; } catch(e){}
        if(body && body.ok === false && body.error === "rate_limited") remaining.push(a);  // transient → retry
        // success, or a permanent rejection (e.g. unknown_student) → drop so it can't loop forever
      } catch(e){ remaining.push(a); }                             // offline → keep for next time
    }
    // merge anything enqueued DURING this run so a mid-sync recordAttempt isn't lost
    const seen = new Set(q.map(x => JSON.stringify(x)));
    _readQueue().forEach(x => { if(!seen.has(JSON.stringify(x))) remaining.push(x); });
    _saveQueue(remaining);
  } finally { _syncing = false; }
}
window.addEventListener("online", syncAttempts);

// ---------- FLAGSHIP: "Roshni, mujhe doubt hai" — tap when you're stuck ----------
// Layer 1: in-the-moment self-help right where she is (hear again / slowly / in Hindi),
//          with a reassuring Roshni so asking never feels like failing.
// Layer 2: each doubt is logged (track/lesson/activity) and synced so a facilitator
//          can see a confusion heatmap — which topics need a human, live.
let doubtCtx = null;          // {course, lesson, lv, idx} of the round on screen
function openDoubt(){
  if(!doubtCtx) return;
  const _ex = $("#doubtWrap"); if(_ex) _ex.remove();   // never stack two doubt sheets (would duplicate ids)
  sfx.tap(); stopSpeech(); setMood("happy");
  const q = lastQ, hint = lastHint, hi = lastHi;
  const ctxSnap = doubtCtx;                        // freeze context for the async AI flow (globals change each round)
  const aiOn = backendLive && SETTINGS.aiEnabled && !!currentStudent;   // Roshni-AI: online + enabled + logged-in
  const convoId = uid();                           // one AI conversation per doubt-sheet open
  const replayEn = [q, hint].filter(Boolean).join(". ");
  // Roshni warmly invites the doubt — having one is a good thing.
  const roshniLine = tx("Doubt hona acchi baat hai! Main samjhaati hoon.",
                        "Doubt होना अच्छी बात है! मैं समझाती हूँ।");
  const sheet = el(`<div class="sheetwrap" id="doubtWrap">
    <div class="sheet doubtsheet" role="dialog" aria-modal="true" aria-label="${tx('Help from Roshni','रोशनी से मदद')}">
      <div class="doubthead">
        <div class="mascot small m-happy">${mascotSVG()}</div>
        <div class="doubttitle">
          <div class="doubtq">${tx("What do you need? 💛","तुम्हें क्या चाहिए? 💛")}</div>
          <div class="doubtsub">${esc(roshniLine)}</div>
        </div>
      </div>
      <div class="doubtopts">
        <button class="doubtopt" id="dAgain"><span class="di">🔊</span><span>${tx("Hear it again","फिर से सुनो")}</span></button>
        <button class="doubtopt" id="dSlow"><span class="di">🐢</span><span>${tx("Say it slowly","धीरे से कहो")}</span></button>
        ${hi ? `<button class="doubtopt" id="dHindi"><span class="di">🇮🇳</span><span>${tx("Explain in Hindi","हिंदी में समझाओ")}</span></button>` : ""}
        <button class="doubtopt" id="dTeacher"><span class="di">🧑‍🏫</span><span>${tx("Tell the teacher","टीचर को बताओ")}</span></button>
        ${aiOn ? `<button class="doubtopt" id="dAsk"><span class="di">✨</span><span>${tx("Ask Roshni","रोशनी से पूछो")}</span></button>` : ""}
      </div>
      ${aiOn ? `<div id="aiBox" style="display:none;margin:2px 0 14px;">
        <textarea id="aiInput" rows="2" aria-label="${escAttr(tx('Ask Roshni your question','रोशनी से अपना सवाल पूछो'))}" style="width:100%;font-size:16px;padding:10px 12px;border:2px solid var(--line);border-radius:12px;background:var(--card);color:var(--ink);font-family:inherit;resize:none;" placeholder="${escAttr(tx('Type your question in Hindi…','अपना सवाल हिंदी में लिखो…'))}"></textarea>
        <button class="btn primary wide" id="aiSend" style="margin-top:8px;">✨ ${tx("Ask Roshni","पूछो")}</button>
        <div id="aiAnswer" class="teachbox" style="display:none;margin-top:12px;"></div>
      </div>` : ""}
      <button class="btn ghost wide" id="dClose">${tx("I'm okay now →","अब समझ गई →")}</button>
    </div>
  </div>`);
  document.body.appendChild(sheet);
  // Layer 2: log the doubt the moment she opens for help (once per open).
  reportDoubt({ track: doubtCtx.course.key, lesson: doubtCtx.lesson.key,
                activity: doubtCtx.lv.id, question: replayEn.slice(0, 280) });
  const close = () => { sheet.remove(); };
  sheet.addEventListener("click", e => { if(e.target === sheet) close(); });
  $("#dClose").onclick = () => { sfx.tap(); close(); };
  $("#dAgain").onclick = () => { sfx.tap(); logTool("hear_again"); if(replayEn) speak(replayEn, state.lang==="hi"?"hi":"en"); };
  $("#dSlow").onclick  = () => { sfx.tap(); logTool("hear_slow"); if(replayEn) speak(replayEn, state.lang==="hi"?"hi":"en", { rate:0.55 }); };
  const dh = $("#dHindi"); if(dh) dh.onclick = () => { sfx.tap(); logTool("hear_hindi"); if(hi) speak(hi, "hi", { rate:0.8 }); };
  $("#dTeacher").onclick = () => {
    sfx.tap();
    // already logged on open; acknowledge so she knows help is coming
    $("#dTeacher").classList.add("done");
    $("#dTeacher").querySelector("span:last-child").textContent = tx("Teacher will help 💛","टीचर मदद करेंगी 💛");
    speak(tx("I told your teacher. Help is coming.","मैंने टीचर को बता दिया। मदद आ रही है।"),
          state.lang==="hi"?"hi":"en");
  };
  // Roshni AI — typed doubt → local Ollama → spoken Hindi reply. Purely additive: the
  // four scripted buttons above always work, so any failure here never strands the child.
  if(aiOn){
    const box = $("#aiBox"), input = $("#aiInput"), sendBtn = $("#aiSend"), ans = $("#aiAnswer");
    $("#dAsk").onclick = () => {
      sfx.tap();
      box.style.display = "block";
      try { input.focus(); } catch(e){}
      speak(tx("Ask me. Type your question.","मुझसे पूछो। अपना सवाल लिखो।"), state.lang==="hi"?"hi":"en");
    };
    sendBtn.onclick = async () => {
      const text = (input.value || "").trim();
      if(!text){ speak(tx("Type your question first.","पहले अपना सवाल लिखो।"), state.lang==="hi"?"hi":"en"); return; }
      sfx.tap(); stopSpeech();
      sendBtn.disabled = true;
      ans.style.display = "block";
      ans.innerHTML = "💭 " + esc(tx("Roshni is thinking…","रोशनी सोच रही है…"));
      speak(tx("Let me think.","ज़रा सोचती हूँ।"), state.lang==="hi"?"hi":"en");
      const r = await api("ai_ask", {
        student: currentStudent.id, token: currentStudent.token || "",
        track: ctxSnap.course.key, lesson: ctxSnap.lesson.key, activity: ctxSnap.lv.id,
        prompt: text, lang: state.lang, conversation_id: convoId, client_turn_id: uid()
      }, true);
      if(!sheet.isConnected) return;                 // she closed/changed screen mid-call — don't speak a stale answer
      sendBtn.disabled = false;
      if(r && r.ok && r.reply){
        ans.innerHTML = "💬 " + esc(r.reply);
        setMood("happy");
        speak(r.reply, "hi");                        // Roshni answers in Hindi (Hindi-primary, audio-first)
      } else {
        const m = tx("I couldn't answer just now. Tap 'Tell the teacher', or try again.",
                     "अभी जवाब नहीं दे पाई। 'टीचर को बताओ' दबाओ, या फिर से कोशिश करो।");
        ans.innerHTML = "💛 " + esc(m);
        speak(m, state.lang==="hi"?"hi":"en");       // a non-reader must always HEAR the outcome
      }
    };
  }
  // auto-read the warm invite so the audio-first child hears the offer
  speak(roshniLine, state.lang==="hi"?"hi":"en");
}

// ---------- Learning-event stream (analytics Layer 1: wrong answers) ----------
// Every wrong pick is queued offline (like doubts) and synced to log_event, so the
// facilitator's "Hardest Questions" report can show WHICH question broke down and
// what the girls picked instead — the final score alone can't tell you that.
const EVENT_QUEUE = "hikmat_event_queue";
function _readEvents(){ try { return JSON.parse(localStorage.getItem(EVENT_QUEUE)) || []; } catch(e){ return []; } }
function _saveEvents(q){ try { localStorage.setItem(EVENT_QUEUE, JSON.stringify(q.slice(-400))) ; } catch(e){} }  // cap: never blow localStorage
function recordEvent(ev){
  const q = _readEvents();
  q.push({ ...ev,
           student: currentStudent ? currentStudent.id : "",
           token: currentStudent ? (currentStudent.token || "") : "",
           lang: state.lang, client_id: uid() });
  _saveEvents(q);
  syncEvents();
}
let _syncingEvents = false;
async function syncEvents(){
  if(_syncingEvents) return;
  const q = _readEvents();
  if(!q.length) return;
  _syncingEvents = true;
  const remaining = [];
  try {
    for(const ev of q){
      try {
        const r = await fetch(apiURL("log_event"), { method:"POST", headers: postHeaders(), body:new URLSearchParams(ev) });
        if(!r.ok){ remaining.push(ev); continue; }
      } catch(e){ remaining.push(ev); }
    }
    const seen = new Set(q.map(x => JSON.stringify(x)));
    _readEvents().forEach(x => { if(!seen.has(JSON.stringify(x))) remaining.push(x); });
    _saveEvents(remaining);
  } finally { _syncingEvents = false; }
}
window.addEventListener("online", syncEvents);

// ---------- Learning-event stream (analytics Layer 2: dwell time + tool usage) ----------
// Dwell: one timer per activity, paused while the tab is hidden. A FINISHED activity
// ships its seconds on the Lesson Attempt itself; leaving mid-activity emits a
// kind="dwell" event instead — the bail-out signal the attempt row can't carry.
let ACT = null;   // {course, lesson, lv, t0, acc} — the activity being timed right now
function actStart(course, lesson, lv){
  actEnd(false);                       // leftover session (shouldn't happen) counts as abandoned
  ACT = { course, lesson, lv, t0: Date.now(), acc: 0 };
}
function actSecs(){
  if(!ACT) return 0;
  return Math.round((ACT.acc + (document.hidden ? 0 : Date.now() - ACT.t0)) / 1000);
}
function actEnd(completed){
  if(!ACT) return 0;
  const secs = Math.min(actSecs(), 7200), a = ACT;
  ACT = null;
  flushTools();                        // ship this activity's tool taps alongside it
  if(!completed && secs >= 5)          // <5s = misclick, not a bail-out
    recordEvent({ kind:"dwell", track:a.course.key, lesson:a.lesson.key, activity:a.lv.id,
                  duration_secs: secs });
  return secs;
}
document.addEventListener("visibilitychange", () => {
  if(!ACT) return;
  if(document.hidden) ACT.acc += Date.now() - ACT.t0;   // pause: bank the visible time
  else ACT.t0 = Date.now();                             // resume the clock
});

// Tool taps (🔊 listen, language switch, Hindi guide, replays …) are counted per
// (tool, current activity) and flushed as ONE batched event — not one POST per tap.
let TOOL_COUNTS = {};
let _toolTimer = null;
function logTool(tool){
  const k = ACT ? [tool, ACT.course.key, ACT.lesson.key, ACT.lv.id].join("|")
                : tool + "|||";
  TOOL_COUNTS[k] = (TOOL_COUNTS[k] || 0) + 1;
  clearTimeout(_toolTimer);
  _toolTimer = setTimeout(flushTools, 15000);           // idle flush for taps outside gameplay
}
function flushTools(){
  clearTimeout(_toolTimer); _toolTimer = null;
  const counts = TOOL_COUNTS; TOOL_COUNTS = {};
  for(const k in counts){
    const p = k.split("|");
    recordEvent({ kind:"tool_use", tool:p[0], track:p[1], lesson:p[2], activity:p[3],
                  count: counts[k] });
  }
}
// Leaving the page: bank everything into localStorage (recordEvent is synchronous)
// so the next visit's boot flush ships it. flushTools too — actEnd no-ops outside gameplay.
window.addEventListener("pagehide", () => { actEnd(false); flushTools(); });
// One delegated listener catches every in-activity "hear it" button, current and future.
root.addEventListener("click", e => {
  if(e.target.closest && e.target.closest(".speakchip,.speakbtn,.tap-emoji")) logTool("listen_word");
});

function _readDoubts(){ try { return JSON.parse(localStorage.getItem(DOUBT_QUEUE)) || []; } catch(e){ return []; } }
function _saveDoubts(q){ try { localStorage.setItem(DOUBT_QUEUE, JSON.stringify(q)); } catch(e){} }
function reportDoubt(d){
  const q = _readDoubts();
  q.push({ ...d,
           student: currentStudent ? currentStudent.id : "",
           token: currentStudent ? (currentStudent.token || "") : "",
           lang: state.lang, client_id: uid() });
  _saveDoubts(q);
  syncDoubts();
}

// "🙋 Help Needed" — a top-bar tool that raises a help request from ANY screen. It logs a
// doubt (with the current lesson context if in gameplay) which notifies the facilitators'
// Desk (report_doubt → _notify_facilitators). Works offline: the doubt queues and syncs later.
function helpNeeded(){
  sfx.tap();
  const ctx = doubtCtx || {};
  reportDoubt({
    track: ctx.course ? ctx.course.key : "",
    lesson: ctx.lesson ? ctx.lesson.key : "",
    activity: ctx.lv ? ctx.lv.id : "",
    question: ("Help needed" + (lastQ ? (": " + lastQ) : "")).slice(0, 490),
  });
  const msg = tx("Your teacher has been told — help is coming! 🙋","शिक्षक को बता दिया — मदद आ रही है! 🙋");
  srSay(msg);
  try { speak(msg, state.lang, {}); } catch(e){}
  flashToast(msg);
}
function flashToast(msg){
  const ex = document.getElementById("hkToast"); if(ex) ex.remove();
  const t = el(`<div id="hkToast" role="status">${esc(msg)}</div>`);
  document.body.appendChild(t);
  setTimeout(() => { t.classList.add("out"); setTimeout(() => t.remove(), 400); }, 2600);
}
let _syncingDoubts = false;
async function syncDoubts(){
  if(_syncingDoubts) return;
  const q = _readDoubts();
  if(!q.length) return;
  _syncingDoubts = true;
  const remaining = [];
  try {
    for(const d of q){
      try {
        const r = await fetch(apiURL("report_doubt"), { method:"POST", headers: postHeaders(), body:new URLSearchParams(d) });
        if(!r.ok){ remaining.push(d); continue; }   // network/HTTP error → retry later
        // success, or a permanent rejection → drop (don't loop forever)
      } catch(e){ remaining.push(d); }              // offline → keep for next time
    }
    const seen = new Set(q.map(x => JSON.stringify(x)));
    _readDoubts().forEach(x => { if(!seen.has(JSON.stringify(x))) remaining.push(x); });
    _saveDoubts(remaining);
  } finally { _syncingDoubts = false; }
}
window.addEventListener("online", syncDoubts);

// ---------- identity & login (only when served from Frappe; offline = guest) ----------
function setStudent(stu){
  currentStudent = stu || null;
  showAllClasses = false;               // a fresh login starts focused on the student's own class
  if(stu) localStorage.setItem("hikmat_current", JSON.stringify(stu));
  else localStorage.removeItem("hikmat_current");
  state = loadState();                  // swap to this identity's saved progress
}
async function mergeServerProgress(){
  if(!currentStudent) return;
  const res = await api("get_progress", { student: currentStudent.id, token: currentStudent.token || "" });
  const p = res && res.progress;
  if(!p) return;
  for(const ck in p) for(const lk in p[ck]) for(const aid in p[ck][lk]) setStars(ck, lk, aid, p[ck][lk][aid]);
  if(res.gates) state.gates = res.gates;   // server-authoritative belt clearing syncs down here
  if(typeof res.gems === "number") state.coins = Math.max(state.coins||0, res.gems);  // gem total follows her across laptops
  save();
}

// SIGN UP — a learner creates their own profile (name + avatar + optional PIN), then plays.
const AVATARS = ["🙂","👧","🧒","👩","😀","🦋","🌸","🌟","🐱","🦊","🐥","🚀"];
function renderSignup(){
  stopSpeech(); rerender = renderSignup; root.innerHTML = "";
  setBack(tx("← Log in","← लॉग इन"), renderLogin);
  let avatar = AVATARS[0], band = "";
  // Only offer a class picker when grade-band content actually exists (backend / curriculum.json
  // loaded). Standalone or offline the bundled fallback is Life-Skills only (no band-tagged tracks),
  // so bandTracks() is empty for every band → skip the picker entirely rather than showing an empty,
  // un-selectable field that leaves "Create & start" permanently disabled. Mirrors renderHome.
  const bandList = BANDS.filter(b => bandTracks(b.key).some(c => c.published && c.lessons.length));
  const haveBands = bandList.length > 0;
  root.appendChild(el(`<div class="screen">
    <div class="hero"><h1>${tx("Create your name ✨","अपना नाम बनाओ ✨")}</h1>
      <p>${tx("Make a profile so your stars are saved.","प्रोफ़ाइल बनाओ ताकि तुम्हारे सितारे सुरक्षित रहें।")}</p></div>
    <div class="signup">
      <label class="fieldlabel">${tx("First name or nickname","पहला नाम या उपनाम")}</label>
      <input id="suName" class="searchbox" type="text" autocomplete="off" maxlength="40"
             placeholder="${tx('e.g. Asha, or a nickname','जैसे: आशा, या उपनाम')}">
      <div class="hint2">${tx("A first name or nickname is best — you don't need your full name.","पहला नाम या उपनाम काफ़ी है — पूरा नाम ज़रूरी नहीं।")}</div>
      ${haveBands ? `<label class="fieldlabel">${tx("Your class","तुम्हारी कक्षा")}</label>
      <div class="bandpick" id="bandpick"></div>` : ``}
      <label class="fieldlabel">${tx("Pick an avatar","अवतार चुनो")}</label>
      <div class="avpick" id="avpick"></div>
      <label class="fieldlabel">${tx("Choose a PIN","एक पिन चुनो")}</label>
      <input id="suPin" class="searchbox" type="password" inputmode="numeric" maxlength="8"
             placeholder="${tx('4–8 digits — keeps your progress safe','4–8 अंक — प्रगति सुरक्षित रखे')}">
      <label class="consent"><input type="checkbox" id="suConsent">
        <span>${tx("A parent or teacher said it's okay for me to make a profile.","माता-पिता या शिक्षक ने मुझे प्रोफ़ाइल बनाने की अनुमति दी है।")}</span></label>
      <div class="feedback bad" id="suErr" style="min-height:18px"></div>
      <div class="center"><button class="btn primary" id="suGo" disabled>${tx("Create & start →","बनाओ और शुरू करो →")}</button></div>
      <div class="center" style="margin-top:14px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap">
        <button class="btn ghost" id="suLogin">${tx("Already have a name? Log in","पहले से नाम है? लॉग इन")}</button>
        <button class="btn ghost" id="suOnline">${tx("🌐 Invite code? Sign up online","🌐 इनवाइट कोड? ऑनलाइन साइन अप")}</button>
        <button class="btn ghost" id="suGuest">${tx("Play without signing in","बिना साइन-इन खेलो")}</button>
      </div>
    </div>
  </div>`));
  const suNarr = haveBands
    ? tx("Create your name. Type a name, choose your class, and pick a picture.","अपना नाम बनाओ। नाम लिखो, अपनी कक्षा और एक तस्वीर चुनो।")
    : tx("Create your name. Type a name and pick a picture.","अपना नाम बनाओ। नाम लिखो और एक तस्वीर चुनो।");
  setNarration(suNarr, suNarr);
  const avwrap = $("#avpick");
  AVATARS.forEach((a,i) => {
    const b = el(`<button class="av ${i===0?'sel':''}">${a}</button>`);
    b.onclick = () => { avatar = a; sfx.tap(); avwrap.querySelectorAll(".av").forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); };
    avwrap.appendChild(b);
  });
  const name = $("#suName"), pin = $("#suPin"), go = $("#suGo"), err = $("#suErr"), consent = $("#suConsent");
  const pinOK = () => /^\d{4,8}$/.test(pin.value.trim());   // PIN is now required (4–8 digits)
  const refreshGo = () => { go.disabled = !(name.value.trim() && consent.checked && pinOK() && (!haveBands || band)); };
  name.oninput = () => { refreshGo(); err.textContent = ""; };
  pin.oninput = () => { refreshGo(); err.textContent = ""; };
  consent.onchange = refreshGo;
  if(haveBands){
    const bandwrap = $("#bandpick");
    bandList.forEach(b => {
      const btn = el(`<button class="bandchip">${iconFor("band:"+b.key, b.icon)} ${esc(tx(b.title, b.titleHi))}</button>`);
      btn.onclick = () => { band = b.key; sfx.tap(); bandwrap.querySelectorAll(".bandchip").forEach(x=>x.classList.remove("sel")); btn.classList.add("sel"); err.textContent=""; refreshGo(); };
      bandwrap.appendChild(btn);
    });
  }
  setTimeout(() => name.focus(), 60);
  $("#suLogin").onclick = () => { sfx.back(); renderLogin(); };
  $("#suOnline").onclick = () => { sfx.tap(); renderOnlineSignup(); };
  $("#suGuest").onclick = () => { sfx.tap(); setStudent(null); renderHome(); };
  const submit = async () => {
    const nm = name.value.trim();
    if(!nm){ err.textContent = tx("Please type your name.","कृपया अपना नाम लिखो।"); return; }
    if(haveBands && !band){ err.textContent = tx("Please choose your class.","कृपया अपनी कक्षा चुनो।"); return; }
    if(!consent.checked){ err.textContent = tx("Please tick the box to continue.","आगे बढ़ने के लिए बॉक्स पर टिक करो।"); return; }
    const p = pin.value.trim();
    if(!/^\d{4,8}$/.test(p)){ err.textContent = tx("Please choose a 4–8 digit PIN.","कृपया 4–8 अंकों का पिन चुनो।"); return; }
    go.disabled = true; err.textContent = "";
    const r = await api("signup_student", { name:nm, avatar, pin:p, band }, true);
    if(r && r.ok){ finishLogin(r); return; }
    if(r == null && !backendLive){
      // No server was ever reached (file:// / standalone / offline). Create a local-only profile so
      // the learner can start playing right now; progress is saved per-id in localStorage. If a
      // backend later appears, a fresh sign-up there will register them — this local profile just
      // stays on the device (same reach as guest play, but named and star-tracked).
      sfx.enter();
      const guestSnap = snapshotGuestProgress();
      setStudent({ id: uid(), name: nm, avatar, token: "", band, local: true });
      migrateGuestProgress(guestSnap);
      renderHome();
      return;
    }
    go.disabled = false; err.textContent = tx("Could not sign up — please try again.","साइन अप नहीं हुआ — फिर कोशिश करो।");
  };
  go.onclick = submit;
  name.onkeydown = (e) => { if(e.key==="Enter" && name.value.trim()) submit(); };
  pin.onkeydown  = (e) => { if(e.key==="Enter") submit(); };
  refreshTop();
}

// ONLINE auth — remote learners are real Frappe Website Users (username + PIN, no email).
// Login goes through Frappe's own /api/method/login (sets the session cookie), then we load
// the linked Student via get_my_student. Signup goes through hikmat.signup_online (invite code).
async function frappeLogin(usr, pwd){
  try {
    const r = await fetch("/api/method/login", {
      method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded", ...postHeaders() },
      body: new URLSearchParams({ usr, pwd }),
    });
    if(r.ok) await refreshCsrf();                  // new session → new CSRF token for our POSTs
    return r.ok;                                   // 200 = logged in (cookie set); 401 = bad creds
  } catch(e){ return false; }                      // offline / no backend
}

// ---------- CAMPUS device: offline roster login ----------
// A campus laptop is provisioned once (renderDeviceSetup) by a facilitator: it caches the
// campus roster (names + avatars + PIN hashes + tokens). Girls then tap their name and type a
// PIN verified ON-DEVICE against the cached werkzeug hash, so login works with no network.
// Attempts sync when the laptop is next online (the cached token authorises them).
const DEVICE_MODE_KEY = "hikmat_device_mode";       // "campus" | "" (online/personal — the default)
const CAMPUS_ROSTER_KEY = "hikmat_campus_roster";   // { campus, ts, students:[{id,name,avatar,pinHash,token,band}] }
function deviceMode(){ try { return localStorage.getItem(DEVICE_MODE_KEY) || ""; } catch(e){ return ""; } }
function campusRoster(){ try { return JSON.parse(localStorage.getItem(CAMPUS_ROSTER_KEY)); } catch(e){ return null; } }
function setCampusDevice(campus, students){
  try {
    localStorage.setItem(CAMPUS_ROSTER_KEY, JSON.stringify({ campus, ts: Date.now(), students: students || [] }));
    localStorage.setItem(DEVICE_MODE_KEY, "campus");
  } catch(e){}
}
function clearCampusDevice(){ try { localStorage.removeItem(CAMPUS_ROSTER_KEY); localStorage.removeItem(DEVICE_MODE_KEY); } catch(e){} }
function startLogin(){ deviceMode()==="campus" ? renderCampusLogin() : renderLogin(); }   // route by device

// Verify a PIN against werkzeug's "pbkdf2:sha256:<iters>$<salt>$<hex>" hash entirely in-browser
// (validated to match werkzeug's output). Constant-time-ish hex compare.
async function pbkdf2Verify(stored, pin){
  try {
    const m = /^pbkdf2:sha256:(\d+)\$([^$]+)\$([0-9a-f]+)$/.exec(stored || "");
    if(!m) return false;
    const iters = parseInt(m[1], 10), salt = m[2], expected = m[3], enc = new TextEncoder();
    const key = await crypto.subtle.importKey("raw", enc.encode(pin), { name: "PBKDF2" }, false, ["deriveBits"]);
    const bits = await crypto.subtle.deriveBits({ name: "PBKDF2", salt: enc.encode(salt), iterations: iters, hash: "SHA-256" }, key, 256);
    const hex = [...new Uint8Array(bits)].map(b => b.toString(16).padStart(2, "0")).join("");
    if(hex.length !== expected.length) return false;
    let diff = 0; for(let i = 0; i < hex.length; i++) diff |= hex.charCodeAt(i) ^ expected.charCodeAt(i);
    return diff === 0;
  } catch(e){ return false; }
}

        b.onclick = () => { chosen = c.name; cg.querySelectorAll(".bandchip").forEach(x => x.classList.remove("sel")); b.classList.add("sel"); err.textContent = ""; };
        cg.appendChild(b);
      });
      err.textContent = tx("Pick the campus, then tap again.","कैंपस चुनो, फिर टैप करो।");
      $("#dsGo").textContent = tx("Save class list →","सूची सहेजो →");
      return;
    }
    err.textContent = tx("Saving class list…","सूची सहेज रहे हैं…");
    const rr = await api("get_campus_roster", { campus: chosen });
    if(!Array.isArray(rr)){ err.textContent = tx("Could not load the class list.","सूची लोड नहीं हुई।"); return; }
    setCampusDevice(chosen, rr);
    await frappeLogout();     // never leave the teacher's session on a shared laptop
    sfx.enter();
    renderCampusLogin();
  };
  const dc = $("#dsClear"); if(dc) dc.onclick = () => { sfx.tap(); clearCampusDevice(); renderHome(); };
  refreshTop();
}

async function finishLogin(stu){
  sfx.enter();
  const guestSnap = snapshotGuestProgress();     // capture any preview stars BEFORE we swap identity
  setStudent({ id: stu.id, name: stu.name, avatar: stu.avatar || "🙂", token: stu.token, band: stu.band || "" });
  migrateGuestProgress(guestSnap);               // carry the guest's stars into this profile (+ queue to server)
  await mergeServerProgress();
  renderHome();
}

// ============================================================
//  Roshni voice assistant — floating mic + local Whisper(STT)/Piper(TTS) via Frappe.
//  All calls go same-origin through api()/fetch to the Frappe proxies (no CORS; the model
//  daemons stay bound to 127.0.0.1). Graceful: degrades to typed input + speechSynthesis if
//  voice is off or a daemon is down. Single-flight (Whisper shares the GPU with the LLM).
//  Audio never leaves the Mac; only the transcript is logged (server-side, via ai_ask).
// ============================================================
let roshniBusy = false;                 // single-flight: one STT or LLM turn at a time
let _recorder = null, _mediaStream = null, _recChunks = [];

// ---- TTS: Piper via Frappe, cached in IndexedDB so each phrase is synthesized once ----
let _ttsDB = null;
function ttsDB(){
  return new Promise(res => {
    if(_ttsDB) return res(_ttsDB);
    try {
      const rq = indexedDB.open("hikmat_tts", 1);
      rq.onupgradeneeded = () => { try { rq.result.createObjectStore("wav"); } catch(e){} };
      rq.onsuccess = () => { _ttsDB = rq.result; res(_ttsDB); };
      rq.onerror = () => res(null);
    } catch(e){ res(null); }
  });
}
function ttsCacheGet(key){
  return new Promise(async res => {
    const db = await ttsDB(); if(!db) return res(null);
    try { const t = db.transaction("wav","readonly").objectStore("wav").get(key);
          t.onsuccess = () => res(t.result || null); t.onerror = () => res(null); }
    catch(e){ res(null); }
  });
}
function ttsCachePut(key, blob){
  ttsDB().then(db => { if(db){ try { db.transaction("wav","readwrite").objectStore("wav").put(blob, key); } catch(e){} } });
}
// Speak a Hindi line the natural way (Piper) when voice is on; else the built-in voice.
// Always resolves (never throws) so a caller can await it safely.
async function ttsPlay(text){
  if(!text) return;
  if(!(SETTINGS.voiceEnabled && currentStudent)){ speak(text, "hi"); return; }
  const key = "v1:" + text;
  let blob = await ttsCacheGet(key);
  if(!blob){
    try {
      const r = await fetch(apiURL("ai_tts"), { method:"POST", headers: postHeaders(),
        body: new URLSearchParams({ student: currentStudent.id, token: currentStudent.token || "", text }) });
      const ct = (r.headers.get("content-type") || "");
      if(r.ok && ct.indexOf("json") < 0){ blob = await r.blob(); if(blob && blob.size) ttsCachePut(key, blob); else blob = null; }
    } catch(e){ blob = null; }
  }
  if(!blob){ speak(text, "hi"); return; }      // Piper down → instant browser-voice fallback (no dead air)
  try {
    stopSpeech();
    const url = URL.createObjectURL(blob), a = new Audio(url);
    document.body.classList.add("speaking");
    await new Promise(done => { a.onended = a.onerror = () => { document.body.classList.remove("speaking"); URL.revokeObjectURL(url); done(); }; a.play().catch(() => done()); });
  } catch(e){ speak(text, "hi"); }
}

// ---- STT: push-to-talk → downsample to 16kHz mono WAV in-browser → ai_transcribe ----
async function startRec(){
  _recChunks = [];
  _mediaStream = await navigator.mediaDevices.getUserMedia({ audio:true });
  _recorder = new MediaRecorder(_mediaStream);
  _recorder.ondataavailable = e => { if(e.data && e.data.size) _recChunks.push(e.data); };
  _recorder.start();
}
function stopRec(){
  return new Promise(res => {
    if(!_recorder){ res(null); return; }
    _recorder.onstop = () => {
      try { _mediaStream.getTracks().forEach(t => t.stop()); } catch(e){}
      const blob = new Blob(_recChunks, { type: (_recorder && _recorder.mimeType) || "audio/webm" });
      _recorder = null; _mediaStream = null; res(blob);
    };
    try { _recorder.stop(); } catch(e){ res(null); }
  });
}
async function toWav16k(blob){
  const ac = new (window.AudioContext || window.webkitAudioContext)();
  const decoded = await ac.decodeAudioData(await blob.arrayBuffer());
  try { ac.close(); } catch(e){}
  const off = new OfflineAudioContext(1, Math.max(1, Math.ceil(decoded.duration * 16000)), 16000);
  const src = off.createBufferSource(); src.buffer = decoded; src.connect(off.destination); src.start();
  const rendered = await off.startRendering();
  const s = rendered.getChannelData(0), n = s.length, b = new ArrayBuffer(44 + n*2), v = new DataView(b);
  const W = (o, str) => { for(let i=0;i<str.length;i++) v.setUint8(o+i, str.charCodeAt(i)); };
  W(0,"RIFF"); v.setUint32(4, 36+n*2, true); W(8,"WAVE"); W(12,"fmt "); v.setUint32(16,16,true);
  v.setUint16(20,1,true); v.setUint16(22,1,true); v.setUint32(24,16000,true); v.setUint32(28,32000,true);
  v.setUint16(32,2,true); v.setUint16(34,16,true); W(36,"data"); v.setUint32(40, n*2, true);
  let o = 44; for(let i=0;i<n;i++){ let x = Math.max(-1, Math.min(1, s[i])); v.setInt16(o, x<0 ? x*0x8000 : x*0x7FFF, true); o += 2; }
  return new Blob([b], { type:"audio/wav" });
}
async function transcribe(wavBlob){
  const fd = new FormData();
  fd.append("audio", wavBlob, "clip.wav");
  fd.append("student", currentStudent.id); fd.append("token", currentStudent.token || ""); fd.append("lang", "hi");
  try {
    const r = await fetch(apiURL("ai_transcribe"), { method:"POST", headers: postHeaders(), body: fd });
    if(!r.ok) return null;
    const m = (await r.json()).message;
    return (m && m.ok) ? (m.text || "") : null;
  } catch(e){ return null; }
}

// ---- The floating button + the voice panel ----
function mountRoshniFab(){
  const show = SETTINGS.aiEnabled && !!currentStudent && backendLive;
  let fab = document.getElementById("roshniFab");
  if(!show){ if(fab) fab.remove(); return; }
  if(fab) return;
  fab = el(`<button id="roshniFab" class="roshnifab" aria-label="${escAttr(tx('Ask Roshni','रोशनी से पूछो'))}" title="${escAttr(tx('Ask Roshni','रोशनी से पूछो'))}"><span class="rfabm">${mascotSVG()}</span></button>`);
  fab.onclick = openRoshni;
  document.body.appendChild(fab);
}
function openRoshni(){
  if(!(SETTINGS.aiEnabled && currentStudent) || document.getElementById("roshniWrap")) return;
  sfx.tap(); stopSpeech(); setMood("happy");
  const voice = !!SETTINGS.voiceEnabled, convoId = uid();
  const sheet = el(`<div class="sheetwrap" id="roshniWrap">
    <div class="sheet doubtsheet" role="dialog" aria-modal="true" aria-label="${tx('Roshni','रोशनी')}">
      <div class="doubthead">
        <div class="mascot small m-happy">${mascotSVG()}</div>
        <div class="doubttitle">
          <div class="doubtq">${tx("Ask Roshni 💛","रोशनी से पूछो 💛")}</div>
          <div class="doubtsub">${voice ? tx("Tap the mic and speak in Hindi.","माइक दबाओ और हिंदी में बोलो।") : tx("Type your question in Hindi.","अपना सवाल हिंदी में लिखो।")}</div>
        </div>
      </div>
      ${voice ? `<button class="btn primary wide rmic" id="rMic">🎤 ${tx("Tap to speak","बोलने के लिए दबाओ")}</button>` : ""}
      <div id="rHeard" class="teachbox" style="display:none"></div>
      <div id="rAnswer" class="teachbox" style="display:none"></div>
      <textarea id="rType" rows="2" aria-label="${escAttr(tx('Type your question','अपना सवाल लिखो'))}" style="width:100%;font-size:16px;padding:10px 12px;border:2px solid var(--line);border-radius:12px;background:var(--card);color:var(--ink);font-family:inherit;resize:none;margin-top:10px;" placeholder="${escAttr(voice ? tx('…or type here','…या यहाँ लिखो') : tx('Type your question…','अपना सवाल लिखो…'))}"></textarea>
      <button class="btn ghost wide" id="rSend" style="margin-top:8px;">✨ ${tx("Ask","पूछो")}</button>
      <button class="btn ghost wide" id="rClose" style="margin-top:8px;">${tx("Close","बंद करो")}</button>
    </div>
  </div>`);
  document.body.appendChild(sheet);
  const close = () => { try { stopRec(); } catch(e){} sheet.remove(); };
  sheet.addEventListener("click", e => { if(e.target === sheet) close(); });
  $("#rClose").onclick = () => { sfx.tap(); close(); };
  const heard = $("#rHeard"), ans = $("#rAnswer");

  async function ask(text){
    if(!text || roshniBusy) return;
    roshniBusy = true;
    ans.style.display = "block"; ans.innerHTML = "💭 " + esc(tx("Roshni is thinking…","रोशनी सोच रही है…"));
    const r = await api("ai_ask", { student: currentStudent.id, token: currentStudent.token || "",
      track: (doubtCtx&&doubtCtx.course?doubtCtx.course.key:""), lesson: (doubtCtx&&doubtCtx.lesson?doubtCtx.lesson.key:""),
      activity: (doubtCtx&&doubtCtx.lv?doubtCtx.lv.id:""), prompt: text, lang: state.lang,
      conversation_id: convoId, client_turn_id: uid() }, true);
    roshniBusy = false;
    if(!sheet.isConnected) return;
    if(r && r.ok && r.reply){ ans.innerHTML = "💬 " + esc(r.reply); setMood("happy"); await ttsPlay(r.reply); }
    else { const m = tx("I couldn't answer just now. Try again.","अभी जवाब नहीं दे पाई। फिर कोशिश करो।"); ans.innerHTML = "💛 " + esc(m); await ttsPlay(m); }
  }

  $("#rSend").onclick = () => { const t = ($("#rType").value || "").trim(); if(t) ask(t); else speak(tx("Type your question first.","पहले सवाल लिखो।"), state.lang==="hi"?"hi":"en"); };

  const mic = $("#rMic");
  if(mic){
    let recording = false;
    mic.onclick = async () => {
      if(roshniBusy && !recording) return;             // a turn is mid-flight
      if(!recording){
        try { await startRec(); }
        catch(e){ ans.style.display="block"; ans.innerHTML = "🎤 " + esc(tx("Mic not available — type instead.","माइक नहीं चला — लिखकर पूछो।")); speak(tx("Type your question instead.","लिखकर पूछो।"), state.lang==="hi"?"hi":"en"); return; }
        recording = true; mic.classList.add("rec"); mic.textContent = "⏺ " + tx("Listening… tap to stop","सुन रही हूँ… रोकने को दबाओ");
      } else {
        recording = false; roshniBusy = true; mic.textContent = "⏳ " + tx("Got it…","सुन लिया…");
        const blob = await stopRec();
        let text = null;
        try { if(blob){ text = await transcribe(await toWav16k(blob)); } } catch(e){ text = null; }
        roshniBusy = false;
        mic.classList.remove("rec"); mic.textContent = "🎤 " + tx("Tap to speak","बोलने के लिए दबाओ");
        if(!sheet.isConnected) return;
        if(text){
          heard.style.display = "block";
          heard.innerHTML = "🗣️ " + esc(text) + ` <button class="rok" id="rYes">✓ ${tx("Yes","हाँ")}</button> <button class="rno" id="rNo">✗ ${tx("Again","फिर")}</button>`;
          $("#rYes").onclick = () => { heard.style.display = "none"; ask(text); };
          $("#rNo").onclick  = () => { heard.style.display = "none"; };
        } else {
          heard.style.display = "block"; heard.innerHTML = "🎤 " + esc(tx("I didn't catch that — try again or type.","समझ नहीं पाई — फिर बोलो या लिखो।"));
          speak(tx("I didn't catch that. Try again.","समझ नहीं पाई। फिर बोलो।"), state.lang==="hi"?"hi":"en");
        }
      }
    };
  }
  speak(tx("Ask me anything about your lesson.","अपने पाठ के बारे में कुछ भी पूछो।"), state.lang==="hi"?"hi":"en");
}

// Admin-set defaults from Hikmat Settings: copy the payload into SETTINGS, then (for a user
// who hasn't toggled anything themselves) seed state from them. A user's own choice wins via
// state.prefsTouched, set in the toggle handlers.
function applySettingsDefaults(s){
  if(!s) return;
  if(s.defaultLanguage) SETTINGS.defaultLanguage = s.defaultLanguage;
  if(typeof s.helpDefaultOn === "boolean") SETTINGS.helpDefaultOn = s.helpDefaultOn;
  if(s.defaultTheme) SETTINGS.defaultTheme = s.defaultTheme;
  if(typeof s.defaultSound === "boolean") SETTINGS.defaultSound = s.defaultSound;
}
function applyServerDefaults(){
  if(state.prefsTouched) return;                  // respect the user's own toggles
  if(SETTINGS.defaultLanguage) state.lang = SETTINGS.defaultLanguage;
  state.hindi = !!SETTINGS.helpDefaultOn;
  if(SETTINGS.defaultTheme) state.theme = SETTINGS.defaultTheme;
  state.sound = SETTINGS.defaultSound !== false;
  save();
}

// ---------- boot ----------
state.progress = state.progress || {};
state.hindi = state.hindi===true;
state.lang = state.lang || "en";
state.sound = state.sound!==false;
state.theme = state.theme || "light";
renderHome();          // instant: bundled or cached content, fully offline
refreshCsrf().then(() => {   // CSRF token first — a logged-in session would 400 our POSTs without it
  syncAttempts();            // flush any progress queued while offline
  syncDoubts();              // flush any doubts logged while offline
  syncEvents();              // flush any wrong-answer events queued while offline
});
loadFromBackend().then(async ok => {
  backendLive = ok;
  applyServerDefaults();   // apply admin defaults (theme/sound/lang/help) for an untouched user
  // No forced login wall — everyone lands on Home (playable); the guest sees clear
  // "Log in" / "Sign up" buttons and chooses when to sign in.
  if(ok && currentStudent) await mergeServerProgress();
  if(document.getElementById("homeSections")) renderHome();   // refresh home in place once live content + structure arrive
  refreshTop();
});

// ---------- PWA: install + offline (only when served over http(s); skipped for the file:// build) ----------
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  let reloaded = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if(reloaded) return; reloaded = true; location.reload();    // the new SW took control → load the new build
  });
  function showUpdateToast(worker){
    if(document.getElementById("updToast")) return;             // a refresh is offered, NOT forced — never yank a child mid-activity
    const t = el(`<div id="updToast" role="status" style="position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:9999;background:#2c2440;color:#fff;border-radius:999px;padding:10px 16px;font-weight:800;box-shadow:0 6px 20px rgba(0,0,0,.25);cursor:pointer;font-size:14px">${tx("New version — tap to refresh","नया वर्शन — रिफ्रेश करें")}</div>`);
    t.onclick = () => { t.textContent = tx("Updating…","अपडेट हो रहा है…"); worker.postMessage("SKIP_WAITING"); };
    document.body.appendChild(t);
  }
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/assets/hikmat/sw.js", { scope: "/assets/hikmat/" })
      .then(reg => {
        reg.addEventListener("updatefound", () => {
          const nw = reg.installing;
          nw && nw.addEventListener("statechange", () => {
            if(nw.state === "installed" && navigator.serviceWorker.controller) showUpdateToast(nw);
          });
        });
      })
      .catch(e => console.warn("Hikmat SW registration failed:", e));
  });
}
</script>
