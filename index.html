      sfx.tap(); stopSpeech();
      sendBtn.disabled = true;
      ans.style.display = "block";
      ans.innerHTML = "💭 " + esc(tx("Roshni is thinking…","रोशनी सोच रही है…"));
      speak(tx("Let me think.","ज़रा सोचती हूँ।"), state.lang==="hi"?"hi":"en");
      const r = await api("ai_ask", {
        student: currentStudent.id, token: currentStudent.token || "",
        track: ctxSnap.course.key, lesson: ctxSnap.lesson.key, activity: ctxSnap.lv.id,
        prompt: text, lang: state.lang, conversation_id: convoId, client_turn_id: uid()
      }, true);
      if(!sheet.isConnected) return;                 // she closed/changed screen mid-call — don't speak a stale answer
      sendBtn.disabled = false;
      if(r && r.ok && r.reply){
        ans.innerHTML = "💬 " + esc(r.reply);
        setMood("happy");
        speak(r.reply, "hi");                        // Roshni answers in Hindi (Hindi-primary, audio-first)
      } else {
        const m = tx("I couldn't answer just now. Tap 'Tell the teacher', or try again.",
                     "अभी जवाब नहीं दे पाई। 'टीचर को बताओ' दबाओ, या फिर से कोशिश करो।");
        ans.innerHTML = "💛 " + esc(m);
        speak(m, state.lang==="hi"?"hi":"en");       // a non-reader must always HEAR the outcome
      }
    };
  }
  // auto-read the warm invite so the audio-first child hears the offer
  speak(roshniLine, state.lang==="hi"?"hi":"en");
}

// ---------- Learning-event stream (analytics Layer 1: wrong answers) ----------
// Every wrong pick is queued offline (like doubts) and synced to log_event, so the
// facilitator's "Hardest Questions" report can show WHICH question broke down and
// what the girls picked instead — the final score alone can't tell you that.
const EVENT_QUEUE = "hikmat_event_queue";
function _readEvents(){ try { return JSON.parse(localStorage.getItem(EVENT_QUEUE)) || []; } catch(e){ return []; } }
function _saveEvents(q){ try { localStorage.setItem(EVENT_QUEUE, JSON.stringify(q.slice(-400))) ; } catch(e){} }  // cap: never blow localStorage
function recordEvent(ev){
  const q = _readEvents();
  q.push({ ...ev,
           student: currentStudent ? currentStudent.id : "",
           token: currentStudent ? (currentStudent.token || "") : "",
           lang: state.lang, client_id: uid() });
  _saveEvents(q);
  syncEvents();
}
let _syncingEvents = false;
async function syncEvents(){
  if(_syncingEvents) return;
  const q = _readEvents();
  if(!q.length) return;
  _syncingEvents = true;
  const remaining = [];
  try {
    for(const ev of q){
      try {
        const r = await fetch(apiURL("log_event"), { method:"POST", headers: postHeaders(), body:new URLSearchParams(ev) });
        if(!r.ok){ remaining.push(ev); continue; }
      } catch(e){ remaining.push(ev); }
    }
    const seen = new Set(q.map(x => JSON.stringify(x)));
    _readEvents().forEach(x => { if(!seen.has(JSON.stringify(x))) remaining.push(x); });
    _saveEvents(remaining);
  } finally { _syncingEvents = false; }
}

// ---------- Learning-event stream (analytics Layer 2: dwell time + tool usage) ----------
// Dwell: one timer per activity, paused while the tab is hidden. A FINISHED activity
// ships its seconds on the Lesson Attempt itself; leaving mid-activity emits a
// kind="dwell" event instead — the bail-out signal the attempt row can't carry.
let ACT = null;   // {course, lesson, lv, t0, acc} — the activity being timed right now
function actStart(course, lesson, lv){
  actEnd(false);                       // leftover session (shouldn't happen) counts as abandoned
  ACT = { course, lesson, lv, t0: Date.now(), acc: 0 };
}
function actSecs(){
  if(!ACT) return 0;
  return Math.round((ACT.acc + (document.hidden ? 0 : Date.now() - ACT.t0)) / 1000);
}
function actEnd(completed){
  if(!ACT) return 0;
  const secs = Math.min(actSecs(), 7200), a = ACT;
  ACT = null;
  flushTools();                        // ship this activity's tool taps alongside it
  if(!completed && secs >= 5)          // <5s = misclick, not a bail-out
    recordEvent({ kind:"dwell", track:a.course.key, lesson:a.lesson.key, activity:a.lv.id,
                  duration_secs: secs });
  return secs;
}
document.addEventListener("visibilitychange", () => {
  if(!ACT) return;
  if(document.hidden) ACT.acc += Date.now() - ACT.t0;   // pause: bank the visible time
  else ACT.t0 = Date.now();                             // resume the clock
});

// Tool taps (🔊 listen, language switch, Hindi guide, replays …) are counted per
// (tool, current activity) and flushed as ONE batched event — not one POST per tap.
let TOOL_COUNTS = {};
let _toolTimer = null;
function logTool(tool){
  const k = ACT ? [tool, ACT.course.key, ACT.lesson.key, ACT.lv.id].join("|")
                : tool + "|||";
  TOOL_COUNTS[k] = (TOOL_COUNTS[k] || 0) + 1;
  clearTimeout(_toolTimer);
  _toolTimer = setTimeout(flushTools, 15000);           // idle flush for taps outside gameplay
}
function flushTools(){
  clearTimeout(_toolTimer); _toolTimer = null;
  const counts = TOOL_COUNTS; TOOL_COUNTS = {};
  for(const k in counts){
    const p = k.split("|");
    recordEvent({ kind:"tool_use", tool:p[0], track:p[1], lesson:p[2], activity:p[3],
                  count: counts[k] });
  }
}
// Leaving the page: bank everything into localStorage (recordEvent is synchronous)
// so the next visit's boot flush ships it. flushTools too — actEnd no-ops outside gameplay.
window.addEventListener("pagehide", () => { actEnd(false); flushTools(); });

// ============================================================
//  ATTENDANCE — the device banks a logged-in student's ACTIVE screen time and
//  flushes small deltas to the server (offline-queued, idempotent). Facilitator
//  report only: nothing about attendance is EVER shown to a student — no timers,
//  no progress rings, no blocking. Guests and offline-local profiles are never
//  tracked. "Active" = tab visible AND input (or video playback) within 3 minutes;
//  a lid-closed laptop can't bank phantom hours (per-bank clamp), and a clock set
//  backwards can't bank negative time.
// ============================================================
const ATT_QUEUE       = "hikmat_att_queue";   // ping queue (mirrors ATTEMPT_QUEUE)
const ATT_STORE       = "hikmat_att_";        // per-student day store: hikmat_att_<id> = {"2026-07-06": {s, q}}
const ATT_IDLE_MS     = 3 * 60 * 1000;        // no input for 3 min → the clock stops
const ATT_TICK_MS     = 30 * 1000;            // bank every 30s (crash-safe, ≤30s midnight error)
const ATT_FLUSH_SECS  = 5 * 60;               // enqueue a delta every ~5 active minutes
const ATT_PING_MAX    = 900;                  // one ping ≤15 min (server clamps identically)
const ATT_KEEP_DAYS   = 30;                   // day-store horizon (= the server's date window)
let ATT = null;                               // {sid, t0, lastActivity} — running only while eligible
let _attInterval = null;
function attEligible(){
  return !!(currentStudent && !currentStudent.local) && !document.hidden;
}
// local YYYY-MM-DD — NOT toISOString() (UTC), which would file IST mornings on yesterday
function attToday(){
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function attDeviceId(){
  let id = null;
  try { id = localStorage.getItem("hikmat_device_id"); } catch(e){}
  if(!id){ id = uid(); try { localStorage.setItem("hikmat_device_id", id); } catch(e){} }
  return id;
}
function _attRead(sid){ try { return JSON.parse(localStorage.getItem(ATT_STORE + sid)) || {}; } catch(e){ return {}; } }
function _attWrite(sid, obj){
  try {
    const keys = Object.keys(obj).sort();
    while(keys.length > ATT_KEEP_DAYS) delete obj[keys.shift()];
    localStorage.setItem(ATT_STORE + sid, JSON.stringify(obj));
  } catch(e){}
}
function attResume(){
  if(ATT || !attEligible()) return;
  ATT = { sid: currentStudent.id, t0: Date.now(), lastActivity: Date.now() };
  if(!_attInterval) _attInterval = setInterval(attTick, ATT_TICK_MS);
}
// Move elapsed time into the day store. Per-bank clamp = tick + 60s slack: an OS-sleep
// gap (the interval doesn't fire while asleep) banks at most 90s on wake, not all night.
function attBank(until){
  if(!ATT) return;
  const now = until || Date.now();
  const secs = Math.max(0, Math.min(Math.round((now - ATT.t0) / 1000), ATT_TICK_MS/1000 + 60));
  ATT.t0 = Math.max(ATT.t0, now);
  if(secs <= 0) return;
  const st = _attRead(ATT.sid), day = attToday();
  st[day] = st[day] || { s: 0, q: 0 };
  st[day].s += secs;
  _attWrite(ATT.sid, st);
}
function attPause(until){
  if(!ATT) return;
  attBank(until);
  const sid = ATT.sid;
  ATT = null;
  if(_attInterval){ clearInterval(_attInterval); _attInterval = null; }
  attMaybeFlush(sid, true);
}
function attTick(){
  if(!ATT) return;
  if(document.hidden){ attPause(); return; }                   // hidden time is NEVER active time
  if(Date.now() - ATT.lastActivity > ATT_IDLE_MS){
    attPause(ATT.lastActivity + ATT_IDLE_MS);                  // credit the idle window once, then stop
    return;
  }
  attBank();
  attMaybeFlush(ATT.sid, false);
}
// Enqueue unsent deltas. Today's residue waits for the 5-minute threshold unless forced;
// PREVIOUS days always flush from 5s up — an end-of-day tail must never age out unsent.
function attMaybeFlush(sid, force){
  if(!sid || !currentStudent || currentStudent.id !== sid) return;   // flush only under the owner's token
  const st = _attRead(sid), today = attToday();
  let changed = false;
  for(const day in st){
    const e = st[day];
    let delta = (e.s || 0) - (e.q || 0);
    const min = (day !== today || force) ? 5 : ATT_FLUSH_SECS;
    while(delta >= min){
      const send = Math.min(delta, ATT_PING_MAX);
      const q = _readAtt();
      q.push({ student: sid, token: currentStudent.token || "", date: day, secs: send,
               device_id: attDeviceId(), client_id: uid() });
      _saveAtt(q);
      e.q = (e.q || 0) + send;
      delta -= send;
      changed = true;
    }
  }
  if(changed){ _attWrite(sid, st); syncAttendance(); }
}
function _readAtt(){ try { return JSON.parse(localStorage.getItem(ATT_QUEUE)) || []; } catch(e){ return []; } }
function _saveAtt(q){ try { localStorage.setItem(ATT_QUEUE, JSON.stringify(q.slice(-400))); } catch(e){} }
let _syncingAtt = false;
async function syncAttendance(){
  if(_syncingAtt) return;
  const q = _readAtt();
  if(!q.length) return;
  _syncingAtt = true;
  const remaining = [];
  try {
    for(const p of q){
      try {
        const r = await fetch(apiURL("log_attendance"), { method:"POST", headers: postHeaders(), body:new URLSearchParams(p) });
        if(!r.ok){ remaining.push(p); continue; }               // network/HTTP error → retry later
        let body = null; try { body = (await r.json()).message; } catch(e){}
        if(body && body.ok === false && body.error === "rate_limited") remaining.push(p);
        // success, or a permanent rejection (auth / date window / bad secs) → drop
      } catch(e){ remaining.push(p); }
    }
    const seen = new Set(q.map(x => JSON.stringify(x)));
    _readAtt().forEach(x => { if(!seen.has(JSON.stringify(x))) remaining.push(x); });
    _saveAtt(remaining);
  } finally { _syncingAtt = false; }
}
window.addEventListener("online", syncAttendance);
// Best-effort last-gasp ship of the newest queued ping on pagehide. The entry stays
// queued — server-side client_id dedup makes the inevitable double-send harmless.
function attBeacon(){
  try {
    if(!("sendBeacon" in navigator) || !location.protocol.startsWith("http")) return;
    const q = _readAtt();
    if(!q.length) return;
    navigator.sendBeacon(apiURL("log_attendance"),
      new Blob([new URLSearchParams(q[q.length-1]).toString()], { type: "application/x-www-form-urlencoded" }));
  } catch(e){}
}
// activity signals: passive capture-phase listeners — zero interference with game handlers
["pointerdown","keydown","touchstart"].forEach(ev =>
  document.addEventListener(ev, () => {
    if(ATT) ATT.lastActivity = Date.now();
    else if(attEligible()) attResume();
  }, { capture: true, passive: true }));
document.addEventListener("visibilitychange", () => {
  if(document.hidden) attPause();                              // pause — hidden must not bank
  else attResume();
});
window.addEventListener("pagehide", () => { attPause(); attBeacon(); flushVideoWatch(); });
function attInit(){
  attResume();                                                 // reload-while-logged-in
  if(currentStudent && !currentStudent.local) attMaybeFlush(currentStudent.id, true);  // last session's residue
}

// ---------- identity & login (only when served from Frappe; offline = guest) ----------
function setStudent(stu){
  attPause();                           // bank + flush the OUTGOING student under her own id/token
  currentStudent = stu || null;
  showAllClasses = false;               // a fresh login starts focused on the student's own class
  if(stu) localStorage.setItem("hikmat_current", JSON.stringify(stu));
  else localStorage.removeItem("hikmat_current");
  state = loadState();                  // swap to this identity's saved progress
  attResume();                          // start the incoming student's clock (no-op for guests)
}
async function mergeServerProgress(){
  if(!currentStudent) return;
  const res = await api("get_progress", { student: currentStudent.id, token: currentStudent.token || "" });
  const p = res && res.progress;
  if(!p) return;
  for(const ck in p) for(const lk in p[ck]) for(const aid in p[ck][lk]) setStars(ck, lk, aid, p[ck][lk][aid]);
  if(res.gates) state.gates = res.gates;   // server-authoritative belt clearing syncs down here
  if(typeof res.gems === "number") state.coins = Math.max(state.coins||0, res.gems);  // gem total follows her across laptops
  // Module tests: monotone unions, safe under any interleaving of devices and queues.
  if(res.tests){
    state.testPassed = state.testPassed || {};
    for(const tk in res.tests){
      const s = res.tests[tk], l = state.testPassed[tk] || { passed:false, bestPct:0, attempts:0 };
      state.testPassed[tk] = { passed: l.passed || !!s.passed,
                               bestPct: Math.max(l.bestPct||0, s.bestPct||0),
                               attempts: Math.max(l.attempts||0, s.attempts||0) };
    }
  }
  if(res.testSeen){                        // her no-repeat guarantee follows her to a NEW device
    state.testSeen = state.testSeen || {};
    for(const tk in res.testSeen){
      const dst = state.testSeen[tk] = state.testSeen[tk] || [];
      res.testSeen[tk].forEach(id => { if(!dst.includes(id)) dst.push(id); });
    }
  }
  save();
}

// ONLINE auth — remote learners are real Frappe Website Users (username + PIN, no email).
// Login goes through Frappe's own /api/method/login (sets the session cookie), then we load
// the linked Student via get_my_student. Signup goes through hikmat.signup_online (invite code).
async function frappeLogin(usr, pwd){
  try {
    const r = await fetch(BACKEND_BASE + "/api/method/login", {
      method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded", ...postHeaders() },
      body: new URLSearchParams({ usr, pwd }),
    });
    if(r.ok) await refreshCsrf();                  // new session → new CSRF token for our POSTs
    return r.ok;                                   // 200 = logged in (cookie set); 401 = bad creds
  } catch(e){ return false; }                      // offline / no backend
}

// ---------- CAMPUS device: offline roster login ----------
// A campus laptop is provisioned once (renderDeviceSetup) by a facilitator: it caches the
// campus roster (names + avatars + PIN hashes + tokens). Girls then tap their name and type a
// PIN verified ON-DEVICE against the cached werkzeug hash, so login works with no network.
// Attempts sync when the laptop is next online (the cached token authorises them).
const DEVICE_MODE_KEY = "hikmat_device_mode";       // "campus" | "" (online/personal — the default)
const CAMPUS_ROSTER_KEY = "hikmat_campus_roster";   // { campus, ts, students:[{id,name,avatar,pinHash,token,band}] }
function deviceMode(){ try { return localStorage.getItem(DEVICE_MODE_KEY) || ""; } catch(e){ return ""; } }
function campusRoster(){ try { return JSON.parse(localStorage.getItem(CAMPUS_ROSTER_KEY)); } catch(e){ return null; } }
function setCampusDevice(campus, students){
  try {
    localStorage.setItem(CAMPUS_ROSTER_KEY, JSON.stringify({ campus, ts: Date.now(), students: students || [] }));
    localStorage.setItem(DEVICE_MODE_KEY, "campus");
  } catch(e){}
}
function clearCampusDevice(){ try { localStorage.removeItem(CAMPUS_ROSTER_KEY); localStorage.removeItem(DEVICE_MODE_KEY); } catch(e){} }
function startLogin(){ deviceMode()==="campus" ? renderCampusLogin() : renderLogin(); }   // route by device

// Verify a PIN against werkzeug's "pbkdf2:sha256:<iters>$<salt>$<hex>" hash entirely in-browser
// (validated to match werkzeug's output). Constant-time-ish hex compare.
async function pbkdf2Verify(stored, pin){
  try {
    const m = /^pbkdf2:sha256:(\d+)\$([^$]+)\$([0-9a-f]+)$/.exec(stored || "");
    if(!m) return false;
    const iters = parseInt(m[1], 10), salt = m[2], expected = m[3], enc = new TextEncoder();
    const key = await crypto.subtle.importKey("raw", enc.encode(pin), { name: "PBKDF2" }, false, ["deriveBits"]);
    const bits = await crypto.subtle.deriveBits({ name: "PBKDF2", salt: enc.encode(salt), iterations: iters, hash: "SHA-256" }, key, 256);
    const hex = [...new Uint8Array(bits)].map(b => b.toString(16).padStart(2, "0")).join("");
    if(hex.length !== expected.length) return false;
    let diff = 0; for(let i = 0; i < hex.length; i++) diff |= hex.charCodeAt(i) ^ expected.charCodeAt(i);
    return diff === 0;
  } catch(e){ return false; }
}

async function finishLogin(stu){
  sfx.enter();
  const guestSnap = snapshotGuestProgress();     // capture any preview stars BEFORE we swap identity
  setStudent({ id: stu.id, name: stu.name, avatar: stu.avatar || "🙂", token: stu.token, band: stu.band || "" });

  await mergeServerProgress();
  renderHome();
}

// ============================================================
//  Roshni voice assistant — floating mic + local Whisper(STT)/Piper(TTS) via Frappe.
//  All calls go same-origin through api()/fetch to the Frappe proxies (no CORS; the model
//  daemons stay bound to 127.0.0.1). Graceful: degrades to typed input + speechSynthesis if
//  voice is off or a daemon is down. Single-flight (Whisper shares the GPU with the LLM).
//  Audio never leaves the Mac; only the transcript is logged (server-side, via ai_ask).
// ============================================================
let roshniBusy = false;                 // single-flight: one STT or LLM turn at a time
let _recorder = null, _mediaStream = null, _recChunks = [];

// ---- TTS: Piper via Frappe, cached in IndexedDB so each phrase is synthesized once ----
let _ttsDB = null;
function ttsDB(){
  return new Promise(res => {
    if(_ttsDB) return res(_ttsDB);
    try {
      const rq = indexedDB.open("hikmat_tts", 1);
      rq.onupgradeneeded = () => { try { rq.result.createObjectStore("wav"); } catch(e){} };
      rq.onsuccess = () => { _ttsDB = rq.result; res(_ttsDB); };
      rq.onerror = () => res(null);
    } catch(e){ res(null); }
  });
}
function ttsCacheGet(key){
  return new Promise(async res => {
    const db = await ttsDB(); if(!db) return res(null);
    try { const t = db.transaction("wav","readonly").objectStore("wav").get(key);
          t.onsuccess = () => res(t.result || null); t.onerror = () => res(null); }
    catch(e){ res(null); }
  });
}
function ttsCachePut(key, blob){
  ttsDB().then(db => { if(db){ try { db.transaction("wav","readwrite").objectStore("wav").put(blob, key); } catch(e){} } });
}
// Speak a Hindi line the natural way (Piper) when voice is on; else the built-in voice.
// Always resolves (never throws) so a caller can await it safely.
async function ttsPlay(text){
  if(!text) return;
  if(!(SETTINGS.voiceEnabled && currentStudent)){ speak(text, "hi"); return; }
  const key = "v1:" + text;
  let blob = await ttsCacheGet(key);
  if(!blob){
    try {
      const r = await fetch(apiURL("ai_tts"), { method:"POST", headers: postHeaders(),
        body: new URLSearchParams({ student: currentStudent.id, token: currentStudent.token || "", text }) });
      const ct = (r.headers.get("content-type") || "");
      if(r.ok && ct.indexOf("json") < 0){ blob = await r.blob(); if(blob && blob.size) ttsCachePut(key, blob); else blob = null; }
    } catch(e){ blob = null; }
  }
  if(!blob){ speak(text, "hi"); return; }      // Piper down → instant browser-voice fallback (no dead air)
  try {
    stopSpeech();
    const url = URL.createObjectURL(blob), a = new Audio(url);
    document.body.classList.add("speaking");
    await new Promise(done => { a.onended = a.onerror = () => { document.body.classList.remove("speaking"); URL.revokeObjectURL(url); done(); }; a.play().catch(() => done()); });
  } catch(e){ speak(text, "hi"); }
}

// ---- STT: push-to-talk → downsample to 16kHz mono WAV in-browser → ai_transcribe ----
async function startRec(){
  _recChunks = [];
  _mediaStream = await navigator.mediaDevices.getUserMedia({ audio:true });
  _recorder = new MediaRecorder(_mediaStream);
  _recorder.ondataavailable = e => { if(e.data && e.data.size) _recChunks.push(e.data); };
  _recorder.start();
}
function stopRec(){
  return new Promise(res => {
    if(!_recorder){ res(null); return; }
    _recorder.onstop = () => {
      try { _mediaStream.getTracks().forEach(t => t.stop()); } catch(e){}
      const blob = new Blob(_recChunks, { type: (_recorder && _recorder.mimeType) || "audio/webm" });
      _recorder = null; _mediaStream = null; res(blob);
    };
    try { _recorder.stop(); } catch(e){ res(null); }
  });
}
async function toWav16k(blob){
  const ac = new (window.AudioContext || window.webkitAudioContext)();
  const decoded = await ac.decodeAudioData(await blob.arrayBuffer());
  try { ac.close(); } catch(e){}
  const off = new OfflineAudioContext(1, Math.max(1, Math.ceil(decoded.duration * 16000)), 16000);
  const src = off.createBufferSource(); src.buffer = decoded; src.connect(off.destination); src.start();
  const rendered = await off.startRendering();
  const s = rendered.getChannelData(0), n = s.length, b = new ArrayBuffer(44 + n*2), v = new DataView(b);
  const W = (o, str) => { for(let i=0;i<str.length;i++) v.setUint8(o+i, str.charCodeAt(i)); };
  W(0,"RIFF"); v.setUint32(4, 36+n*2, true); W(8,"WAVE"); W(12,"fmt "); v.setUint32(16,16,true);
  v.setUint16(20,1,true); v.setUint16(22,1,true); v.setUint32(24,16000,true); v.setUint32(28,32000,true);
  v.setUint16(32,2,true); v.setUint16(34,16,true); W(36,"data"); v.setUint32(40, n*2, true);
  let o = 44; for(let i=0;i<n;i++){ let x = Math.max(-1, Math.min(1, s[i])); v.setInt16(o, x<0 ? x*0x8000 : x*0x7FFF, true); o += 2; }
  return new Blob([b], { type:"audio/wav" });
}
async function transcribe(wavBlob){
  const fd = new FormData();
  fd.append("audio", wavBlob, "clip.wav");
  fd.append("student", currentStudent.id); fd.append("token", currentStudent.token || ""); fd.append("lang", "hi");
  try {
    const r = await fetch(apiURL("ai_transcribe"), { method:"POST", headers: postHeaders(), body: fd });
    if(!r.ok) return null;
    const m = (await r.json()).message;
    return (m && m.ok) ? (m.text || "") : null;
  } catch(e){ return null; }
}

// ---- The floating button + the voice panel ----
function mountRoshniFab(){
  // never during a module test — an in-page AI tutor overlay trips no anti-cheat guard
  // and could answer the very question on screen (armTestGuards also removes it)
  const show = SETTINGS.aiEnabled && !!currentStudent && backendLive && !TEST;
  let fab = document.getElementById("roshniFab");
  if(!show){ if(fab) fab.remove(); return; }
  if(fab) return;
  fab = el(`<button id="roshniFab" class="roshnifab" aria-label="${escAttr(tx('Ask Roshni','रोशनी से पूछो'))}" title="${escAttr(tx('Ask Roshni','रोशनी से पूछो'))}"><span class="rfabm">${mascotSVG()}</span></button>`);
  fab.onclick = openRoshni;
  document.body.appendChild(fab);
}
function openRoshni(){
  if(!(SETTINGS.aiEnabled && currentStudent) || document.getElementById("roshniWrap")) return;
  sfx.tap(); stopSpeech(); setMood("happy");
  const voice = !!SETTINGS.voiceEnabled, convoId = uid();
  const sheet = el(`<div class="sheetwrap" id="roshniWrap">
    <div class="sheet doubtsheet" role="dialog" aria-modal="true" aria-label="${tx('Roshni','रोशनी')}">
      <div class="doubthead">
        <div class="mascot small m-happy">${mascotSVG()}</div>
        <div class="doubttitle">
          <div class="doubtq">${tx("Ask Roshni 💛","रोशनी से पूछो 💛")}</div>
          <div class="doubtsub">${voice ? tx("Tap the mic and speak in Hindi.","माइक दबाओ और हिंदी में बोलो।") : tx("Type your question in Hindi.","अपना सवाल हिंदी में लिखो।")}</div>
        </div>
      </div>
      ${voice ? `<button class="btn primary wide rmic" id="rMic">🎤 ${tx("Tap to speak","बोलने के लिए दबाओ")}</button>` : ""}
      <div id="rHeard" class="teachbox" style="display:none"></div>
      <div id="rAnswer" class="teachbox" style="display:none"></div>
      <textarea id="rType" rows="2" aria-label="${escAttr(tx('Type your question','अपना सवाल लिखो'))}" style="width:100%;font-size:16px;padding:10px 12px;border:2px solid var(--line);border-radius:12px;background:var(--card);color:var(--ink);font-family:inherit;resize:none;margin-top:10px;" placeholder="${escAttr(voice ? tx('…or type here','…या यहाँ लिखो') : tx('Type your question…','अपना सवाल लिखो…'))}"></textarea>
      <button class="btn ghost wide" id="rSend" style="margin-top:8px;">✨ ${tx("Ask","पूछो")}</button>
      <button class="btn ghost wide" id="rClose" style="margin-top:8px;">${tx("Close","बंद करो")}</button>
    </div>
  </div>`);
  document.body.appendChild(sheet);
  const close = () => { try { stopRec(); } catch(e){} sheet.remove(); };
  sheet.addEventListener("click", e => { if(e.target === sheet) close(); });
  $("#rClose").onclick = () => { sfx.tap(); close(); };
  const heard = $("#rHeard"), ans = $("#rAnswer");

  async function ask(text){
    if(!text || roshniBusy) return;
    roshniBusy = true;
    ans.style.display = "block"; ans.innerHTML = "💭 " + esc(tx("Roshni is thinking…","रोशनी सोच रही है…"));
    const r = await api("ai_ask", { student: currentStudent.id, token: currentStudent.token || "",
      track: (doubtCtx&&doubtCtx.course?doubtCtx.course.key:""), lesson: (doubtCtx&&doubtCtx.lesson?doubtCtx.lesson.key:""),
      activity: (doubtCtx&&doubtCtx.lv?doubtCtx.lv.id:""), prompt: text, lang: state.lang,
      conversation_id: convoId, client_turn_id: uid() }, true);
    roshniBusy = false;
    if(!sheet.isConnected) return;
    if(r && r.ok && r.reply){ ans.innerHTML = "💬 " + esc(r.reply); setMood("happy"); await ttsPlay(r.reply); }
    else { const m = tx("I couldn't answer just now. Try again.","अभी जवाब नहीं दे पाई। फिर कोशिश करो।"); ans.innerHTML = "💛 " + esc(m); await ttsPlay(m); }
  }

  $("#rSend").onclick = () => { const t = ($("#rType").value || "").trim(); if(t) ask(t); else speak(tx("Type your question first.","पहले सवाल लिखो।"), state.lang==="hi"?"hi":"en"); };

  const mic = $("#rMic");
  if(mic){
    let recording = false;
    mic.onclick = async () => {
      if(roshniBusy && !recording) return;             // a turn is mid-flight
      if(!recording){
        try { await startRec(); }
        catch(e){ ans.style.display="block"; ans.innerHTML = "🎤 " + esc(tx("Mic not available — type instead.","माइक नहीं चला — लिखकर पूछो।")); speak(tx("Type your question instead.","लिखकर पूछो।"), state.lang==="hi"?"hi":"en"); return; }
        recording = true; mic.classList.add("rec"); mic.textContent = "⏺ " + tx("Listening… tap to stop","सुन रही हूँ… रोकने को दबाओ");
      } else {
        recording = false; roshniBusy = true; mic.textContent = "⏳ " + tx("Got it…","सुन लिया…");
        const blob = await stopRec();
        let text = null;
        try { if(blob){ text = await transcribe(await toWav16k(blob)); } } catch(e){ text = null; }
        roshniBusy = false;
        mic.classList.remove("rec"); mic.textContent = "🎤 " + tx("Tap to speak","बोलने के लिए दबाओ");
        if(!sheet.isConnected) return;
        if(text){
          heard.style.display = "block";
          heard.innerHTML = "🗣️ " + esc(text) + ` <button class="rok" id="rYes">✓ ${tx("Yes","हाँ")}</button> <button class="rno" id="rNo">✗ ${tx("Again","फिर")}</button>`;
          $("#rYes").onclick = () => { heard.style.display = "none"; ask(text); };
          $("#rNo").onclick  = () => { heard.style.display = "none"; };
        } else {
          heard.style.display = "block"; heard.innerHTML = "🎤 " + esc(tx("I didn't catch that — try again or type.","समझ नहीं पाई — फिर बोलो या लिखो।"));
          speak(tx("I didn't catch that. Try again.","समझ नहीं पाई। फिर बोलो।"), state.lang==="hi"?"hi":"en");
        }
      }
    };
  }
  speak(tx("Ask me anything about your lesson.","अपने पाठ के बारे में कुछ भी पूछो।"), state.lang==="hi"?"hi":"en");
}

// Admin-set defaults from Hikmat Settings: copy the payload into SETTINGS, then (for a user
// who hasn't toggled anything themselves) seed state from them. A user's own choice wins via
// state.prefsTouched, set in the toggle handlers.
function applySettingsDefaults(s){
  if(!s) return;
  if(s.defaultLanguage) SETTINGS.defaultLanguage = s.defaultLanguage;
  if(typeof s.helpDefaultOn === "boolean") SETTINGS.helpDefaultOn = s.helpDefaultOn;
  if(s.defaultTheme) SETTINGS.defaultTheme = s.defaultTheme;
  if(typeof s.defaultSound === "boolean") SETTINGS.defaultSound = s.defaultSound;
}
function applyServerDefaults(){
  if(state.prefsTouched) return;                  // respect the user's own toggles
  if(SETTINGS.defaultLanguage) state.lang = SETTINGS.defaultLanguage;
  state.hindi = !!SETTINGS.helpDefaultOn;
  if(SETTINGS.defaultTheme) state.theme = SETTINGS.defaultTheme;
  state.sound = SETTINGS.defaultSound !== false;
  save();
}

// ---------- boot ----------
state.progress = state.progress || {};
state.hindi = state.hindi===true;
state.lang = state.lang || "en";
state.sound = state.sound!==false;
state.theme = state.theme || "light";
state.testSeen = state.testSeen || {};       // states saved before module tests existed
state.testPassed = state.testPassed || {};
state.videosSeen = state.videosSeen || {};
renderHome();          // instant: bundled or cached content, fully offline
attInit();             // attendance clock for an already-logged-in reload (no-op for guests)
refreshCsrf().then(() => {   // CSRF token first — a logged-in session would 400 our POSTs without it
  syncAttempts();            // flush any progress queued while offline
  syncTests();               // flush any module-test attempts queued while offline
  syncDoubts();              // flush any doubts logged while offline
  syncEvents();              // flush any wrong-answer events queued while offline
  syncAttendance();          // flush any attendance pings queued while offline
});
loadFromBackend().then(async ok => {
  backendLive = ok;
  applyServerDefaults();   // apply admin defaults (theme/sound/lang/help) for an untouched user
  // No forced login wall — everyone lands on Home (playable); the guest sees clear
  // "Log in" / "Sign up" buttons and chooses when to sign in.
  if(ok && currentStudent) await mergeServerProgress();
  if(document.getElementById("homeSections")) renderHome();   // refresh home in place once live content + structure arrive
  refreshTop();
});

// ---------- PWA: install + offline (only when served over http(s); skipped for the file:// build) ----------
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  let reloaded = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if(reloaded) return; reloaded = true; location.reload();    // the new SW took control → load the new build
  });
  function showUpdateToast(worker){
    if(document.getElementById("updToast")) return;             // a refresh is offered, NOT forced — never yank a child mid-activity
    const t = el(`<div id="updToast" role="status" style="position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:9999;background:#2c2440;color:#fff;border-radius:999px;padding:10px 16px;font-weight:800;box-shadow:0 6px 20px rgba(0,0,0,.25);cursor:pointer;font-size:14px">${tx("New version — tap to refresh","नया वर्शन — रिफ्रेश करें")}</div>`);
    t.onclick = () => { t.textContent = tx("Updating…","अपडेट हो रहा है…"); worker.postMessage("SKIP_WAITING"); };
    document.body.appendChild(t);
  }
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/assets/hikmat/sw.js", { scope: "/assets/hikmat/" })
      .then(reg => {
        reg.addEventListener("updatefound", () => {
          const nw = reg.installing;
          nw && nw.addEventListener("statechange", () => {
            if(nw.state === "installed" && navigator.serviceWorker.controller) showUpdateToast(nw);
          });
        });
      })
      .catch(e => console.warn("Hikmat SW registration failed:", e));
  });
}
</script>
