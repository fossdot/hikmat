function renderTrack(course, back){
  back = back || { label: tx("← Home","← घर"), fn: renderHome };
  stopSpeech();
  rerender = () => renderTrack(course, back);
  root.innerHTML = "";
  const s = el(`<div class="screen">
    <div class="maphead">
      <div><h2>${iconFor(["track:"+course.key, "subject:"+course.subject], course.icon)} ${esc(tx(course.title, course.titleHi))}</h2>
      <div class="sub">${tx("Choose a lesson","कोई पाठ चुनो")}</div></div>
    </div>
    <div class="path" id="path"></div>
  </div>`);
  root.appendChild(s);
  setBack(back.label, back.fn);
  const wrap = $("#path");
  // a lesson is "complete" (green) once every one of its activities has at least 1 star
  const isComplete = ls => levelsFor(ls).every(lv => getStars(course.key, ls.key, lv.id) > 0);
  const firstIncomplete = course.lessons.findIndex(ls => !isComplete(ls));
  const items = course.lessons.map((ls, i) => {
    const earned = lessonEarned(course.key, ls.key);
    const done = isComplete(ls);
    const cls = done ? "done" : (i===firstIncomplete ? "current" : "");
    return {
      cls,
      num: i+1,               // keep lesson numbering stable even when a video node sits above
      face: done ? "✓" : "📚",
      extras: cls==="current" ? `<span class="starttag">${tx("START","शुरू")}</span><span class="sparkle">✨</span>` : "",
      label: tx(ls.title, ls.titleHi),
      sub: `<span class="lstars"><span class="staricon">★</span> ${earned}/${lessonMax(ls)}</span>`,
      onClick: () => { if(!guestGate(course, ls, back)) return; if(!gateGate(course, ls, back)) return; if(!testGate(course, ls, back)) return; sfx.enter(); renderLessonMap(course, ls, back); },
    };
  });
  let narr = tx(course.title,course.titleHi)+". "+tx("Choose a lesson.","कोई पाठ चुनो।");
  // 📺 optional explainer video sits at the TOP of the trail — never gates progress
  if(course.videoUrl){
    items.unshift({
      cls: (state.videosSeen||{})[course.key] ? "done" : "",
      num: "▶", face: "📺",
      label: tx(course.videoTitle || "Watch the video", course.videoTitleHi || course.videoTitle || "वीडियो देखो"),
      sub: videoNodeSub(course),
      onClick: () => { sfx.enter(); renderVideo(course, back); },
    });
    narr += " " + tx("There is a video lesson at the top.","सबसे ऊपर एक वीडियो पाठ है।");
  }
  // 🏆 the module test closes the trail — unlocked once every lesson has ≥1 star everywhere
  const hasTest = course.test && course.test.bank && course.test.bank.length;
  if(hasTest){
    const allDone = course.lessons.every(isComplete);
    const tp = (state.testPassed||{})[course.key];
    const tcls = !allDone ? "locked" : (tp && tp.passed ? "done" : "current");
    items.push({
      cls: tcls,
      num: course.lessons.length + 1,
      face: !allDone ? "🔒" : (tp && tp.passed ? "✓" : "🏆"),
      extras: tcls==="current" ? `<span class="starttag">${tx("TEST","परीक्षा")}</span><span class="sparkle">✨</span>` : "",
      label: tx("Module Test","मॉड्यूल परीक्षा"),
      sub: !allDone ? tx("Finish all lessons first","पहले सभी पाठ पूरे करो")
           : (tp && tp.passed ? esc(tx("Passed · best "+tp.bestPct+"%","पास · सर्वश्रेष्ठ "+tp.bestPct+"%"))
                              : tx("Ready! Take the test","तैयार! परीक्षा दो")),
      onClick: !allDone
        ? (() => { sfx.locked(); const m = tx("Finish all lessons first.","पहले सभी पाठ पूरे करो।"); srSay(m); sayHi("पहले सभी पाठ पूरे करो"); })
        : (() => {
            // tests need a real profile: results must be saved and follow her across
            // laptops, and a guest's pass would evaporate on signup (never via guestGate —
            // that would burn a free-lesson slot on a non-lesson)
            if(!currentStudent){ renderGuestWall(lessonGroup(course), () => renderTrack(course, back)); return; }
            sfx.enter(); renderTestIntro(course, back);
          }),
    });
    if(allDone && !(tp && tp.passed)) narr += " " + tx("All lessons done — the module test is open!","सभी पाठ पूरे — मॉड्यूल परीक्षा खुल गई है!");
  }
  setNarration(narr, narr);
  renderPath(items);
  refreshTop();
}

// ---------- 📺 Module explainer video (Frappe-hosted, streams ONLINE ONLY) ----------
// The one deliberate exception to offline-first: long-form video is too heavy to bundle,
// so offline it degrades to a warm "needs internet" card — never an error tone, and it
// never gates progress. No autoplay (30 shared laptops must not blast audio).
function canStreamVideo(){ return backendLive && navigator.onLine && location.protocol.indexOf("http") === 0; }
function fmtMin(secs){ const m = Math.max(1, Math.round(secs/60)); return tx(m+" min", m+" मिनट"); }
// YouTube: recognise watch / youtu.be / embed / shorts / live URLs, and build a
// privacy-friendly (no-cookie) embed URL. Any other URL is treated as a direct video file.
function ytId(u){ const m = String(u||"").match(/(?:youtube(?:-nocookie)?\.com\/(?:watch\?(?:.*&)?v=|embed\/|shorts\/|live\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/); return m ? m[1] : null; }
function ytEmbedUrl(u){ const id = ytId(u); return id ? ("https://www.youtube-nocookie.com/embed/" + id + "?rel=0&modestbranding=1&playsinline=1") : null; }
function videoNodeSub(course){
  if(!canStreamVideo()) return tx("Needs internet","इंटरनेट चाहिए");
  return course.videoDuration ? esc(fmtMin(course.videoDuration)) : tx("Video","वीडियो");
}
// Watch analytics: seconds actually watched, flushed ONCE per screen visit (module-scoped
// so a rerender/pagehide can't lose or double-count them). Rides the existing tool_use
// event kind — duration_secs carries the seconds (stored for any kind server-side).
let _vid = null;          // {course, secs, lastT, flushed, played}
let _vidWatchdog = null;  // stall watchdog for the CURRENT render only
function flushVideoWatch(){
  if(!_vid || _vid.flushed) return;
  _vid.flushed = true;
  if(_vid.secs >= 5)      // <5s = misclick, same rule as dwell events
    recordEvent({ kind:"tool_use", tool:"video_watch", track:_vid.course.key,
                  lesson: _vid.lesson ? _vid.lesson.key : "", activity:"video",
                  duration_secs: Math.min(7200, Math.round(_vid.secs)), count: 1 });
}
// Renders a TRACK video (lesson omitted) or a per-LESSON video (lesson passed). The URL may
// be a YouTube link (embedded in an iframe) or a direct video file (native <video>).
function renderVideo(course, back, lesson){
  stopSpeech();
  clearTimeout(_vidWatchdog); _vidWatchdog = null;   // a leftover watchdog must never fire into this render
  flushVideoWatch();                                 // rerender (language toggle) flushes the previous visit
  const V = lesson || course;                        // the track OR lesson carrying the video fields
  const seenKey = lesson ? (course.key + "::" + lesson.key) : course.key;
  const parentTitle = lesson ? tx(lesson.title, lesson.titleHi) : tx(course.title, course.titleHi);
  _vid = { course, lesson: lesson || null, seenKey, secs: 0, lastT: null, flushed: false, played: false };
  rerender = () => renderVideo(course, back, lesson);
  root.innerHTML = "";
  const title = tx(V.videoTitle || parentTitle, V.videoTitleHi || parentTitle);
  const goBack = () => { clearTimeout(_vidWatchdog); _vidWatchdog = null; flushVideoWatch();
                         if(lesson) renderLessonMap(course, lesson, back); else renderTrack(course, back); };
  const markSeen = () => { state.videosSeen = state.videosSeen || {}; state.videosSeen[seenKey] = 1; save(); };
  const recordPlay = () => { if(_vid && !_vid.played){ _vid.played = true;
      recordEvent({ kind:"tool_use", tool:"video_play", track:course.key, lesson: lesson?lesson.key:"", activity:"video", count:1 }); } };
  const offlineCard = (broken) => `
    <div class="hero">
      <div class="mascot big m-happy">${mascotSVG()}</div>
      <h1>☁️📺 ${broken ? tx("The video is not working","वीडियो चल नहीं रहा") : tx("This video needs the internet","यह वीडियो इंटरनेट से चलता है")}</h1>
      <p>${broken ? tx("Tell didi — she can fix it. You can keep playing the lessons!","दीदी को बताओ — वे ठीक कर देंगी। तब तक पाठ खेलती रहो!")
                  : tx("Ask didi to open it when the internet is on. You can keep playing the lessons!","जब इंटरनेट आए, तब दीदी से खोलने को कहो। तब तक पाठ खेलती रहो!")}</p>
    </div>
    <div class="center" style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:14px">
      <button class="btn primary" id="vRetry">🔄 ${tx("Check again","फिर से देखो")}</button>
      <button class="btn ghost" id="vBack">← ${tx("Back","वापस")}</button>
    </div>`;
  const showFallback = (broken) => {
    root.innerHTML = "";
    root.appendChild(el(`<div class="screen"><div class="maphead"><div><h2>📺 ${esc(title)}</h2></div></div>${offlineCard(broken)}</div>`));
    const narr2 = broken ? tx("The video could not play. Tell didi. You can keep playing the lessons.","वीडियो चल नहीं पाया। दीदी को बताओ। तब तक पाठ खेलती रहो।")
                         : tx("This video needs the internet. Ask didi when the internet is on.","यह वीडियो इंटरनेट से चलता है। इंटरनेट आने पर दीदी से कहो।");
    setNarration(narr2, narr2);
    $("#vBack").onclick = () => { sfx.back(); goBack(); };
    $("#vRetry").onclick = async () => {
      sfx.tap();
      const s = await api("get_settings");           // cheap reachability probe; also revives backendLive mid-session
      if(s) backendLive = true;
      if(canStreamVideo()){ renderVideo(course, back, lesson); }
      else { const m = tx("Still no internet 💛","अभी भी इंटरनेट नहीं है 💛"); flashToast(m); srSay(m); }
    };
    moveFocusToTop(); refreshTop();
  };
  setBack("← " + parentTitle, goBack);
  if(!canStreamVideo()){ showFallback(false); return; }
  const durLine = V.videoDuration ? esc(fmtMin(V.videoDuration)) : tx("Video lesson","वीडियो पाठ");
  const embed = ytEmbedUrl(V.videoUrl);
  if(embed){
    // YouTube: embed in a sandboxed iframe. Fine-grained watch-seconds aren't available
    // without the YT JS API (an external script we deliberately don't load), so we count a
    // play and mark the node seen once the player loads.
    root.appendChild(el(`<div class="screen">
      <div class="maphead"><div><h2>📺 ${esc(title)}</h2><div class="sub">${durLine}</div></div></div>
      <div class="videowrap">
        <iframe id="ytFrame" src="${escAttr(embed)}" title="${escAttr(title)}" loading="lazy"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>
    </div>`));
    const f = $("#ytFrame");
    if(f) f.addEventListener("load", () => { stopSpeech(); recordPlay(); markSeen(); });
    const narrY = tx(title+". This is a video lesson. Tap the play button to watch.",
                     title+". यह एक वीडियो पाठ है। देखने के लिए प्ले बटन पर टैप करो।");
    setNarration(narrY, narrY); moveFocusToTop(); refreshTop();
    return;
  }
  root.appendChild(el(`<div class="screen">
    <div class="maphead"><div><h2>📺 ${esc(title)}</h2>
      <div class="sub">${durLine}</div></div></div>
    <div class="videowrap">
      <video id="trackVideo" controls playsinline preload="metadata" aria-label="${escAttr(title)}">
        <source src="${escAttr(V.videoUrl)}">
        ${V.videoCaptionsHi ? `<track kind="subtitles" srclang="hi" label="हिन्दी" src="${escAttr(V.videoCaptionsHi)}" ${state.lang==="hi"?"default":""}>` : ""}
        ${V.videoCaptions ? `<track kind="subtitles" srclang="en" label="English" src="${escAttr(V.videoCaptions)}" ${state.lang!=="hi"?"default":""}>` : ""}
      </video>
    </div>
  </div>`));
  const narr = tx(title+". This is a video lesson. Tap the big play button to watch.",
                  title+". यह एक वीडियो पाठ है। देखने के लिए प्ले बटन पर टैप करो।");
  setNarration(narr, narr);
  const v = $("#trackVideo");
  const broke = () => { clearTimeout(_vidWatchdog); _vidWatchdog = null;
                        srSay(tx("The video could not load.","वीडियो चल नहीं पाया।")); showFallback(true); };
  v.addEventListener("error", broke);
  const lastSource = v.querySelector("source"); if(lastSource) lastSource.addEventListener("error", broke);
  v.addEventListener("play", () => {
    stopSpeech();                                     // narration must never talk over the video
    recordPlay();
    // stalled/waiting fire spuriously on slow links — instead: if nothing is buffered
    // 20s after play, treat it as broken (cleared by timeupdate below)
    clearTimeout(_vidWatchdog);
    _vidWatchdog = setTimeout(() => { if(v.isConnected && v.readyState < 2) broke(); }, 20000);
  });
  v.addEventListener("timeupdate", () => {
    clearTimeout(_vidWatchdog); _vidWatchdog = null;
    if(typeof ATT !== "undefined" && ATT) ATT.lastActivity = Date.now();   // watching counts as active (attendance)
    if(!_vid) return;
    const t = v.currentTime;
    if(_vid.lastT != null){ const d = t - _vid.lastT; if(d > 0 && d < 2) _vid.secs += d; }  // ignore seeks
    _vid.lastT = t;
  });
  v.addEventListener("ended", () => { markSeen(); flushVideoWatch(); });
  moveFocusToTop(); refreshTop();
}

// LESSON screen — the 5 activities (the vertical path) for one lesson
function renderLessonMap(course, lesson, back){
  stopSpeech();
  rerender = () => renderLessonMap(course, lesson, back);
  root.innerHTML = "";
  const s = el(`<div class="screen">
    <div class="maphead">
      <div><h2>${esc(tx(lesson.title, lesson.titleHi))}</h2>
      <div class="sub">${tx("Climb the path — finish a stall to open the next","रास्ते पर चढ़ो — हर पड़ाव पूरा करके अगला खोलो")}</div></div>
    </div>
    <div class="path" id="path"></div>
  </div>`);
  root.appendChild(s);
  setBack("← " + tx(course.title, course.titleHi), () => renderTrack(course, back));
  setNarration(tx(lesson.title,lesson.titleHi)+". "+tx("Tap a step to start.","शुरू करने के लिए किसी पड़ाव पर टैप करो।"), tx(lesson.title,lesson.titleHi)+". "+tx("Tap a step to start.","शुरू करने के लिए किसी पड़ाव पर टैप करो।"));
  const wrap = $("#path");
  const ck = course.key, lk = lesson.key;
  const LV = levelsFor(lesson);
  let currentIdx = LV.findIndex((lv,i)=> getStars(ck,lk,lv.id)===0 && (i===0 || getStars(ck,lk,LV[i-1].id)>0) );
  const items = LV.map((lv, i) => {
    const earned = getStars(ck,lk,lv.id);
    const unlocked = i===0 || getStars(ck,lk,LV[i-1].id) > 0;
    const cls = !unlocked ? "locked" : (i===currentIdx ? "current" : (earned>0 ? "done" : ""));
    return {
      cls,
      face: !unlocked ? "🔒" : (earned>0 ? "✓" : lv.ico),
      extras: cls==="current" ? `<span class="starttag">${tx("START","शुरू")}</span><span class="sparkle">✨</span>` : "",
      label: tx(lv.name, lv.nameHi),
      sub: tx(lv.sub, lv.subHi),
      starsHtml: cls!=="locked" ? starRow(earned) : "",
      onClick: unlocked
        ? (() => { sfx.enter(); startLevel(course, lesson, lv, back); })
        : (() => { sfx.locked(); sayHi("पहले पिछला स्तर पूरा करें"); }),
    };
  });
  // 📺 optional per-lesson explainer video sits at the TOP of the lesson path — never gates
  if(lesson.videoUrl){
    items.unshift({
      cls: (state.videosSeen||{})[course.key + "::" + lesson.key] ? "done" : "",
      num: "▶", face: "📺",
      label: tx(lesson.videoTitle || "Watch the video", lesson.videoTitleHi || lesson.videoTitle || "वीडियो देखो"),
      sub: videoNodeSub(lesson),
      onClick: () => { sfx.enter(); renderVideo(course, back, lesson); },
    });
  }
  renderPath(items);
  refreshTop();
}

// ---------- Level runner ----------
function startLevel(course, lesson, lv, back){
  const rounds = buildRounds(lv, lesson);
  let idx = 0, score = 0;
  actStart(course, lesson, lv);                                        // dwell clock starts
  if(getStars(course.key, lesson.key, lv.id) > 0) logTool("replay");   // she's back for practice
  const backToLesson = () => { actEnd(false); renderLessonMap(course, lesson, back); };
  const backLbl = "← " + tx(lesson.title, lesson.titleHi);
  setBack(backLbl, backToLesson);
  rerender = runRound;   // language toggle re-renders the current round in place
  runRound();

  function header(){
    return `<div class="screen gameplay">
      <div class="maphead">
        <div><div style="font-weight:800;font-size:20px">${lv.ico} ${tx(lv.name, lv.nameHi)}</div></div>
      </div>
      <div class="progress"><div id="bar" style="width:${(idx/rounds.length)*100}%"></div></div>
      <div id="body" class="gamebody"></div>
      <div class="gamefooter" id="footer"></div>
    </div>`;
  }
  function mount(bodyHTML){
    clearAnnounce();
    doubtCtx = { course, lesson, lv, idx };   // Layer 1/2: what the girl is looking at right now
    root.innerHTML="";
    root.appendChild(el(header()));
    setBack(backLbl, backToLesson);
    $("#body").innerHTML = bodyHTML;
    const bar=$("#bar"); if(bar && bar.parentElement){ const pb=bar.parentElement; pb.setAttribute("role","progressbar"); pb.setAttribute("aria-valuemin","0"); pb.setAttribute("aria-valuemax",String(rounds.length)); pb.setAttribute("aria-valuenow",String(idx)); }
    moveFocusToTop();   // land focus on the new question, not <body>
  }
  function next(correct){
    if(correct){ score++; state.coins += 5; }
    idx++; save(); refreshTop();
    if(idx>=rounds.length) finish();
    else runRound();
  }
  // one line per wrong pick → the facilitator's "Hardest Questions" report
  function logWrong(question, chosen, answer){
    recordEvent({ kind:"wrong_answer", track:course.key, lesson:lesson.key, activity:lv.id,
                  question:String(question||"").slice(0,140),
                  chosen:String(chosen||"").slice(0,140),
                  answer:String(answer||"").slice(0,140) });
  }
  function runRound(){
    const r = rounds[idx];
    if(lv.type==="learn")  return roundLearn(r);
    if(lv.type==="listen") return roundListen(r);
    if(lv.type==="spell")  return roundSpell(r);
    if(lv.type==="phrase") return roundPhrase(r);
    if(lv.type==="talk")   return roundTalk(r);
    if(lv.type==="quiz")   return roundQuiz(r);
    if(lv.type==="code")   return roundCode(r);
    if(lv.type==="fix")    return roundFix(r);
    if(lv.type==="email")  return roundEmail(r);
    if(lv.type==="read")   return roundRead(r);
    if(lv.type==="reply")  return roundReply(r);
  }

  // --- LEARN: flashcard, see + hear + Hindi, then "Got it"
  function roundLearn(it){
    mount(`${head(tx("What is this?","ये क्या है?"), tx("Tap the word or picture to hear it 🔊","शब्द या तस्वीर पर छूकर सुनो 🔊"), "ये क्या है? सुनो और दोहराओ।")}
      <div class="display">
        <div class="emoji pop tap-emoji" id="emojiBtn">${esc(it.emoji)}</div>
        <div class="wordrow"><span class="word">${esc(it.en)}</span>
          <button class="speakchip" id="say" title="Hear it">🔊</button></div>
        <div class="say"><span class="pron">${esc(it.pron)}</span> · <span class="meaning">${esc(it.hi)}</span></div>
      </div>`);
    setFooter(`<button class="btn primary" id="next">${tx("Got it →","समझ गई →")}</button>`);
    $("#say").onclick = () => speak(it.en);
    $("#emojiBtn").onclick = () => speak(it.en);
    $("#next").onclick = () => { sfx.next(); next(true); };
    announce(() => { speak(it.en); sayHi("ये है " + it.hi); });
  }

  // --- LISTEN: hear English, choose the right picture
  function roundListen(r){
    mount(`${head(tx("Tap what you hear 👂","जो सुनो उसे चुनो 👂"), tx("Press the speaker to hear it again","फिर सुनने के लिए स्पीकर दबाओ"),"जो शब्द सुनो, उसकी तस्वीर चुनो।")}
      <div class="center"><button class="speakbtn" id="say">🔊 ${tx("Play word","शब्द सुनो")}</button></div>
      <div class="options" id="opts"></div>
      <div class="feedback" id="fb"></div>`);
    $("#say").onclick = () => speak(r.answer.en);
    announce(() => speak(r.answer.en));
    const opts = $("#opts");
    r.choices.forEach(c => {
      const b = el(`<button class="opt" data-en="${escAttr(c.en)}"><span class="oe">${esc(c.emoji)}</span><span>${esc(c.en)}</span></button>`);
      b.onclick = () => {
        const correct = c.en===r.answer.en;
        document.querySelectorAll(".opt").forEach(o=>o.classList.add("disabled"));
        b.classList.add(correct?"correct":"wrong");
        setMood(correct?"happy":"sad");
        (correct?sfx.correct:sfx.wrong)();
        const fb=$("#fb");
        if(correct){ fb.textContent=tx("Correct! 🎉","सही! 🎉"); fb.className="feedback good"; }
        else { logWrong(r.answer.en, c.en, r.answer.en);
               fb.textContent=tx("Try to remember: ","याद रखो: ")+r.answer.en; fb.className="feedback bad";
               document.querySelectorAll(".opt").forEach(o=>{ if(o.dataset.en===r.answer.en) o.classList.add("correct"); }); }
        setTimeout(()=>next(correct), correct?900:1600);
      };
      opts.appendChild(b);
    });
  }

  // --- SPELL: show picture, build word from letter tiles
  function roundSpell(it){
    const letters = shuffle(it.en.split(""));
    mount(`${head(tx("Spell the word","शब्द लिखो"), tx("Tap the letters in order","अक्षरों को सही क्रम में छुओ"),"अक्षरों को सही क्रम में लगाओ।")}
      <div class="display"><div class="emoji">${esc(it.emoji)}</div><div class="hi">${esc(it.hi)}</div></div>
      <div class="center" style="margin-bottom:10px"><button class="speakbtn" id="say">🔊 ${tx("Hear it","सुनो")}</button></div>
      <div class="tray" id="tray"></div>
      <div class="bank" id="bank"></div>
      <div class="feedback" id="fb"></div>`);
    setFooter(`<button class="btn ghost" id="clear">${tx("Clear","मिटाओ")}</button>
      <button class="btn primary" id="check" disabled>${tx("Check","जाँचो")}</button>`);
    $("#say").onclick=()=>speak(it.en);
    announce(() => speak(it.en));
    const tray=$("#tray"), bank=$("#bank");
    let built=[];
    function redraw(){
      tray.innerHTML=""; bank.innerHTML="";
      built.forEach((ch,i)=>{ const t=el(`<button type="button" class="tile placed">${esc(ch)}</button>`); t.onclick=()=>{built.splice(i,1);redraw();}; tray.appendChild(t); });
      remaining().forEach((ch,i)=>{ const t=el(`<button type="button" class="tile">${esc(ch)}</button>`); t.onclick=()=>{built.push(ch);sfx.tap();redraw();}; bank.appendChild(t); });
      $("#check").disabled = built.length!==it.en.length;
    }
    function remaining(){ const used={}; built.forEach(c=>used[c]=(used[c]||0)+1); const out=[]; const tmp={...used};
      letters.forEach(c=>{ if(tmp[c]){tmp[c]--;} else out.push(c); }); return out; }
    $("#clear").onclick=()=>{built=[];redraw();};
    $("#check").onclick=()=>{
      const ok = built.join("")===it.en;
      setMood(ok?"happy":"sad");
      (ok?sfx.correct:sfx.wrong)();
      const fb=$("#fb");
      if(ok){ fb.textContent=tx("Perfect! ⭐","बढ़िया! ⭐"); fb.className="feedback good"; speak(it.en); setTimeout(()=>next(true),1000); }
      else { logWrong(it.en, built.join(""), it.en);
             fb.textContent=tx("Not yet — the word is ","अभी नहीं — शब्द है ")+"\""+it.en+"\""; fb.className="feedback bad"; setTimeout(()=>next(false),1700); }
    };
    redraw();
  }

  // --- PHRASE: arrange word tiles into a sentence
  function roundPhrase(r){
    const words = shuffle(r.words.slice());
    mount(`${head(tx("Make the sentence","वाक्य बनाओ"), tx("Put the words in the right order","शब्दों को सही क्रम में लगाओ"), r.hintHi)}
      <div class="display"><div class="emoji">${esc(r.emoji)}</div></div>
      <div class="tray" id="tray"></div>
      <div class="bank" id="bank"></div>
      <div class="feedback" id="fb"></div>`);
    setFooter(`<button class="btn ghost" id="clear">${tx("Clear","मिटाओ")}</button>
      <button class="btn primary" id="check" disabled>${tx("Check","जाँचो")}</button>`);
    announce(() => sayHi(r.hintHiSpoken));
    const tray=$("#tray"), bank=$("#bank");
    let built=[];
    function redraw(){
      tray.innerHTML=""; bank.innerHTML="";
      built.forEach((w,i)=>{ const t=el(`<button type="button" class="tile placed">${esc(w)}</button>`); t.onclick=()=>{built.splice(i,1);redraw();}; tray.appendChild(t); });
      remaining().forEach(w=>{ const t=el(`<button type="button" class="tile">${esc(w)}</button>`); t.onclick=()=>{built.push(w);sfx.tap();redraw();}; bank.appendChild(t); });
      $("#check").disabled = built.length!==r.words.length;
    }
    function remaining(){ const used={}; built.forEach(w=>used[w]=(used[w]||0)+1); const out=[]; const tmp={...used};
      words.forEach(w=>{ if(tmp[w]){tmp[w]--;} else out.push(w); }); return out; }
    $("#clear").onclick=()=>{built=[];redraw();};
    $("#check").onclick=()=>{
      const ok = built.join(" ")===r.words.join(" ");
      setMood(ok?"happy":"sad");
      (ok?sfx.correct:sfx.wrong)();
      const fb=$("#fb");
      if(ok){ fb.textContent=tx("Great sentence! 🎉","बढ़िया वाक्य! 🎉"); fb.className="feedback good"; speak(r.words.join(" ")); setTimeout(()=>next(true),1200); }
      else { logWrong(r.words.join(" "), built.join(" "), r.words.join(" "));
             fb.textContent=tx("Right answer: ","सही जवाब: ")+'"'+r.words.join(" ")+'"'; fb.className="feedback bad"; speak(r.words.join(" ")); setTimeout(()=>next(false),2000); }
    };
    redraw();
  }

  // --- TALK: speaker says a line, you choose the right reply
  function roundTalk(r){
    mount(`${head(tx("🗣️ Conversation","🗣️ बातचीत"), tx("Choose the best reply","सही जवाब चुनो"),"बातचीत — सही जवाब चुनो।")}
      <div class="chat" id="chat"></div>
      <div class="options" id="opts"></div>
      <div class="feedback" id="fb"></div>`);
    const chat=$("#chat");
    chat.appendChild(el(`<div class="bubble them">${esc(r.who||"🙂")} ${esc(r.line)}<small>${state.hindi?esc(r.lineHi):""}</small></div>`));
    // first question speaks right away; later ones wait for the previous response to finish, then pause ~2s
    if(idx===0) announce(() => speak(r.line));
    else speak(r.line, "en", { queue:true, gap:2000 });
    const opts=$("#opts");
    let answered=false;
    shuffle(r.replies).forEach(rep=>{
      const gloss = (state.hindi && rep.textHi) ? `<small class="optHi">${esc(rep.textHi)}</small>` : "";
      const b=el(`<button class="opt" style="font-size:17px">${esc(rep.text)}${gloss}</button>`);
      b.onclick=()=>{
        if(answered) return;
        speak(rep.text);
        const fb=$("#fb");
        if(rep.ok){
          answered=true;
          document.querySelectorAll(".opt").forEach(o=>o.classList.add("disabled"));
          b.classList.add("correct");
          chat.appendChild(el(`<div class="bubble me">${esc(rep.text)}</div>`));
          setMood("happy");
          sfx.correct();
          fb.textContent=tx("Nice reply! 🎉","बढ़िया जवाब! 🎉"); fb.className="feedback good";
          // speaker replies, then let the player continue at their own pace
          setTimeout(()=>{
            chat.appendChild(el(`<div class="bubble them">${esc(r.who||"🙂")} ${esc(r.then)}</div>`));
            speak(r.then, "en", { queue:true, gap:500 });   // play after the reply finishes, don't cut it
            setFooter(`<button class="btn primary" id="next">${tx("Continue →","आगे बढ़ो →")}</button>`);
            $("#next").onclick = () => { sfx.next(); next(true); };
          }, 1000);
        } else {
          // wrong: gentle nudge, let them try again — no rushing ahead
          logWrong(r.line, rep.text, ((r.replies.find(x=>x.ok))||{}).text);
          b.classList.add("wrong");
          setMood("sad");
          sfx.wrong();
          fb.textContent=tx("Not quite — try again.","बिल्कुल नहीं — फिर कोशिश करो।"); fb.className="feedback bad";
          setTimeout(()=>{ b.classList.remove("wrong"); fb.textContent=""; }, 1200);
        }
      };
      opts.appendChild(b);
    });
  }

  // --- CODE: fill the blank in a Python snippet (offline, no execution — token match)
  function roundCode(r){
    let filled = null;
    const codeText = (r.lines ? r.lines.join("\n") : (r.code || ""));
    if(!Array.isArray(r.choices) || !r.choices.includes(r.answer)) return next(true);  // malformed content → skip, never trap the child
    const teachMain = tx(r.teach, r.teachHi || r.teach);
    const teachAlt = (state.hindi && state.lang !== "hi" && r.teachHi) ? `<br><i>${esc(r.teachHi)}</i>` : "";
    mount(`${head(tx("💻 Complete the code","💻 कोड पूरा करो"), tx(r.prompt, r.promptHi || r.prompt), r.promptHi)}
      ${r.teach ? `<div class="teachbox">💡 <span>${esc(teachMain)}${teachAlt}</span></div>` : ""}
      <pre class="codeblock" id="code"></pre>
      <div class="bank" id="bank"></div>
      <div class="feedback" id="fb"></div>`);
    setFooter(`<button class="btn ghost" id="clear">${tx("Clear","मिटाओ")}</button>
      <button class="btn primary" id="check" disabled>${tx("Check","जाँचो")}</button>`);
    announce(() => { speak(tx(r.prompt, r.promptHi || r.prompt), state.lang==="hi" ? "hi" : "en"); });
    const codeEl=$("#code"), bank=$("#bank");
    function renderCode(){
      const i = codeText.indexOf("___");
      const a = esc(codeText.slice(0, i)), b = esc(codeText.slice(i+3));
      codeEl.innerHTML = a + `<span class="blank ${filled?"filled":""}">${filled?esc(filled):"______"}</span>` + b;
      $("#check").disabled = !filled;
    }
    shuffle(r.choices).forEach(c=>{
      const t=el(`<button type="button" class="tile">${esc(c)}</button>`);
      t.onclick=()=>{ filled=c; sfx.tap(); renderCode(); };
      bank.appendChild(t);
    });
    $("#clear").onclick=()=>{ filled=null; renderCode(); };
    $("#check").onclick=()=>{
      const ok = filled===r.answer;
      setMood(ok?"happy":"sad");
      (ok?sfx.correct:sfx.wrong)();
      const fb=$("#fb");
      if(ok){ fb.textContent=tx("Correct! 🎉","सही! 🎉"); fb.className="feedback good"; setTimeout(()=>next(true),1100); }
      else { logWrong(r.prompt, filled, r.answer);
             fb.textContent=tx('Answer: ','सही जवाब: ')+'"'+r.answer+'"'; fb.className="feedback bad"; setTimeout(()=>next(false),1900); }
    };
    renderCode();
  }

  // --- QUIZ: a multiple-choice question (any subject) — read it, tap the answer
  function roundQuiz(r){
    if(!Array.isArray(r.choices) || !r.choices.includes(r.answer)) return next(true);  // malformed content → skip, never trap the child
    mount(`${head(tx(r.q, r.qHi || r.q), tx("Choose the answer","सही उत्तर चुनो"), r.qHi || "")}
      ${r.emoji ? `<div class="quizemoji">${esc(r.emoji)}</div>` : ""}
      <div class="options quizopts" id="opts"></div>
      <div id="teach" class="teachbox" style="display:none"></div>
      <div class="feedback" id="fb"></div>`);
    setFooter("");
    announce(() => speak(tx(r.q, r.qHi || r.q), state.lang==="hi" ? "hi" : "en"));
    const opts = $("#opts");
    let tries = 0, done = false;
    const showTeach = () => {                              // the teach card doubles as the scaffolding hint / worked example
      if(!r.teach) return;
      const tb = $("#teach"); tb.style.display = "flex";
      const main = tx(r.teach, r.teachHi || r.teach);
      const alt = (state.hindi && state.lang!=="hi" && r.teachHi) ? `<br><i>${esc(r.teachHi)}</i>` : "";
      tb.innerHTML = `💡 <span>${esc(main)}${alt}</span>`;
      setNarration(main, main);                            // tap 🔊 re-hears the hint
    };
    shuffle(r.choices.slice()).forEach(c => {
      const b = el(`<button class="opt quizopt">${esc(c)}</button>`);
      b.onclick = () => {
        if(done) return;
        const fb = $("#fb");
        if(c === r.answer){                                // right (even after a hint) → full credit, never penalise
          done = true;
          document.querySelectorAll(".quizopt").forEach(o => o.classList.add("disabled"));
          b.classList.add("correct"); setMood("happy"); sfx.correct();
          fb.textContent = tx("Correct! 🎉","सही! 🎉"); fb.className = "feedback good";
          showTeach();
          setTimeout(() => next(true), r.teach ? 1700 : 1000);
          return;
        }
        // wrong
        logWrong(r.q, c, r.answer);
        tries++; b.classList.add("wrong","disabled"); setMood("sad"); sfx.wrong();
        if(tries === 1 && r.teach){
          // SCAFFOLD: show the hint and let her try again — don't reveal the answer, keep other options live
          fb.textContent = tx("Not quite — here's a hint, try again.","बिल्कुल नहीं — यह रहा संकेत, फिर कोशिश करो।");
          fb.className = "feedback bad";
          showTeach();
        } else {
          // second miss (or no hint to give): reveal & move on — never trap her
          done = true;
          document.querySelectorAll(".quizopt").forEach(o => { o.classList.add("disabled"); if(o.textContent === r.answer) o.classList.add("correct"); });
          fb.textContent = tx("Answer: ","सही जवाब: ") + r.answer; fb.className = "feedback bad";
          showTeach();
          setTimeout(() => next(false), r.teach ? 2200 : 1700);
        }
      };
      opts.appendChild(b);
    });
  }

  // --- FIX: tap the one wrong word in the sentence (IT "debugging")
  function roundFix(r){
    let done=false;
    mount(`${head(tx("🐞 Find the bug","🐞 गलती ढूँढो"), tx("Tap the wrong word","गलत शब्द पर टैप करो"), "")}
      <div class="bugline" id="line"></div>
      <div id="teach" class="teachbox" style="display:none"></div>
      <div class="feedback" id="fb"></div>`);
    setFooter("");
    announce(() => speak(r.sentence));
    const line=$("#line");
    r.sentence.split(" ").forEach(tok=>{
      const chip=el(`<button type="button" class="bugword">${esc(tok)}</button>`);
      chip.onclick=()=>{
        if(done) return;
        if(tok===r.wrongWord){
          done=true;
          chip.textContent=r.fix; chip.classList.add("fixed");
          setMood("happy"); sfx.correct();
          const tb=$("#teach"); tb.style.display="flex";
          const main=tx(r.teach, r.teachHi||r.teach);
          const alt=(state.hindi && state.lang!=="hi" && r.teachHi) ? `<br><i>${esc(r.teachHi)}</i>` : "";
          tb.innerHTML=`💡 <span>${esc(main)}${alt}</span>`;
          const fb=$("#fb"); fb.textContent=tx("Bug fixed! 🎉","गलती ठीक हो गई! 🎉"); fb.className="feedback good";
          speak(r.sentence.replace(r.wrongWord, r.fix));
          setFooter(`<button class="btn primary" id="next">${tx("Continue →","आगे बढ़ो →")}</button>`);
          $("#next").onclick=()=>{ sfx.next(); next(true); };
        } else {
          logWrong(r.sentence, tok, r.wrongWord);
          chip.classList.add("shake"); setMood("sad"); sfx.wrong();
          const fb=$("#fb"); fb.textContent=tx("Not the bug — try again.","यह गलती नहीं — फिर कोशिश करो।"); fb.className="feedback bad";
          setTimeout(()=>{ chip.classList.remove("shake"); fb.textContent=""; }, 800);
        }
      };
      line.appendChild(chip);
    });
  }

  // --- EMAIL: compose a real email by choosing the right line for each slot, then Send
  function roundEmail(r){
    const chosen = {};   // slotIndex -> optionIndex
    mount(`${head(tx("📧 Write the email","📧 ईमेल लिखो"), tx(r.scenario, r.scenarioHi || r.scenario), r.scenarioHi)}
      <div class="email" id="email"></div>
      <div class="eopts" id="opts"></div>
      <div class="feedback" id="fb"></div>`);
    setFooter(`<button class="btn primary" id="send" disabled>${tx("Send 📤","भेजो 📤")}</button>`);
    announce(() => speak(tx(r.scenario, r.scenarioHi || r.scenario), state.lang==="hi"?"hi":"en"));
    const emailEl=$("#email"), optsEl=$("#opts");
    // shuffle each slot's options ONCE so the correct line isn't always first (stable across re-renders)
    const slots = r.slots.map(s => ({ label:s.label, labelHi:s.labelHi, options:shuffle(s.options) }));
    function lineFor(si){
      const c=chosen[si];
      return c==null ? `<i class="eplace">${tx("Tap a line below ↓","नीचे से चुनो ↓")}</i>` : esc(slots[si].options[c].t);
    }
    function render(){
      emailEl.innerHTML =
        `<div class="erow"><span class="elabel">${tx("To","प्रति")}:</span> ${esc(r.to)}</div>` +
        slots.map((s,si)=>`<div class="erow"><span class="elabel">${tx(s.label, s.labelHi || s.label)}:</span> <span class="eslot ${chosen[si]!=null?"set":""}" data-si="${si}">${lineFor(si)}</span></div>`).join("") +
        `<div class="erow esig">${esc(r.from)}</div>`;
      optsEl.innerHTML = slots.map((s,si)=>
        `<div class="optgroup"><div class="oglabel">${tx(s.label, s.labelHi || s.label)}</div>` +
        s.options.map((o,oi)=>`<button class="echip ${chosen[si]===oi?"sel":""}" data-si="${si}" data-oi="${oi}">${esc(o.t)}${(state.hindi && o.hi)?`<small>${esc(o.hi)}</small>`:""}</button>`).join("") +
        `</div>`).join("");
      optsEl.querySelectorAll(".echip").forEach(b=> b.onclick=()=>{ chosen[+b.dataset.si]=+b.dataset.oi; sfx.tap(); render(); });
      $("#send").disabled = Object.keys(chosen).length !== slots.length;
    }
    render();
    $("#send").onclick=()=>{
      const allOk = slots.every((s,si)=> s.options[chosen[si]] && s.options[chosen[si]].ok);
      const fb=$("#fb");
      if(allOk){
        setMood("happy"); sfx.correct(); emailEl.classList.add("sent"); setFooter("");
        fb.textContent=tx("Email sent! 🎉","ईमेल भेज दी! 🎉"); fb.className="feedback good";
        setTimeout(()=>next(true),1400);
      } else {
        setMood("sad"); sfx.wrong();
        slots.forEach((s,si)=>{ if(!(s.options[chosen[si]] && s.options[chosen[si]].ok)){
          logWrong(r.scenario + " — " + s.label, (s.options[chosen[si]]||{}).t, ((s.options.find(o=>o.ok))||{}).t);
          const e=emailEl.querySelector(`.eslot[data-si="${si}"]`); if(e) e.classList.add("bad"); } });
        fb.textContent=tx("Some lines are wrong — fix the red ones.","कुछ पंक्तियाँ गलत हैं — लाल को ठीक करो।"); fb.className="feedback bad";
        setTimeout(()=>{ emailEl.querySelectorAll(".eslot.bad").forEach(e=>e.classList.remove("bad")); fb.textContent=""; }, 1700);
      }
    };
  }

  // --- READ: read a short passage, then answer a comprehension question
  // Reading is the one skill the word/sentence/talk activities don't build directly, so this
  // shows a simple English story (with a 🔊 that reads the WHOLE passage for non-readers and an
  // optional Hindi gloss when the Guide is on) and asks about it. Scaffolds like the quiz: a
  // wrong pick reveals the hint and lets her re-read; a second miss reveals the answer.
  function roundRead(r){
    if(!Array.isArray(r.choices) || !r.choices.includes(r.answer)) return next(true);  // malformed content → skip, never trap the child
    const gloss = (state.hindi && r.textHi) ? `<div class="rdHi">🔊 ${esc(r.textHi)}</div>` : "";
    const ttl = r.title ? `<div class="rdTitle">${esc((r.emoji ? r.emoji+" " : "") + tx(r.title, r.titleHi || r.title))}</div>` : "";
    mount(`${head(tx(r.q, r.qHi || r.q), tx("Read the story, then choose the answer","कहानी पढ़ो, फिर उत्तर चुनो"), r.qHi || "")}
      <div class="readbox">
        ${ttl}
        <p class="rdText">${esc(r.text)}</p>
        ${gloss}
        <button class="speakbtn" id="rdsay">🔊 ${tx("Read it to me","पढ़कर सुनाओ")}</button>
      </div>
      <div class="options quizopts" id="opts"></div>
      <div id="teach" class="teachbox" style="display:none"></div>
      <div class="feedback" id="fb"></div>`);
    setFooter("");
    $("#rdsay").onclick = () => speak(r.text);
    // hear the whole passage first, then the question — so a non-reader gets the full item aloud
    announce(() => { speak(r.text); speak(tx(r.q, r.qHi || r.q), state.lang==="hi" ? "hi" : "en", { queue:true, gap:700 }); });
    const opts = $("#opts");
    let tries = 0, done = false;
    const showTeach = () => {                              // the teach card doubles as the re-reading hint
      if(!r.teach) return;
      const tb = $("#teach"); tb.style.display = "flex";
      const main = tx(r.teach, r.teachHi || r.teach);
      const alt = (state.hindi && state.lang!=="hi" && r.teachHi) ? `<br><i>${esc(r.teachHi)}</i>` : "";
      tb.innerHTML = `💡 <span>${esc(main)}${alt}</span>`;
      setNarration(main, main);                            // tap 🔊 re-hears the hint
    };
    shuffle(r.choices.slice()).forEach(c => {
      const b = el(`<button class="opt quizopt">${esc(c)}</button>`);
      b.onclick = () => {
        if(done) return;
        const fb = $("#fb");
        if(c === r.answer){                                // right (even after a hint) → full credit
          done = true;
          document.querySelectorAll(".quizopt").forEach(o => o.classList.add("disabled"));
          b.classList.add("correct"); setMood("happy"); sfx.correct();
          fb.textContent = tx("Correct! 🎉","सही! 🎉"); fb.className = "feedback good";
          showTeach();
          setTimeout(() => next(true), r.teach ? 1700 : 1000);
          return;
        }
        // wrong
        logWrong(r.q, c, r.answer);
        tries++; b.classList.add("wrong","disabled"); setMood("sad"); sfx.wrong();
        if(tries === 1 && r.teach){
          // SCAFFOLD: nudge her to re-read, show the hint, keep the other options live
          fb.textContent = tx("Not quite — read again, here's a hint.","बिल्कुल नहीं — फिर से पढ़ो, यह रहा संकेत।");
          fb.className = "feedback bad";
          showTeach();
        } else {
          // second miss (or no hint): reveal & move on — never trap her
          done = true;
          document.querySelectorAll(".quizopt").forEach(o => { o.classList.add("disabled"); if(o.textContent === r.answer) o.classList.add("correct"); });
          fb.textContent = tx("Answer: ","सही जवाब: ") + r.answer; fb.className = "feedback bad";
          showTeach();
          setTimeout(() => next(false), r.teach ? 2200 : 1700);
        }
      };
      opts.appendChild(b);
    });
  }

  // --- REPLY: read a received email, then WRITE the answer — choose each reply line
  //     and sign it by typing your own name (her first real free-typing moment).
  //     Mirrors roundEmail's contract: she can fix red lines and resend until it's
  //     right (never trapped, wrong sends are logged for the facilitator).
  function roundReply(r){
    // a slot with no correct option would be unanswerable → skip, never trap the child
    if(!Array.isArray(r.slots) || !r.slots.length ||
       r.slots.some(s => !Array.isArray(s.options) || !s.options.some(o => o && o.ok))) return next(true);
    const chosen = {};   // slotIndex -> optionIndex
    mount(`${head(tx("📨 Reply to the email","📨 ईमेल का जवाब दो"), tx("Read it, then write your reply","पहले पढ़ो, फिर अपना जवाब लिखो"), r.msgHi || "")}
      <div class="email emailin">
        <div class="erow"><span class="elabel">${tx("From","से")}:</span> ${esc(r.from)}</div>
        ${r.subject ? `<div class="erow"><span class="elabel">${tx("Subject","विषय")}:</span> ${esc(r.subject)}</div>` : ""}
        <div class="erow">${esc(r.msg)}</div>
        ${(state.hindi && r.msgHi) ? `<div class="erow rdHi">🔊 ${esc(r.msgHi)}</div>` : ""}
        <button class="speakbtn" id="rpsay">🔊 ${tx("Read it to me","पढ़कर सुनाओ")}</button>
      </div>
      <div class="email" id="email"></div>
      <div class="eopts" id="opts"></div>
      <div class="feedback" id="fb"></div>`);
    setFooter(`<button class="btn primary" id="send" disabled>${tx("Send reply 📤","जवाब भेजो 📤")}</button>`);
    $("#rpsay").onclick = () => speak(r.msg);
    // hear the whole email first, then the instruction — a non-reader gets the full item aloud
    announce(() => { speak(r.msg); speak(tx("Now write your reply.","अब अपना जवाब लिखो।"), state.lang==="hi" ? "hi" : "en", { queue:true, gap:700 }); });
    const emailEl = $("#email"), optsEl = $("#opts");
    // shuffle each slot's options ONCE so the correct line isn't always first (stable across re-renders)
    const slots = r.slots.map(s => ({ label:s.label, labelHi:s.labelHi, options:shuffle(s.options) }));
    let sig = (currentStudent && currentStudent.name) ? currentStudent.name : "";
    function lineFor(si){
      const c = chosen[si];
      return c==null ? `<i class="eplace">${tx("Tap a line below ↓","नीचे से चुनो ↓")}</i>` : esc(slots[si].options[c].t);
    }
    function canSend(){ return Object.keys(chosen).length === slots.length && sig.trim().length > 0; }
    function render(){
      emailEl.innerHTML =
        `<div class="erow"><span class="elabel">${tx("To","प्रति")}:</span> ${esc(r.from)}</div>` +
        slots.map((s,si)=>`<div class="erow"><span class="elabel">${esc(tx(s.label, s.labelHi || s.label))}:</span> <span class="eslot ${chosen[si]!=null?"set":""}" data-si="${si}">${lineFor(si)}</span></div>`).join("") +
        `<div class="erow esig"><span class="elabel">${tx("Your name","तुम्हारा नाम")}:</span> <input id="esign" type="text" maxlength="40" autocomplete="off" placeholder="${escAttr(tx("Write your name…","अपना नाम लिखो…"))}" value="${escAttr(sig)}" aria-label="${escAttr(tx("Write your name","अपना नाम लिखो"))}"></div>`;
      optsEl.innerHTML = slots.map((s,si)=>
        `<div class="optgroup"><div class="oglabel">${esc(tx(s.label, s.labelHi || s.label))}</div>` +
        s.options.map((o,oi)=>`<button class="echip ${chosen[si]===oi?"sel":""}" data-si="${si}" data-oi="${oi}">${esc(o.t)}${(state.hindi && o.hi)?`<small>${esc(o.hi)}</small>`:""}</button>`).join("") +
        `</div>`).join("");
      optsEl.querySelectorAll(".echip").forEach(b => b.onclick = () => { chosen[+b.dataset.si] = +b.dataset.oi; sfx.tap(); render(); });
      const sg = $("#esign");
      sg.oninput = () => { sig = sg.value; $("#send").disabled = !canSend(); };
      $("#send").disabled = !canSend();
    }
    render();
    $("#send").onclick = () => {
      if(!canSend()) return;
      const allOk = slots.every((s,si)=> s.options[chosen[si]] && s.options[chosen[si]].ok);
      const fb = $("#fb");
      if(allOk){
        setMood("happy"); sfx.correct(); emailEl.classList.add("sent"); setFooter("");
        fb.textContent = tx("Reply sent! 🎉","जवाब भेज दिया! 🎉"); fb.className = "feedback good";
        setTimeout(() => next(true), 1400);
      } else {
        setMood("sad"); sfx.wrong();
        slots.forEach((s,si)=>{ if(!(s.options[chosen[si]] && s.options[chosen[si]].ok)){
          logWrong((r.subject || r.msg) + " — " + s.label, (s.options[chosen[si]]||{}).t, ((s.options.find(o=>o.ok))||{}).t);
          const e2 = emailEl.querySelector(`.eslot[data-si="${si}"]`); if(e2) e2.classList.add("bad"); } });
        fb.textContent = tx("Some lines don't fit the email — fix the red ones.","कुछ पंक्तियाँ ईमेल से मेल नहीं खातीं — लाल को ठीक करो।"); fb.className = "feedback bad";
        setTimeout(() => { emailEl.querySelectorAll(".eslot.bad").forEach(e2 => e2.classList.remove("bad")); fb.textContent = ""; }, 1700);
      }
    };
  }

  // --- finish: award stars
  function finish(){
    clearAnnounce();
    doubtCtx = null;     // left gameplay — no round on screen to ask about
    const secs = actEnd(true);                             // completed: time rides on the attempt row
    const pct = rounds.length ? score/rounds.length : 0;   // guard: admin lesson could yield 0 rounds
    const stars = pct>=0.99?3 : pct>=0.6?2 : pct>=0.3?1 : 0;
    const prevGems = (state.coins||0) - score*5;              // gems before this attempt (in-round +5s already added)
    setStars(course.key, lesson.key, lv.id, stars); state.coins += stars*10; save(); refreshTop();
    const belt = crossedMilestone(prevGems, state.coins||0);  // did this attempt's gems cross a belt threshold?
    recordAttempt({ track: course.key, lesson: lesson.key, activity: lv.id,
                    stars: stars, score: score, total: rounds.length, coins: stars*10 + score*5,
                    duration_secs: secs });
    if(stars>=1) sfx.complete(); else sfx.wrong();
    root.innerHTML="";
    root.appendChild(el(`<div class="screen result">
      <div class="mascot big ${stars>=1?"m-happy":"m-sad"}">${mascotSVG()}</div>
      <h2>${stars>=2?tx("Shabash!","शाबाश!"):tx("Good try!","अच्छी कोशिश!")} ${stars>=2?"🏆":""}</h2>
      <div class="muted">${tx("You got "+score+" of "+rounds.length, rounds.length+" में से "+score+" सही")}</div>
      <div class="earn pop">${"★".repeat(stars)}${"☆".repeat(3-stars)}</div>
      <div class="muted">+${score*5 + stars*10} ${tx("💎 gems","💎 रत्न")}</div>
      ${belt ? `<div class="savechip" style="font-size:1.05em">${esc(belt.icon||"🏅")} ${esc(tx("You reached the "+belt.title+"!","तुम "+(belt.titleHi||belt.title)+" तक पहुँच गई!"))} 🎉</div>` : ""}
      ${currentStudent ? `<div class="savechip">✓ ${tx("Saved on this device","इस डिवाइस पर सेव हो गया")}</div>` : ""}
      <div class="actionrow">
        <button class="btn ghost" id="again">${tx("Play again","फिर से खेलो")}</button>
        <button class="btn primary" id="map">${tx("Back to map →","नक्शे पर वापस →")}</button>
      </div>
    </div>`));
    if(belt) speak(tx("Shabash! You reached the "+belt.title+"! Your teacher will evaluate you soon.",
                      "शाबाश! तुम "+(belt.titleHi||belt.title)+" तक पहुँच गई! जल्द ही टीचर तुम्हारी जाँच करेंगी।"), state.lang==="hi"?"hi":"en");
    else speak(stars>=2?"Shabash! Well done":"Good try");
    srSay(tx("You got "+score+" of "+rounds.length+", "+stars+" stars", rounds.length+" में से "+score+" सही, "+stars+" सितारे"));
    const rh=root.querySelector(".result h2"); if(rh){ rh.setAttribute("tabindex","-1"); try{ rh.focus({preventScroll:true}); }catch(e){} }
    $("#again").onclick=()=>{ sfx.restart(); startLevel(course, lesson, lv, back); };
    $("#map").onclick=()=>{ sfx.back(); backToLesson(); };
  }
}

// ============================================================
//  MODULE TEST — mandatory once a track's lessons are done.
//  Anti-cheat contract (told to the child up front, in her language, out loud):
//  leaving the screen ends the test and the attempt does not count. Signals:
//  visibilitychange(hidden) — tab/app switch, minimize (primary, works everywhere)
//  blur with a 1.5s refocus grace — window switch (grace absorbs stray OS popups)
//  fullscreenchange exit — only after fullscreen was actually granted (iOS has none)
//  pagehide — reload/close (the voided attempt is queued synchronously, so it survives)
//  Plus: copy/paste/context-menu blocked, the Roshni AI overlay is hidden for the
//  duration (it could answer the question!), and a voluntary "Stop the test" button
//  exists so a stuck child is never trapped into "misbehaving" her way out.
//  Timing out is NOT cheating: answered-so-far submits and can still pass.
// ============================================================
let TEST = null;   // {course, back, paper, idx, score, deadline, t0, timerIv, fsEntered, done, wake, _h, _blurT, _warned}

function renderTestIntro(course, back){
  stopSpeech(); rerender = () => renderTestIntro(course, back);
  root.innerHTML = "";
  setBack("← " + tx(course.title, course.titleHi), () => renderTrack(course, back));
  const t = course.test;
  const n = Math.min(t.bank.length, Math.max(1, t.questionsPerPaper || 10));
  const mins = Math.max(1, Math.round((t.timeLimitSecs || 600) / 60));
  const seenCount = (((state.testSeen||{})[course.key]) || []).length;
  const willReuse = (t.bank.length - seenCount) < n;
  const rules = [
    ["⏱", tx("You have "+mins+" minutes.","तुम्हारे पास "+mins+" मिनट हैं।")],
    ["❓", tx(n+" questions — no hints, no retries.",n+" सवाल — कोई संकेत नहीं, कोई दोबारा मौका नहीं।")],
    ["🚪", tx("Do not leave this screen. If you switch apps or leave, the test ends and does not count.",
              "यह स्क्रीन मत छोड़ो। अगर तुम ऐप बदलोगी या बाहर जाओगी, परीक्षा खत्म हो जाएगी और गिनी नहीं जाएगी।")],
  ];
  root.appendChild(el(`<div class="screen">
    <div class="hero">
      <h1>🏆 ${tx("Module Test","मॉड्यूल परीक्षा")}</h1>

      ${t.intro || t.introHi ? `<p>${esc(tx(t.intro || t.introHi, t.introHi || t.intro))}</p>` : ""}
    </div>
    <div>${rules.map(r => `<div class="rulerow"><span class="ric">${r[0]}</span><span>${esc(r[1])}</span></div>`).join("")}</div>
    ${willReuse ? `<div class="center" style="margin-top:6px"><div class="savechip">${tx("You have practiced a lot — some questions may repeat.","तुमने खूब अभ्यास किया है — कुछ सवाल दोहराए जा सकते हैं।")}</div></div>` : ""}
    <div class="center" style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:14px">
      <button class="btn primary" id="tstart">${tx("Start the test →","परीक्षा शुरू करो →")}</button>
      <button class="btn ghost" id="tback">← ${tx("Not yet","अभी नहीं")}</button>
    </div>
  </div>`));
  const narr = rules.map(r => r[1]).join(" ") + " " +
               tx("Keep the screen awake. Tap Start when you are ready.","स्क्रीन जगी रखना। तैयार होने पर 'शुरू करो' दबाओ।");
  setNarration(narr, narr);
  $("#tback").onclick = () => { sfx.back(); renderTrack(course, back); };
  $("#tstart").onclick = () => {
    sfx.enter();

    // visibility/blur guards are the primary signal there). Guards arm after a beat so
    // the fullscreen transition itself can't trip them.
    try { const p = document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
          if(p && p.catch) p.catch(() => {}); } catch(e){}
    setTimeout(() => startTest(course, back), 400);
  };

function startTest(course, back){
  const paper = buildPaper(course);
  TEST = { course, back, paper, idx: 0, score: 0, done: false,
           deadline: Date.now() + (course.test.timeLimitSecs || 600) * 1000,
           t0: Date.now(), timerIv: null, fsEntered: !!document.fullscreenElement,
           wake: null, _h: null, _blurT: null, _warned: false };
  try {   // keep the screen awake — an OS screen-blank mid-thought must not void her test
    if(navigator.wakeLock && navigator.wakeLock.request)
      navigator.wakeLock.request("screen").then(w => { if(TEST) TEST.wake = w; else w.release(); }).catch(() => {});
  } catch(e){}
  setBack(null);                       // no back button: finish, stop, or time-out are the exits
  rerender = renderTestQ;              // language toggle re-renders the frozen question in place
  armTestGuards();
  if(document.hidden){ voidTest("hidden"); return; }   // never arm into an already-hidden tab
  TEST.timerIv = setInterval(testTick, 500);
  renderTestQ();
}

function testTick(){
  const T = TEST; if(!T || T.done) return;
  const left = Math.max(0, T.deadline - Date.now());
  const tt = $("#ttimer");
  if(tt){
    const s = Math.ceil(left / 1000);
    tt.textContent = Math.floor(s/60) + ":" + String(s%60).padStart(2, "0");
    if(s <= 60 && !T._warned){
      T._warned = true; tt.classList.add("urgent");
      sfx.tap();                                        // a neutral cue — the "wrong" sound would read as blame
      srSay(tx("One minute left","एक मिनट बचा"));
    } else if(s <= 60){ tt.classList.add("urgent"); }
  }
  if(left <= 0) endTest("timed_out");
}

function renderTestQ(){
  const T = TEST; if(!T || T.done) return;
  const qs = T.paper.qs, n = qs.length;
  let q = qs[T.idx];
  // malformed row (bank imported past Desk validation): count it correct and move on —
  // a scored, no-retry test must never show an unanswerable question (mirrors roundQuiz)
  while(q && (!Array.isArray(q.choices) || !q.choices.includes(q.answer))){
    T.score++; T.idx++;
    if(T.idx >= n){ endTest("completed"); return; }
    q = qs[T.idx];
  }
  if(!q){ endTest("completed"); return; }
  stopSpeech();
  root.innerHTML = "";
  const qText = tx(q.q, q.qHi || q.q);
  root.appendChild(el(`<div class="screen gameplay">
    <div class="maphead testhead">
      <div><h2>🏆 ${tx("Test","परीक्षा")}</h2>
        <div class="sub">${esc(tx("Question "+(T.idx+1)+" of "+n, n+" में से सवाल "+(T.idx+1)))}</div></div>
      <div class="testtimer" id="ttimer" role="timer"></div>
    </div>
    <div class="progress"><div id="bar" style="width:${(T.idx/n)*100}%"></div></div>
    <div class="gamebody">
      <div class="bubble2"><div class="q">${esc(qText)}</div></div>
      ${q.emoji ? `<div class="quizemoji">${esc(q.emoji)}</div>` : ""}
      <div class="options quizopts" id="opts"></div>
      <div class="feedback" id="fb"></div>
    </div>
    <div class="gamefooter"><button class="btn ghost" id="tstop">✋ ${tx("Stop the test","परीक्षा रोको")}</button></div>
  </div>`));
  setNarration(qText, q.qHi || q.q);                    // 🔊 re-reads THIS question, not stale rules
  announce(() => speak(qText, state.lang==="hi" ? "hi" : "en"));
  const opts = $("#opts");
  let answered = false;
  q.choices.forEach(c => {                              // frozen per-paper order — no reshuffle on rerender
    const b = el(`<button class="opt quizopt">${esc(c)}</button>`);
    b.onclick = () => {
      if(answered || !TEST || TEST.done) return;
      answered = true;
      document.querySelectorAll(".quizopt").forEach(o => o.classList.add("disabled"));
      b.classList.add("sel");                           // neutral: nothing may leak right/wrong mid-test
      sfx.tap();
      const fb = $("#fb"); if(fb){ fb.textContent = tx("Saved ✓","दर्ज ✓"); fb.className = "feedback"; }
      if(c === q.answer) TEST.score++;
      setTimeout(() => {
        if(!TEST || TEST.done) return;
        TEST.idx++;
        TEST.idx >= n ? endTest("completed") : renderTestQ();
      }, 350);
    };
    opts.appendChild(b);
  });
  $("#tstop").onclick = () => { sfx.tap(); voidTest("stopped"); };
  testTick();
  moveFocusToTop(); refreshTop();
}

// ---- anti-cheat guards (armed only between Start and any terminal state) ----
function armTestGuards(){
  const T = TEST; if(!T) return;
  const fab = document.getElementById("roshniFab"); if(fab) fab.remove();   // the AI tutor could answer the question
  const h = T._h = {};
  h.vis   = () => { if(document.hidden) voidTest("hidden"); };
  h.blur  = () => { if(!TEST || TEST.done || TEST._blurT) return;
                    TEST._blurT = setTimeout(() => { if(TEST && !TEST.done) voidTest("blur"); }, 1500); };
  h.focus = () => { if(TEST && TEST._blurT){ clearTimeout(TEST._blurT); TEST._blurT = null; } };
  h.fs    = () => { if(!TEST || TEST.done) return;
                    if(document.fullscreenElement) TEST.fsEntered = true;
                    else if(TEST.fsEntered) voidTest("fullscreen_exit"); };
  h.hide  = () => voidTest("pagehide");
  h.block = e => e.preventDefault();
  document.addEventListener("visibilitychange", h.vis);
  window.addEventListener("blur", h.blur);
  window.addEventListener("focus", h.focus);
  document.addEventListener("fullscreenchange", h.fs);
  window.addEventListener("pagehide", h.hide);
  ["contextmenu","copy","paste"].forEach(ev => document.addEventListener(ev, h.block));
}
function disarmTestGuards(){
  const T = TEST; if(!T || !T._h) return;
  const h = T._h;
  if(T._blurT){ clearTimeout(T._blurT); T._blurT = null; }
  document.removeEventListener("visibilitychange", h.vis);
  window.removeEventListener("blur", h.blur);
  window.removeEventListener("focus", h.focus);
  document.removeEventListener("fullscreenchange", h.fs);
  window.removeEventListener("pagehide", h.hide);
  ["contextmenu","copy","paste"].forEach(ev => document.removeEventListener(ev, h.block));
  T._h = null;
}
function _testTeardown(T){
  disarmTestGuards();
  clearInterval(T.timerIv);
  try { if(T.wake) T.wake.release(); } catch(e){}
  try { if(document.fullscreenElement) document.exitFullscreen(); } catch(e){}
}
function _testSeenIds(T){   // only the questions actually DISPLAYED burn / get recorded
  return T.paper.qs.slice(0, Math.min(T.idx + 1, T.paper.qs.length)).map(q => q.id);
}

function voidTest(reason){
  const T = TEST; if(!T || T.done) return;
  T.done = true;
  _testTeardown(T);
  const n = T.paper.qs.length;
  const seen = _testSeenIds(T);
  const secs = Math.min(Math.round((Date.now() - T.t0) / 1000), 7200);
  burnPaper(T.course.key, seen);                        // she saw them — a retake gets fresh ones
  state.testPassed = state.testPassed || {};
  const st = state.testPassed[T.course.key] || { passed:false, bestPct:0, attempts:0 };
  st.attempts = (st.attempts||0) + 1;
  state.testPassed[T.course.key] = st;
  save();                                               // synchronous — survives pagehide
  recordTest({ track: T.course.key, paper: JSON.stringify(seen), score: 0, total: n,
               status: "exited", exit_reason: reason, duration_secs: secs }, T.paper.clientId);
  recordEvent({ kind:"test_exit", track: T.course.key, activity: "test", tool: reason,
                duration_secs: secs, count: T.idx + 1 });
  const course = T.course, back = T.back;
  TEST = null;
  renderTestVoided(course, back, reason);
}

function endTest(status){
  const T = TEST; if(!T || T.done) return;
  T.done = true;
  _testTeardown(T);
  const n = T.paper.qs.length;
  const pct = n ? Math.round(100 * T.score / n) : 0;
  const passed = pct >= (T.course.test.passPct || 60);  // server recomputes authoritatively on sync
  burnPaper(T.course.key, _testSeenIds(T));
  state.testPassed = state.testPassed || {};
  const st = state.testPassed[T.course.key] || { passed:false, bestPct:0, attempts:0 };
  st.passed = st.passed || passed;
  st.bestPct = Math.max(st.bestPct||0, pct);
  st.attempts = (st.attempts||0) + 1;
  state.testPassed[T.course.key] = st;
  save();
  recordTest({ track: T.course.key, paper: JSON.stringify(_testSeenIds(T)), score: T.score, total: n,
               status, exit_reason: "", duration_secs: Math.min(Math.round((Date.now() - T.t0) / 1000), 7200) },
             T.paper.clientId);
  const course = T.course, back = T.back, score = T.score;
  TEST = null;
  renderTestResult(course, back, { pct, passed, score, n, timedOut: status === "timed_out" });
}

// ---------- Type-aware sentence frames for "Build a Sentence" ----------
// Each word carries a `type` (thing/mass/person/verb/adj/time/phrase). Frames are
// chosen to fit the type, so we never generate nonsense like "How much is the mother?"
// or "I want one read". Words of type time/phrase have no good frame and are skipped.
// a / an: pick the right article by the SOUND of the next word, not just its first
// letter — "an apple", but "a university"/"a user" (yoo-) and "an hour" (silent h).
function artFor(w){
  w = String(w || "");
  if(/^(uni|use|usu|ubi|eu|ewe|one|once)/i.test(w)) return "a";     // "yoo"/"wuh" sound: a university, a user, a one-way
  if(/^(hour|honest|honou?r|heir)/i.test(w)) return "an";           // silent h: an hour
  return /^[aeiou]/i.test(w) ? "an" : "a";
}
const PHRASE_FRAMES = {
  thing: [
    it => ({ words:["I","want","one",it.en],        hintHi:`"मुझे एक ${it.hi} चाहिए"`, hintHiSpoken:`मुझे एक ${it.hi} चाहिए` }),
    it => ({ words:["This","is",artFor(it.en),it.en], hintHi:`"यह एक ${it.hi} है"`,     hintHiSpoken:`यह एक ${it.hi} है` }),
    it => ({ words:["Give","me","two",it.plural||it.en], hintHi:`"मुझे दो ${it.hi} दीजिए"`, hintHiSpoken:`मुझे दो ${it.hi} दीजिए` }),
  ],
  mass: [
    it => ({ words:["I","want","some",it.en],        hintHi:`"मुझे कुछ ${it.hi} चाहिए"`, hintHiSpoken:`मुझे कुछ ${it.hi} चाहिए` }),
    it => ({ words:["Give","me","some",it.en],        hintHi:`"मुझे थोड़ा ${it.hi} दीजिए"`, hintHiSpoken:`मुझे थोड़ा ${it.hi} दीजिए` }),
    it => ({ words:["I","need","some",it.en],         hintHi:`"मुझे ${it.hi} चाहिए"`,     hintHiSpoken:`मुझे ${it.hi} चाहिए` }),
  ],
  person: [
    it => ({ words:["This","is","my",it.en],          hintHi:`"यह मेरा ${it.hi} है"`,    hintHiSpoken:`यह मेरा ${it.hi} है` }),
    it => ({ words:["She","is","my",it.en],           hintHi:`"वह मेरी ${it.hi} है"`,    hintHiSpoken:`वह मेरी ${it.hi} है` }),
    it => ({ words:["I","have",artFor(it.en),it.en],  hintHi:`"मेरा एक ${it.hi} है"`,    hintHiSpoken:`मेरा एक ${it.hi} है` }),
  ],
  verb: [
    it => ({ words:["I","can",it.en],                 hintHi:`"मैं ${it.hi} सकती हूँ"`,  hintHiSpoken:`मैं ${it.hi} सकती हूँ` }),
    it => ({ words:["Please",it.en,"now"],            hintHi:`"कृपया अभी ${it.hi}"`,     hintHiSpoken:`कृपया अभी ${it.hi}` }),
    it => ({ words:["I","will",it.en,"today"],        hintHi:`"मैं आज ${it.hi}"`,        hintHiSpoken:`मैं आज ${it.hi}` }),
  ],
  adj: [
    it => ({ words:["It","is",it.en],                 hintHi:`"यह ${it.hi} है"`,        hintHiSpoken:`यह ${it.hi} है` }),
    it => ({ words:["I","am",it.en],                  hintHi:`"मैं ${it.hi} हूँ"`,       hintHiSpoken:`मैं ${it.hi} हूँ` }),
    it => ({ words:["This","is","very",it.en],        hintHi:`"यह बहुत ${it.hi} है"`,    hintHiSpoken:`यह बहुत ${it.hi} है` }),
  ],
};
// resolve a usable frame-type for a word; null = skip in Build a Sentence
function phraseType(it){
  if(it.type && PHRASE_FRAMES[it.type]) return it.type;
  if(it.type==="time" || it.type==="phrase") return null;   // no good sentence frame
  if(it.uncount) return "mass";                              // fallback for untyped content
  return "thing";
}

// ---------- Build rounds per activity type, from a lesson's content ----------
function buildRounds(lv, lesson){
  const ITEMS = lesson.words;
  if(lv.type==="learn")  return pick(ITEMS, 6);
  if(lv.type==="spell")  return pick(ITEMS.filter(i=>i.en.length<=6), 5);
  if(lv.type==="listen"){
    return pick(ITEMS,6).map(ans=>{
      const distract = pick(ITEMS.filter(i=>i.en!==ans.en),3);
      return { answer:ans, choices: shuffle([ans,...distract]) };
    });
  }
  if(lv.type==="phrase"){
    // usable = words with an authored example sentence, or a type that has a frame (skips time/phrase)
    const usable = ITEMS.filter(it => it.use || phraseType(it));
    const pool = usable.length ? usable : ITEMS;
    return pick(pool,5).map((it,i)=>{
      if(it.use){   // authored, context-real sentence (the IT/coding lessons use this)
        return { emoji:it.emoji, words: it.use.split(" "),
                 hintHi:`"${it.useHi||it.hi}"`, hintHiSpoken: it.useHi||it.hi };
      }
      const t = phraseType(it) || (it.uncount ? "mass" : "thing");
      const frames = PHRASE_FRAMES[t];
      const v = frames[i % frames.length](it);
      return { emoji:it.emoji, ...v };
    });
  }
  if(lv.type==="talk") return lesson.dialogues.slice();
  if(lv.type==="quiz") return (lesson.quiz||[]).slice();
  if(lv.type==="code") return (lesson.code||[]).slice();
  if(lv.type==="fix")  return (lesson.fix||[]).slice();
  if(lv.type==="email") return (lesson.email||[]).slice();
  if(lv.type==="read") return (lesson.read||[]).slice();
  if(lv.type==="reply") return (lesson.reply||[]).slice();
  return [];
}

// ---------- boot ----------
// ---------- Backend sync (offline-first; bundled COURSES is the fallback) ----------
// When served from the Frappe app, fetch live content + cache it. When opened as a
// plain file (no server) or offline, the bundled/cached COURSES is used unchanged.
const CACHE_KEY = "hikmat_courses_cache";
const STRUCT_KEY = "hikmat_structure_cache";
const ATTEMPT_QUEUE = "hikmat_attempt_queue";
const DOUBT_QUEUE = "hikmat_doubt_queue";
let backendLive = false;   // true once we've reached the Frappe server

// Backend origin. Empty = same-origin (the normal web build served by Frappe). A PACKAGED build
// (the Android/Capacitor app runs from a local origin) sets window.HIKMAT_BACKEND to the remote
// Frappe host so API calls reach the server; bundled static assets (curriculum.json, icons) stay
// relative and resolve to the local bundle. localStorage override eases on-device testing.
const BACKEND_BASE = (function(){
  try { return String(window.HIKMAT_BACKEND || localStorage.getItem("hikmat_backend") || "").replace(/\/+$/, ""); }
  catch(e){ return ""; }
})();
function apiURL(m){ return BACKEND_BASE + "/api/method/hikmat.api." + m; }
// The game page is static, but the browser may carry a logged-in Frappe session (a
// facilitator with Desk open, or an online student) — Frappe then REJECTS POSTs that
// lack the session's CSRF token (400). We fetch the token once (GET, same-origin) and
// attach it to every POST; guests get "" and are never CSRF-checked.
let CSRF_TOKEN = "";
function postHeaders(){ return CSRF_TOKEN ? { "X-Frappe-CSRF-Token": CSRF_TOKEN } : {}; }
async function refreshCsrf(){
  try {
    const r = await fetch(apiURL("get_csrf"), { headers:{ Accept:"application/json" } });
    if(r.ok) CSRF_TOKEN = ((await r.json()).message || {}).token || "";
  } catch(e){}
}
async function api(method, params, post){
  try {
    const opts = post ? { method:"POST", headers: postHeaders(), body:new URLSearchParams(params||{}) }
                      : { headers:{ Accept:"application/json" } };
    const url = apiURL(method) + (!post && params ? "?" + new URLSearchParams(params) : "");
    const r = await fetch(url, opts);
    if(!r.ok) return null;
    return (await r.json()).message;
  } catch(e){ return null; }
}

async function loadFromBackend(){
  // 1) cached content + settings first → instant and works offline (logo, name, taglines persist)
  let haveCache = false;
  try { const c = JSON.parse(localStorage.getItem(CACHE_KEY)); if(Array.isArray(c) && c.length){ COURSES = c; haveCache = true; } } catch(e){}
  try { const st = JSON.parse(localStorage.getItem(STRUCT_KEY)); if(st && st.bands && st.bands.length){ BANDS = st.bands; SUBJECTS = st.subjects || SUBJECTS; } } catch(e){}
  try { const s = JSON.parse(localStorage.getItem("hikmat_settings_cache"));
        if(s && s.appName){ SETTINGS.appName = s.appName; SETTINGS.logo = s.logo || ""; if(s.taglineEn) SETTINGS.tagline.en = s.taglineEn; if(s.taglineHi) SETTINGS.tagline.hi = s.taglineHi; SETTINGS.aiEnabled = !!s.aiEnabled; SETTINGS.voiceEnabled = !!s.voiceEnabled; if(Array.isArray(s.milestones)) SETTINGS.milestones = s.milestones; applySettingsDefaults(s); } } catch(e){}
  // 1b) durable offline baseline: the full curriculum shipped as a static file (precached by the
  //     service worker). Without this, a first-ever-offline launch or a localStorage wipe would fall
  //     back to the tiny bundled COURSES (4 tracks) instead of all lessons.
  if(!haveCache){
    try {
      const cj = await fetch("/assets/hikmat/curriculum.json", {headers:{Accept:"application/json"}});
      if(cj.ok){ const arr = await cj.json(); if(Array.isArray(arr) && arr.length){ COURSES = arr; } }
    } catch(e){}
  }
  // 2) then try live (only succeeds when served from Frappe and online)
  try {
    const [cr, sr, xr] = await Promise.all([
      fetch(apiURL("get_courses"),   {headers:{Accept:"application/json"}}),
      fetch(apiURL("get_settings"),  {headers:{Accept:"application/json"}}),
      fetch(apiURL("get_structure"), {headers:{Accept:"application/json"}}),
    ]);
    if(cr.ok){
      const j = await cr.json();
      if(j && Array.isArray(j.message) && j.message.length){
        COURSES = j.message;
        localStorage.setItem(CACHE_KEY, JSON.stringify(COURSES));
      }
    }
    if(xr.ok){
      const x = (await xr.json()).message;
      if(x && Array.isArray(x.bands) && x.bands.length){
        BANDS = x.bands; SUBJECTS = x.subjects || SUBJECTS;
        try { localStorage.setItem(STRUCT_KEY, JSON.stringify(x)); } catch(e){}
      }
    }
    if(sr.ok){
      const s = (await sr.json()).message;
      if(s && s.appName){
        SETTINGS.appName = s.appName;
        SETTINGS.logo = s.logo || "";
        if(s.taglineEn) SETTINGS.tagline.en = s.taglineEn;
        if(s.taglineHi) SETTINGS.tagline.hi = s.taglineHi;
        SETTINGS.aiEnabled = !!s.aiEnabled;
        SETTINGS.voiceEnabled = !!s.voiceEnabled;
        if(Array.isArray(s.milestones)) SETTINGS.milestones = s.milestones;
        applySettingsDefaults(s);
        try { localStorage.setItem("hikmat_settings_cache", JSON.stringify(s)); } catch(e){}
      }
    }
    // "live" means the Frappe API actually answered — NOT merely that fetch didn't throw.
    // A static host (python http.server, file://) returns 404 for these endpoints: fetch still
    // resolves, so returning true here would wrongly flag the backend as reachable and block the
    // offline signup fallback. Require at least one whitelisted method to have responded ok.
    return cr.ok || sr.ok || xr.ok;
  } catch(e){ return false; }   // offline / file:// — keep bundled or cached data
}

// queue a finished activity and push it to the server when possible
let _syncing = false;
function _readQueue(){ try { return JSON.parse(localStorage.getItem(ATTEMPT_QUEUE)) || []; } catch(e){ return []; } }
function _saveQueue(q){ try { localStorage.setItem(ATTEMPT_QUEUE, JSON.stringify(q)); } catch(e){ /* quota: best-effort, retry next sync */ } }
function recordAttempt(a){
  if(!currentStudent) return;            // guest / not signed in → local progress only
  const q = _readQueue();
  q.push({ ...a, student: currentStudent.id, token: currentStudent.token || "", client_id: uid() });
  _saveQueue(q);
  syncAttempts();
}
async function syncAttempts(){
  if(_syncing) return;                   // serialize runs so concurrent calls can't clobber the queue
  const q = _readQueue();
  if(!q.length) return;
  _syncing = true;
  const remaining = [];
  try {
    for(const a of q){
      try {
        const r = await fetch(apiURL("submit_attempt"), {method:"POST", headers: postHeaders(), body:new URLSearchParams(a)});
        if(!r.ok){ remaining.push(a); continue; }                  // HTTP/network error → retry later
        let body = null; try { body = (await r.json()).message; } catch(e){}
        if(body && body.ok === false && body.error === "rate_limited") remaining.push(a);  // transient → retry
        // success, or a permanent rejection (e.g. unknown_student) → drop so it can't loop forever
      } catch(e){ remaining.push(a); }                             // offline → keep for next time
    }
    // merge anything enqueued DURING this run so a mid-sync recordAttempt isn't lost
    const seen = new Set(q.map(x => JSON.stringify(x)));
    _readQueue().forEach(x => { if(!seen.has(JSON.stringify(x))) remaining.push(x); });
    _saveQueue(remaining);
  } finally { _syncing = false; }
}
window.addEventListener("online", syncAttempts);

// ---------- Module-test attempts: same offline queue contract as attempts ----------
const TEST_QUEUE = "hikmat_test_queue";
function _readTests(){ try { return JSON.parse(localStorage.getItem(TEST_QUEUE)) || []; } catch(e){ return []; } }
function _saveTests(q){ try { localStorage.setItem(TEST_QUEUE, JSON.stringify(q)); } catch(e){} }
function recordTest(t, clientId){
  if(!currentStudent || currentStudent.local) return;  // guests/local profiles: device-local only
  const q = _readTests();
  q.push({ ...t, lang: state.lang, student: currentStudent.id,
           token: currentStudent.token || "", client_id: clientId || uid() });
  _saveTests(q);
  syncTests();
}
let _syncingTests = false;
async function syncTests(){
  if(_syncingTests) return;
  const q = _readTests();
  if(!q.length) return;
  _syncingTests = true;
  const remaining = [];
  try {
    for(const t of q){
      try {
        const r = await fetch(apiURL("submit_test"), { method:"POST", headers: postHeaders(), body:new URLSearchParams(t) });
        if(!r.ok){ remaining.push(t); continue; }
        let body = null; try { body = (await r.json()).message; } catch(e){}
        if(body && body.ok === false && body.error === "rate_limited"){ remaining.push(t); continue; }
        // The server may pass a paper the client mis-scored (its pass_pct is authoritative).
        // Credit it ONLY to the student who took it — a boot-time flush on a shared laptop
        // can be shipping girl A's attempt while girl B is signed in.
        if(body && body.ok && body.passed && currentStudent && currentStudent.id === t.student){
          state.testPassed = state.testPassed || {};
          const st = state.testPassed[t.track] || { passed:false, bestPct:0, attempts:0 };
          st.passed = true;
          state.testPassed[t.track] = st;
          save();
        }
      } catch(e){ remaining.push(t); }
    }
    const seen = new Set(q.map(x => JSON.stringify(x)));
    _readTests().forEach(x => { if(!seen.has(JSON.stringify(x))) remaining.push(x); });
    _saveTests(remaining);
  } finally { _syncingTests = false; }
}
window.addEventListener("online", syncTests);

// Layer 1: in-the-moment self-help right where she is (hear again / slowly / in Hindi),
//          with a reassuring Roshni so asking never feels like failing.
// Layer 2: each doubt is logged (track/lesson/activity) and synced so a facilitator

  // Roshni warmly invites the doubt — having one is a good thing.
  const roshniLine = tx("Doubt hona acchi baat hai! Main samjhaati hoon.",
                        "Doubt होना अच्छी बात है! मैं समझाती हूँ।");

    <div class="sheet doubtsheet" role="dialog" aria-modal="true" aria-label="${tx('Help from Roshni','रोशनी से मदद')}">

        </div>
      </div>

        <button class="doubtopt" id="dSlow"><span class="di">🐢</span><span>${tx("Say it slowly","धीरे से कहो")}</span></button>
        ${hi ? `<button class="doubtopt" id="dHindi"><span class="di">🇮🇳</span><span>${tx("Explain in Hindi","हिंदी में समझाओ")}</span></button>` : ""}
        <button class="doubtopt" id="dTeacher"><span class="di">🧑‍🏫</span><span>${tx("Tell the teacher","टीचर को बताओ")}</span></button>
        ${aiOn ? `<button class="doubtopt" id="dAsk"><span class="di">✨</span><span>${tx("Ask Roshni","रोशनी से पूछो")}</span></button>` : ""}

        <textarea id="aiInput" rows="2" aria-label="${escAttr(tx('Ask Roshni your question','रोशनी से अपना सवाल पूछो'))}" style="width:100%;font-size:16px;padding:10px 12px;border:2px solid var(--line);border-radius:12px;background:var(--card);color:var(--ink);font-family:inherit;resize:none;" placeholder="${escAttr(tx('Type your question in Hindi…','अपना सवाल हिंदी में लिखो…'))}"></textarea>
        <button class="btn primary wide" id="aiSend" style="margin-top:8px;">✨ ${tx("Ask Roshni","पूछो")}</button>
        <div id="aiAnswer" class="teachbox" style="display:none;margin-top:12px;"></div>
      </div>` : ""}
      <button class="btn ghost wide" id="dClose">${tx("I'm okay now →","अब समझ गई →")}</button>
    </div>
  </div>`);
  document.body.appendChild(sheet);
  // Layer 2: log the doubt the moment she opens for help (once per open).
  reportDoubt({ track: doubtCtx.course.key, lesson: doubtCtx.lesson.key,
                activity: doubtCtx.lv.id, question: replayEn.slice(0, 280) });
  const close = () => { sheet.remove(); };
  sheet.addEventListener("click", e => { if(e.target === sheet) close(); });
  $("#dClose").onclick = () => { sfx.tap(); close(); };
  $("#dAgain").onclick = () => { sfx.tap(); logTool("hear_again"); if(replayEn) speak(replayEn, state.lang==="hi"?"hi":"en"); };
  $("#dSlow").onclick  = () => { sfx.tap(); logTool("hear_slow"); if(replayEn) speak(replayEn, state.lang==="hi"?"hi":"en", { rate:0.55 }); };
  const dh = $("#dHindi"); if(dh) dh.onclick = () => { sfx.tap(); logTool("hear_hindi"); if(hi) speak(hi, "hi", { rate:0.8 }); };
