let backendLive = false;   // true once we've reached the Frappe server

function apiURL(m){ return "/api/method/hikmat.api." + m; }
async function api(method, params, post){
  try {
    const opts = post ? { method:"POST", body:new URLSearchParams(params||{}) }
                      : { headers:{ Accept:"application/json" } };
    const url = apiURL(method) + (!post && params ? "?" + new URLSearchParams(params) : "");
    const r = await fetch(url, opts);
    if(!r.ok) return null;
    return (await r.json()).message;
  } catch(e){ return null; }
}

async function loadFromBackend(){
  // 1) cached content + settings first → instant and works offline (logo, name, taglines persist)
  let haveCache = false;
  try { const c = JSON.parse(localStorage.getItem(CACHE_KEY)); if(Array.isArray(c) && c.length){ COURSES = c; haveCache = true; } } catch(e){}
  try { const st = JSON.parse(localStorage.getItem(STRUCT_KEY)); if(st && st.bands && st.bands.length){ BANDS = st.bands; SUBJECTS = st.subjects || SUBJECTS; } } catch(e){}
  try { const s = JSON.parse(localStorage.getItem("hikmat_settings_cache"));
        if(s && s.appName){ SETTINGS.appName = s.appName; SETTINGS.logo = s.logo || ""; if(s.taglineEn) SETTINGS.tagline.en = s.taglineEn; if(s.taglineHi) SETTINGS.tagline.hi = s.taglineHi; } } catch(e){}
  // 1b) durable offline baseline: the full curriculum shipped as a static file (precached by the
  //     service worker). Without this, a first-ever-offline launch or a localStorage wipe would fall
  //     back to the tiny bundled COURSES (4 tracks) instead of all lessons.
  if(!haveCache){
    try {
      const cj = await fetch("/assets/hikmat/curriculum.json", {headers:{Accept:"application/json"}});
      if(cj.ok){ const arr = await cj.json(); if(Array.isArray(arr) && arr.length){ COURSES = arr; } }
    } catch(e){}
  }
  // 2) then try live (only succeeds when served from Frappe and online)
  try {
    const [cr, sr, xr] = await Promise.all([
      fetch(apiURL("get_courses"),   {headers:{Accept:"application/json"}}),
      fetch(apiURL("get_settings"),  {headers:{Accept:"application/json"}}),
      fetch(apiURL("get_structure"), {headers:{Accept:"application/json"}}),
    ]);
    if(cr.ok){
      const j = await cr.json();
      if(j && Array.isArray(j.message) && j.message.length){
        COURSES = j.message;
        localStorage.setItem(CACHE_KEY, JSON.stringify(COURSES));
      }
    }
    if(xr.ok){
      const x = (await xr.json()).message;
      if(x && Array.isArray(x.bands) && x.bands.length){
        BANDS = x.bands; SUBJECTS = x.subjects || SUBJECTS;
        try { localStorage.setItem(STRUCT_KEY, JSON.stringify(x)); } catch(e){}
      }
    }
    if(sr.ok){
      const s = (await sr.json()).message;
      if(s && s.appName){
        SETTINGS.appName = s.appName;
        SETTINGS.logo = s.logo || "";
        if(s.taglineEn) SETTINGS.tagline.en = s.taglineEn;
        if(s.taglineHi) SETTINGS.tagline.hi = s.taglineHi;
        try { localStorage.setItem("hikmat_settings_cache", JSON.stringify(s)); } catch(e){}
      }
    }
    return true;
  } catch(e){ return false; }   // offline / file:// — keep bundled or cached data
}

// queue a finished activity and push it to the server when possible
let _syncing = false;
function _readQueue(){ try { return JSON.parse(localStorage.getItem(ATTEMPT_QUEUE)) || []; } catch(e){ return []; } }
function _saveQueue(q){ try { localStorage.setItem(ATTEMPT_QUEUE, JSON.stringify(q)); } catch(e){ /* quota: best-effort, retry next sync */ } }
function recordAttempt(a){
  if(!currentStudent) return;            // guest / not signed in → local progress only
  const q = _readQueue();
  q.push({ ...a, student: currentStudent.id, token: currentStudent.token || "", client_id: uid() });
  _saveQueue(q);
  syncAttempts();
}
async function syncAttempts(){
  if(_syncing) return;                   // serialize runs so concurrent calls can't clobber the queue
  const q = _readQueue();
  if(!q.length) return;
  _syncing = true;
  const remaining = [];
  try {
    for(const a of q){
      try {
        const r = await fetch(apiURL("submit_attempt"), {method:"POST", body:new URLSearchParams(a)});
        if(!r.ok){ remaining.push(a); continue; }                  // HTTP/network error → retry later
        let body = null; try { body = (await r.json()).message; } catch(e){}
        if(body && body.ok === false && body.error === "rate_limited") remaining.push(a);  // transient → retry
        // success, or a permanent rejection (e.g. unknown_student) → drop so it can't loop forever
      } catch(e){ remaining.push(a); }                             // offline → keep for next time
    }
    // merge anything enqueued DURING this run so a mid-sync recordAttempt isn't lost
    const seen = new Set(q.map(x => JSON.stringify(x)));
    _readQueue().forEach(x => { if(!seen.has(JSON.stringify(x))) remaining.push(x); });
    _saveQueue(remaining);
  } finally { _syncing = false; }
}
window.addEventListener("online", syncAttempts);

// ---------- identity & login (only when served from Frappe; offline = guest) ----------
function setStudent(stu){
  currentStudent = stu || null;
  showAllClasses = false;               // a fresh login starts focused on the student's own class
  if(stu) localStorage.setItem("hikmat_current", JSON.stringify(stu));
  else localStorage.removeItem("hikmat_current");
  state = loadState();                  // swap to this identity's saved progress
}
async function mergeServerProgress(){
  if(!currentStudent) return;
  const res = await api("get_progress", { student: currentStudent.id, token: currentStudent.token || "" });
  const p = res && res.progress;
  if(!p) return;
  for(const ck in p) for(const lk in p[ck]) for(const aid in p[ck][lk]) setStars(ck, lk, aid, p[ck][lk][aid]);
  save();
}

// SIGN UP — a learner creates their own profile (name + avatar + optional PIN), then plays.
const AVATARS = ["🙂","👧","🧒","👩","😀","🦋","🌸","🌟","🐱","🦊","🐥","🚀"];
function renderSignup(){
  stopSpeech(); rerender = renderSignup; root.innerHTML = "";
  setBack(tx("← Log in","← लॉग इन"), renderLogin);
  let avatar = AVATARS[0], band = "";
  root.appendChild(el(`<div class="screen">
    <div class="hero"><h1>${tx("Create your name ✨","अपना नाम बनाओ ✨")}</h1>
      <p>${tx("Make a profile so your stars are saved.","प्रोफ़ाइल बनाओ ताकि तुम्हारे सितारे सुरक्षित रहें।")}</p></div>
    <div class="signup">
      <label class="fieldlabel">${tx("First name or nickname","पहला नाम या उपनाम")}</label>
      <input id="suName" class="searchbox" type="text" autocomplete="off" maxlength="40"
             placeholder="${tx('e.g. Asha, or a nickname','जैसे: आशा, या उपनाम')}">
      <div class="hint2">${tx("A first name or nickname is best — you don't need your full name.","पहला नाम या उपनाम काफ़ी है — पूरा नाम ज़रूरी नहीं।")}</div>
      <label class="fieldlabel">${tx("Your class","तुम्हारी कक्षा")}</label>
      <div class="bandpick" id="bandpick"></div>
      <label class="fieldlabel">${tx("Pick an avatar","अवतार चुनो")}</label>
      <div class="avpick" id="avpick"></div>
      <label class="fieldlabel">${tx("PIN (optional)","पिन (वैकल्पिक)")}</label>
      <input id="suPin" class="searchbox" type="password" inputmode="numeric" maxlength="8"
             placeholder="${tx('4–8 digits — keeps your progress safe','4–8 अंक — प्रगति सुरक्षित रखे')}">
      <label class="consent"><input type="checkbox" id="suConsent">
        <span>${tx("A parent or teacher said it's okay for me to make a profile.","माता-पिता या शिक्षक ने मुझे प्रोफ़ाइल बनाने की अनुमति दी है।")}</span></label>
      <div class="feedback bad" id="suErr" style="min-height:18px"></div>
      <div class="center"><button class="btn primary" id="suGo" disabled>${tx("Create & start →","बनाओ और शुरू करो →")}</button></div>
      <div class="center" style="margin-top:14px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap">
        <button class="btn ghost" id="suLogin">${tx("Already have a name? Log in","पहले से नाम है? लॉग इन")}</button>
        <button class="btn ghost" id="suGuest">${tx("Play without signing in","बिना साइन-इन खेलो")}</button>
      </div>
    </div>
  </div>`));
  setNarration(tx("Create your name. Type a name, choose your class, and pick a picture.","अपना नाम बनाओ। नाम लिखो, अपनी कक्षा और एक तस्वीर चुनो।"), tx("Create your name. Type a name, choose your class, and pick a picture.","अपना नाम बनाओ। नाम लिखो, अपनी कक्षा और एक तस्वीर चुनो।"));
  const avwrap = $("#avpick");
  AVATARS.forEach((a,i) => {
    const b = el(`<button class="av ${i===0?'sel':''}">${a}</button>`);
    b.onclick = () => { avatar = a; sfx.tap(); avwrap.querySelectorAll(".av").forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); };
    avwrap.appendChild(b);
  });
  const name = $("#suName"), pin = $("#suPin"), go = $("#suGo"), err = $("#suErr"), consent = $("#suConsent");
  const refreshGo = () => { go.disabled = !(name.value.trim() && consent.checked && band); };
  name.oninput = () => { refreshGo(); err.textContent = ""; };
  consent.onchange = refreshGo;
  const bandwrap = $("#bandpick");
  BANDS.filter(b => bandTracks(b.key).some(c => c.published && c.lessons.length)).forEach(b => {
    const btn = el(`<button class="bandchip">${iconFor("band:"+b.key, b.icon)} ${esc(tx(b.title, b.titleHi))}</button>`);
    btn.onclick = () => { band = b.key; sfx.tap(); bandwrap.querySelectorAll(".bandchip").forEach(x=>x.classList.remove("sel")); btn.classList.add("sel"); err.textContent=""; refreshGo(); };
    bandwrap.appendChild(btn);
  });
  setTimeout(() => name.focus(), 60);
  $("#suLogin").onclick = () => { sfx.back(); renderLogin(); };
  $("#suGuest").onclick = () => { sfx.tap(); setStudent(null); renderHome(); };
  const submit = async () => {
    const nm = name.value.trim();
    if(!nm){ err.textContent = tx("Please type your name.","कृपया अपना नाम लिखो।"); return; }
    if(!band){ err.textContent = tx("Please choose your class.","कृपया अपनी कक्षा चुनो।"); return; }
    if(!consent.checked){ err.textContent = tx("Please tick the box to continue.","आगे बढ़ने के लिए बॉक्स पर टिक करो।"); return; }
    const p = pin.value.trim();
    if(p && !/^\d{4,8}$/.test(p)){ err.textContent = tx("PIN must be 4–8 digits.","पिन 4–8 अंकों का हो।"); return; }
    go.disabled = true; err.textContent = "";
    const r = await api("signup_student", { name:nm, avatar, pin:p, band }, true);
    if(r && r.ok){ finishLogin(r); }
    else { go.disabled = false; err.textContent = tx("Could not sign up — please try again.","साइन अप नहीं हुआ — फिर कोशिश करो।"); }
  };
  go.onclick = submit;
  name.onkeydown = (e) => { if(e.key==="Enter" && name.value.trim()) submit(); };
  pin.onkeydown  = (e) => { if(e.key==="Enter") submit(); };
  refreshTop();
}

// LOG IN — type your name + PIN (no roster shown: cleaner, and never broadcasts other kids' names)
function renderLogin(){
  stopSpeech(); rerender = renderLogin; root.innerHTML = ""; setBack(null);
  root.appendChild(el(`<div class="screen">
    <div class="hero"><h1>${tx("Log in 🙋‍♀️","लॉग इन 🙋‍♀️")}</h1>
      <p>${tx("Type your name and PIN to continue.","अपना नाम और पिन डालकर आगे बढ़ो।")}</p></div>
    <div class="authform">
      <label class="fieldlabel">${tx("Your name","तुम्हारा नाम")}</label>
      <input id="loginName" class="searchbox" type="text" autocomplete="username" maxlength="40"
             placeholder="${tx('e.g. Asha','जैसे: आशा')}">
      <label class="fieldlabel">${tx("PIN","पिन")}</label>
      <input id="loginPin" class="searchbox" type="password" inputmode="numeric" maxlength="8" autocomplete="current-password"
             placeholder="${tx('Leave blank if you have no PIN','पिन नहीं है तो खाली छोड़ो')}">
      <div class="feedback bad" id="loginErr" style="min-height:18px"></div>
      <div class="center"><button class="btn primary" id="loginGo">${tx("Log in →","लॉग इन →")}</button></div>
      <div class="center" style="margin-top:14px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap">
        <button class="btn ghost" id="toSignup">${tx("✨ New here? Sign up","✨ नई हो? साइन अप")}</button>
        <button class="btn ghost" id="guestBtn">${tx("Play without signing in","बिना साइन-इन खेलो")}</button>
      </div>
    </div>
  </div>`));
  setNarration(tx("Log in. Type your name and PIN to continue.","लॉग इन। अपना नाम और पिन डालकर आगे बढ़ो।"), tx("Log in. Type your name and PIN to continue.","लॉग इन। अपना नाम और पिन डालकर आगे बढ़ो।"));
  const name = $("#loginName"), pin = $("#loginPin"), err = $("#loginErr");
  setTimeout(() => name.focus(), 60);
  $("#toSignup").onclick = () => { sfx.tap(); renderSignup(); };
  $("#guestBtn").onclick = () => { sfx.tap(); setStudent(null); renderHome(); };
  const submit = async () => {
    const nm = name.value.trim();
    if(!nm){ err.textContent = tx("Please type your name.","कृपया अपना नाम लिखो।"); name.focus(); return; }
    err.textContent = tx("Checking…","जाँच रहे हैं…");
    const r = await api("login_by_name", { name: nm, pin: pin.value }, true);
    if(r && r.ok){ finishLogin(r); }
    else if(r && r.error === "locked"){ err.textContent = tx("Too many tries — wait a few minutes.","बहुत बार कोशिश — कुछ मिनट रुको।"); }
    else { err.textContent = tx("Wrong name or PIN — try again.","ग़लत नाम या पिन — फिर कोशिश करो।"); pin.value=""; pin.focus(); }
  };
  $("#loginGo").onclick = submit;
  name.onkeydown = (e) => { if(e.key === "Enter") pin.focus(); };
  pin.onkeydown  = (e) => { if(e.key === "Enter") submit(); };
  refreshTop();
}
async function finishLogin(stu){
  sfx.enter();
  setStudent({ id: stu.id, name: stu.name, avatar: stu.avatar || "🙂", token: stu.token, band: stu.band || "" });
  await mergeServerProgress();
  renderHome();
}

// ---------- boot ----------
state.progress = state.progress || {};
state.hindi = state.hindi===true;
state.lang = state.lang || "en";
state.sound = state.sound!==false;
state.theme = state.theme || "light";
renderHome();          // instant: bundled or cached content, fully offline
syncAttempts();        // flush any progress queued while offline
loadFromBackend().then(async ok => {
  backendLive = ok;
  // No forced login wall — everyone lands on Home (playable); the guest sees clear
  // "Log in" / "Sign up" buttons and chooses when to sign in.
  if(ok && currentStudent) await mergeServerProgress();
  if(document.getElementById("homeSections")) renderHome();   // refresh home in place once live content + structure arrive
  refreshTop();
});

// ---------- PWA: install + offline (only when served over http(s); skipped for the file:// build) ----------
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  let reloaded = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if(reloaded) return; reloaded = true; location.reload();    // the new SW took control → load the new build
  });
  function showUpdateToast(worker){
    if(document.getElementById("updToast")) return;             // a refresh is offered, NOT forced — never yank a child mid-activity
    const t = el(`<div id="updToast" role="status" style="position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:9999;background:#2c2440;color:#fff;border-radius:999px;padding:10px 16px;font-weight:800;box-shadow:0 6px 20px rgba(0,0,0,.25);cursor:pointer;font-size:14px">${tx("New version — tap to refresh","नया वर्शन — रिफ्रेश करें")}</div>`);
    t.onclick = () => { t.textContent = tx("Updating…","अपडेट हो रहा है…"); worker.postMessage("SKIP_WAITING"); };
    document.body.appendChild(t);
  }
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/assets/hikmat/sw.js", { scope: "/assets/hikmat/" })
      .then(reg => {
        reg.addEventListener("updatefound", () => {
          const nw = reg.installing;
          nw && nw.addEventListener("statechange", () => {
            if(nw.state === "installed" && navigator.serviceWorker.controller) showUpdateToast(nw);
          });
        });
      })
      .catch(e => console.warn("Hikmat SW registration failed:", e));
  });
}
